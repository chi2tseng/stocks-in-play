<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stocks In Play</title>
<!-- Browser tab favicon — points to logo.png. Cache-bust query bumped to v=3 whenever the
     image actually changes, since browsers cache favicons aggressively (often across hard
     refreshes). No SVG fallback because Chrome was preferring it over the PNG even with
     the PNG listed first; one PNG link with no alternative forces the textured S to load. -->
<link rel="icon" type="image/png" href="logo.png?v=3">
<!-- Apple-touch + OG social-share preview use the same PNG (high-res). -->
<link rel="apple-touch-icon" href="logo.png?v=3">
<meta property="og:title" content="Stocks In Play">
<meta property="og:description" content="Daily NTRT/MTRT gap scanner — top gap candidates, MAGNA53 classification, TradingView quarterly forecasts.">
<meta property="og:image" content="logo.png?v=3">
<meta property="og:type" content="website">
<meta property="og:url" content="https://chi2tseng.github.io/stocks-in-play/">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="logo.png?v=3">
<!-- Webfonts — Inter (variable, with `opsz` axis for display sizes) acts as the Aeonik Pro stand-in
     per DESIGN.md §388 ("Inter Display ... credible substitutes"). JetBrains Mono for tabular numbers. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@500;600;700&display=swap">
<style>
:root {
  --primary: #494fdf;
  --primary-bright: #4f55f1;
  --primary-deep: #3a40c4;
  --on-primary: #ffffff;
  --ink: #191c1f;
  --body: #1f2226;
  --charcoal: #3a3d40;
  --mute: #505a63;
  --ash: #5c5e60;
  --stone: #8d969e;
  --faint: #c9c9cd;
  --canvas: #ffffff;
  --canvas-dark: #000000;
  --surface-soft: #f4f4f4;
  --surface-card: #ffffff;
  --surface-deep: #0a0a0a;
  --surface-elevated: #16181a;
  --hairline: #e2e2e7;
  --hairline-soft: #eef0f3;
  --hairline-dark: rgba(255, 255, 255, 0.12);
  --accent-teal: #00a87e;
  --accent-green-text: #006400;
  --accent-pink: #e61e49;
  --accent-danger: #e23b4a;
  --accent-deep-red: #8b0000;
  --accent-warning: #ec7e00;
  --accent-yellow: #b09000;
  --accent-light-blue: #007bc2;
  --accent-light-green: #428619;
  --accent-brown: #936d62;
  --link: #376cd5;
  --pos: var(--accent-teal);
  --neg: var(--accent-danger);
  --shadow-card: 0 12px 28px -16px rgba(5, 0, 56, 0.18);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 9999px;
  --s-xxs: 4px;
  --s-xs: 6px;
  --s-sm: 8px;
  --s-md: 14px;
  --s-lg: 16px;
  --s-xl: 24px;
  --s-xxl: 32px;
  --font-display: "Aeonik Pro", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  --font-body:    "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", "SF Mono", Menlo, "Courier New", monospace;
}
/* ── Dark mode overrides — toggle via body.dark class. Brand cobalt-violet primary stays
   the same; canvas/ink/surface tokens inverted with slightly elevated mid-tones so cards
   stand out. Pos/neg colors brightened for contrast on dark bg. ── */
body.dark {
  --ink: #f4f5f7;
  --body: #d6d9dd;
  --charcoal: #c9cdd2;
  --mute: #a3a8b0;
  --ash: #8d929a;
  --stone: #6f7480;
  --faint: #4a4f57;
  --canvas: #16181a;
  --surface-soft: #1f2226;
  --surface-card: #16181a;
  --surface-elevated: #2a2d31;
  --hairline: #2e3236;
  --hairline-soft: #25282c;
  --primary-deep: #6e74e8;
  --pos: #1ec887;
  --neg: #ff5466;
  --shadow-card: 0 12px 28px -16px rgba(0, 0, 0, 0.6);
}
/* Dark mode special-case rules — for elements that have hardcoded white/black colors. */
body.dark .stock-card,
body.dark .news-history-card,
body.dark .sip-card,
body.dark .scanx-section,
body.dark .panel,
body.dark .stock-header,
body.dark nav.topbar,
body.dark .cal-popup { background: var(--surface-card); }
body.dark th { background: var(--surface-card); color: var(--mute); }
body.dark td { color: var(--body); }
body.dark .sip-rank, body.dark .cal-btn { background: var(--surface-elevated); color: var(--ink); }
body.dark .copy-btn, body.dark .sip-copy-btn { background: var(--surface-elevated); color: var(--ink); }
body.dark .copy-btn:hover, body.dark .sip-copy-btn:hover { background: var(--primary); }
body.dark .subtab { background: var(--canvas); color: var(--mute); border-color: var(--hairline); }
body.dark .subtab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
body.dark .chart .bar-reported { fill: #e8eaed; }
body.dark .chart .col-highlight { fill: #ffffff; opacity: 0; }
body.dark .chart .col-highlight.active { opacity: 0.08; }
body.dark #chart-tooltip .ct-inner { background: rgba(245, 246, 248, 0.96); color: var(--ink); }
body.dark #chart-tooltip .ct-dot.rep { background: var(--ink); }
body.dark #chart-tooltip .ct-lbl { color: rgba(25, 28, 31, 0.65); }
body.dark #chart-tooltip .ct-val { color: var(--ink); }
body.dark #chart-tooltip .ct-q { color: rgba(25, 28, 31, 0.45); }
body.dark #chart-tooltip .ct-unit { color: rgba(25, 28, 31, 0.5); }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--canvas); color: var(--ink); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; font-optical-sizing: auto; }
/* Old <header> hero is hidden — using thin topbar instead */
header { display: none; }
/* ============================================================
   Topbar — single thin row: brand + nav links + date controls
   Figma-style — centered container, max 1440px
   ============================================================ */
nav.topbar {
  background: var(--canvas);
  border-bottom: 1px solid var(--hairline);
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  position: sticky;
  top: 0;
  /* Topmost in-page layer (5000) — must exceed every page-level dropdown so the topbar's
     own content (nav links, calendar button, search box inside the topbar on the Studies
     page) doesn't get covered by studies-search-results (1000), filter-popup (1500), or
     the .save-study-btn (2). Cal-popup at 9999 + image lightbox at 99998+ still sit on
     top of the topbar — intentional, those are full-page overlays. */
  z-index: 5000;
}
nav.topbar .topbar-inner {
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 1440px;
  margin: 0 auto;
  gap: 0;
}
nav.topbar .brand {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.6px;
  color: var(--ink);
  margin-right: 40px;
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
/* Logo mark — source image is black square + white textured S. CSS-inverted at render
   time (filter: invert(1)) so it displays as white square + black textured S, which feels
   cleaner against the light-mode canvas (the white square edges fade into the topbar,
   leaving the black S as a standalone mark). In dark mode we drop the filter so the
   original black-bg renders, fading the square into the dark topbar instead. */
nav.topbar .brand-logo {
  width: 32px; height: 32px;
  border-radius: 7px;
  object-fit: cover;
  display: block;
  filter: invert(1);
}
body.dark nav.topbar .brand-logo {
  filter: none;
}
nav.topbar .nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1 1 auto;
}
nav.topbar .nav-links a {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--charcoal);
  text-decoration: none;
  padding: 8px 14px;
  cursor: pointer;
  border-radius: var(--r-sm);
  border-bottom: none;
  margin-right: 0;
  letter-spacing: 0;
  line-height: 1.4;
  transition: background 0.12s, color 0.12s;
}
nav.topbar .nav-links a:hover { color: var(--ink); background: var(--surface-soft); }
nav.topbar .nav-links a.active { color: var(--ink); background: var(--surface-soft); font-weight: 600; }
nav.topbar .topbar-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
@media (max-width: 900px) {
  nav.topbar { padding: 0 16px; height: 56px; }
  nav.topbar .brand { font-size: 18px; margin-right: 16px; gap: 8px; }
  nav.topbar .brand-logo { width: 28px; height: 28px; border-radius: 6px; }
  nav.topbar .nav-links a { padding: 6px 10px; font-size: 13px; }
}

/* ═══════════════════════════════════════════════════════════════════
   📱 MOBILE — single block covering ≤768px (covers phones + small tablets in portrait).
   Designed mobile-first principles from ui-ux-pro-max-skill:
     • 16px min body text so iOS doesn't auto-zoom on inputs
     • 44×44pt min touch targets on tap-critical buttons
     • Nav becomes horizontal-scrollable (no hamburger) — preserves all routes in one tap
     • Stock header stacks vertically, pills wrap, price moves below symbol
     • Tables wrapped in scroll containers (overflow-x: auto + max-width)
     • Bottom safe-area padding for iPhone bottom gesture bar
     • No horizontal page scroll under any condition (overflow-x: hidden on body)
   Breakpoint = 768px because that's the iPad portrait boundary; below that we're in
   true phone territory, above it desktop layouts hold up just fine.
═══════════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* No horizontal page scroll — single most-common iOS layout bug */
  html, body { overflow-x: hidden; max-width: 100vw; }
  body { font-size: 15px; }

  /* ── Top navigation: scrollable horizontal strip ─────────────── */
  nav.topbar { height: auto; padding: 0; }
  nav.topbar .topbar-inner {
    flex-wrap: wrap; padding: 8px 14px; gap: 8px;
    align-items: center; row-gap: 8px;
  }
  nav.topbar .brand { font-size: 17px; margin-right: 4px; padding: 4px 0; }
  nav.topbar .nav-links {
    order: 3; flex: 1 0 100%; overflow-x: auto; gap: 4px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
    padding-bottom: 4px; margin-bottom: 2px;
  }
  nav.topbar .nav-links::-webkit-scrollbar { display: none; }
  nav.topbar .nav-links a {
    flex: 0 0 auto; padding: 8px 12px; font-size: 13px;
    min-height: 36px; display: inline-flex; align-items: center;
  }
  nav.topbar .topbar-right { gap: 6px; margin-left: auto; }
  .topbar-iconbtn { width: 36px; height: 36px; }
  .topbar-iconbtn svg { width: 18px; height: 18px; }
  .cal-btn { min-height: 36px; padding: 6px 12px; font-size: 13px; }

  /* ── Main content padding ─────────────────────────────────────── */
  main { padding: 14px 12px 32px; }
  /* iOS safe area for the bottom gesture bar */
  main { padding-bottom: max(32px, env(safe-area-inset-bottom)); }

  /* ── Page title / breadcrumb ──────────────────────────────────── */
  .page-title { font-size: 22px; margin: 4px 0 12px; }
  .breadcrumb { font-size: 13px; }

  /* ── Stock detail header: stack columns, wrap pills ───────────── */
  .stock-header {
    padding: 18px 16px; gap: 12px;
    flex-direction: column; align-items: stretch;
  }
  .stock-header .sym-big { font-size: 32px; line-height: 1.1; }
  .stock-header > div:first-of-type ~ div:last-of-type {
    margin-left: 0 !important; text-align: left !important;
  }
  /* Move the price/chg block to the top-right of the symbol row using a sub-grid */
  .stock-header { display: grid; grid-template-columns: 1fr auto; gap: 8px 12px; }
  .stock-header > .sym-big { grid-row: 1; grid-column: 1; }
  .stock-header > div:nth-of-type(2) { grid-column: 1 / -1; }       /* pills + name take full width */
  .stock-header > div:last-of-type {
    grid-row: 1; grid-column: 2; text-align: right !important; margin-left: 0 !important;
  }
  .stock-header .price { font-size: 24px; }
  .stock-header .chg { font-size: 13px; }
  .stock-header-tags { gap: 4px; }
  .stock-header-tags .tag { font-size: 11px; padding: 4px 8px; }
  .study-delete, #study-delete { top: 12px !important; right: 12px !important; }

  /* ── Section cards (Notes, MS table, YoY, news detail) ────────── */
  .stock-card { padding: 16px 14px; margin: 10px 0; border-radius: 12px; }
  .stock-card h3 { font-size: 15px; }
  .section-x { top: 10px; right: 10px; }

  /* ── Studies list ─────────────────────────────────────────────── */
  .studies-toolbar { flex-wrap: wrap; gap: 6px; }
  .studies-search-wrap { flex: 1 0 100%; max-width: none; order: 1; }
  .studies-toolbar .readonly-badge { order: 0; }
  .studies-btn { padding: 8px 12px; font-size: 12px; min-height: 36px; }
  #studies-export { margin-left: 0 !important; }
  .studies-grid, .sip-grid { grid-template-columns: 1fr !important; gap: 10px; }
  .study-card, .sip-card { padding: 14px; }

  /* ── Tables (Short Squeeze, Earnings, etc.) ─────────────────────
     Wrap any standalone <table> in horizontal scroll. Cell padding tightens. */
  .table-wrap, .ms-table-wrap, .sx-wrap, .earnings-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { font-size: 12px; }
  table th, table td { padding: 6px 8px !important; white-space: nowrap; }
  .ms-table th, .ms-table td { padding: 4px 6px !important; }
  .ms-cell-input { width: 48px !important; min-width: 48px; font-size: 11px; padding: 2px 4px; }

  /* ── Forward YoY block + MS table editable cells ──────────────── */
  .yoy-block { font-size: 12px; padding: 12px 14px; }
  .copy-btn { padding: 4px 10px; font-size: 11px; min-height: 30px; }

  /* ── Bar charts (already collapsing at 900px; tighten labels) ──── */
  .chart-wrap { gap: 10px; margin: 8px 0; }
  .chart-wrap h3 { font-size: 14px; }

  /* ── OHLCV modal: shrink chrome, full-width grid ───────────────── */
  .ohlcv-modal { width: calc(100vw - 24px); max-width: 420px; margin: 12px; }
  .ohlcv-modal-body { grid-template-columns: 1fr 1fr; gap: 8px; }
  .ohlcv-modal input, .ohlcv-modal label { font-size: 13px; }

  /* ── Calendar picker dropdown ──────────────────────────────────── */
  .cal-dropdown { left: 12px; right: 12px; max-width: calc(100vw - 24px); }

  /* ── Save-to-Studies button + sip-card buttons ─────────────────── */
  .save-study-btn { padding: 6px 12px; font-size: 11px; min-height: 32px; }
  .trade-pill { min-height: 32px; }

  /* ── Notion-style notes area ───────────────────────────────────── */
  .study-notes-rich { font-size: 15px; padding: 14px; min-height: 140px; }
  .study-notes-rich img { max-width: 100% !important; height: auto; }

  /* ── Inputs: prevent iOS zoom by keeping font ≥ 16px ───────────── */
  input[type="text"], input[type="number"], input[type="date"], textarea, [contenteditable="true"] {
    font-size: 16px;
  }

  /* ── Snackbar bottom-anchored, full-width ──────────────────────── */
  .snackbar { left: 12px; right: 12px; bottom: max(20px, env(safe-area-inset-bottom)); min-width: 0; }
}

/* ═══════════════════════════════════════════════════════════════════
   📱 TINY MOBILE (≤375px — iPhone SE / older Androids)
   Extra-tight density for the smallest screens.
═══════════════════════════════════════════════════════════════════ */
@media (max-width: 375px) {
  .stock-header .sym-big { font-size: 28px; }
  .stock-header .price { font-size: 20px; }
  nav.topbar .brand { font-size: 16px; }
  nav.topbar .nav-links a { padding: 6px 10px; font-size: 12px; }
  .studies-btn { padding: 7px 10px; }
  .page-title { font-size: 20px; }
}

/* ═══════════════════════════════════════════════════════════════════
   📱 TABLET portrait (769–1024px) — keep desktop layout but ease pad.
═══════════════════════════════════════════════════════════════════ */
@media (min-width: 769px) and (max-width: 1024px) {
  main { padding: 22px 22px; }
  .stock-header { padding: 22px 22px; }
  .sip-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
}
/* legacy .date-strip / .date-pill kept as no-op (old templates may still reference them) */
.date-strip, .date-pills { display: none; }
.cal-btn {
  padding: 6px 14px 6px 12px;
  background: var(--ink);
  color: #ffffff;
  border: none;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-body);
  transition: background 0.12s;
}
.cal-btn:hover { background: var(--charcoal); }
/* Topbar icon buttons — used for language + dark-mode toggles. Same pill geometry as cal-btn
   but transparent surface so they read as secondary controls. */
.topbar-iconbtn {
  width: 32px; height: 32px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-pill); border: 1px solid var(--hairline);
  background: transparent; color: var(--ink); cursor: pointer;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  transition: background 0.12s, border-color 0.12s, color 0.12s, transform 100ms ease;
}
.topbar-iconbtn:hover { background: var(--surface-soft); border-color: var(--ink); }
.topbar-iconbtn:active { transform: scale(0.94); }
.topbar-iconbtn svg { width: 16px; height: 16px; }

/* ── Studies page (personal SIP library backed by localStorage) ── */
.studies-toolbar { display: flex; gap: 8px; align-items: center; margin: 0 0 16px; }
.studies-btn {
  padding: 7px 14px; border-radius: var(--r-pill); background: var(--canvas); border: 1px solid var(--hairline);
  font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer; font-family: var(--font-body);
  transition: background 0.12s, border-color 0.12s;
}
.studies-btn:hover { background: var(--surface-soft); border-color: var(--ink); }
.studies-btn-danger { color: var(--neg); }
.studies-btn-danger:hover { background: rgba(226,59,74,0.06); border-color: var(--neg); }

/* ── Studies search box (typeahead for past-scan tickers + "Create new" fallback) ── */
/* IMPORTANT: parent toolbar gets z-index: 200 so the absolute-positioned results
   dropdown wins over every .sip-card below it (cards have position:relative which can
   create stacking contexts under certain transforms / filters). */
.studies-toolbar { position: relative; z-index: 200; }
.studies-search-wrap { position: relative; flex: 1; max-width: 340px; z-index: 201; }
.studies-search {
  width: 100%; padding: 8px 12px 8px 32px; border-radius: var(--r-pill);
  border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink);
  font-family: var(--font-body); font-size: 13px; outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
  background-repeat: no-repeat; background-position: 11px center;
}
.studies-search:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(73,79,223,0.08); }
.studies-search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 1000;
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-md);
  box-shadow: 0 12px 36px -8px rgba(15,15,25,0.14);
  max-height: 360px; overflow-y: auto; display: none;
  font-family: var(--font-body);
}
.studies-search-results.show { display: block; }
.studies-search-item {
  padding: 9px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--hairline-soft); transition: background 0.1s;
}
.studies-search-item:last-child { border-bottom: none; }
.studies-search-item:hover, .studies-search-item.active { background: var(--surface-soft); }
.studies-search-sym { font-family: var(--font-mono); font-weight: 700; color: var(--ink); font-size: 13px; min-width: 64px; }
.studies-search-meta { font-size: 11px; color: var(--mute); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.studies-search-date { font-family: var(--font-mono); font-size: 10px; color: var(--stone); letter-spacing: 0.3px; }
.studies-search-create {
  padding: 9px 14px; cursor: pointer; background: rgba(73,79,223,0.04);
  color: var(--primary); font-weight: 600; font-size: 13px;
  border-top: 1px solid var(--hairline);
  display: flex; align-items: center; gap: 8px;
}
.studies-search-create:hover { background: rgba(73,79,223,0.10); }
.studies-search-empty { padding: 18px; text-align: center; color: var(--mute); font-size: 12px; }
/* Section dividers in the search dropdown — "已存在的研究" / "過去的掃描資料". */
.studies-search-section-header {
  padding: 8px 14px 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--stone); background: var(--canvas);
  border-bottom: 1px solid var(--hairline);
}

/* Filter button (next to search) — funnel icon + active-count badge */
.studies-filter-btn {
  position: relative; display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: var(--r-pill);
  background: var(--canvas); border: 1px solid var(--hairline);
  font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer;
  font-family: var(--font-body); transition: background 0.12s, border-color 0.12s;
}
.studies-filter-btn:hover { background: var(--surface-soft); border-color: var(--ink); }
.studies-filter-btn.active { background: rgba(73,79,223,0.08); border-color: var(--primary); color: var(--primary); }
.studies-filter-btn svg { width: 14px; height: 14px; }
.studies-filter-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--primary); color: #fff;
  border-radius: 9px; font-size: 11px; font-weight: 700; font-family: var(--font-mono);
}

/* Filter popup — same patterns as the catalyst-type-popup but wider */
.studies-filter-popup {
  position: absolute; z-index: 1500;
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-md);
  box-shadow: 0 14px 40px -10px rgba(15,15,25,0.18);
  width: 280px; padding: 10px; font-family: var(--font-body);
}
.studies-filter-popup .sf-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 700; color: var(--mute);
  text-transform: uppercase; letter-spacing: 0.6px;
  padding: 2px 4px 8px; border-bottom: 1px solid var(--hairline-soft); margin-bottom: 6px;
}
.studies-filter-popup .sf-clear {
  background: transparent; border: none; cursor: pointer;
  color: var(--neg); font-size: 11px; font-weight: 600;
  padding: 2px 6px; border-radius: var(--r-sm);
}
.studies-filter-popup .sf-clear:hover { background: rgba(226,59,74,0.08); }
.studies-filter-popup .sf-clear:disabled { color: var(--stone); cursor: default; background: transparent; }
.studies-filter-popup .sf-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; cursor: pointer; border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink);
}
.studies-filter-popup .sf-option:hover { background: var(--surface-soft); }
.studies-filter-popup .sf-option.checked { background: rgba(73,79,223,0.06); }
.studies-filter-popup .sf-option.checked::after { content: '✓'; margin-left: auto; color: var(--primary); font-weight: 700; }
.studies-filter-popup .sf-count { margin-left: auto; color: var(--stone); font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
.studies-filter-popup .sf-option.checked .sf-count { display: none; }
.studies-filter-popup .sf-empty { padding: 18px; text-align: center; color: var(--mute); font-size: 12px; }
.studies-filter-popup .sf-section-label {
  padding: 8px 10px 4px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.7px; color: var(--stone);
}
.studies-filter-popup .sf-section-label:first-child { padding-top: 2px; }

/* Sort popup rows — 3 grouped sort dimensions (Date / Added / Symbol). Each row toggles
   direction via the arrow on the right; active row gets a primary-tinted background +
   highlighted arrow. dir-desc shows down-chevron; dir-asc rotates it 180° for up-chevron. */
.studies-filter-popup.sort-popup .sort-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; cursor: pointer; border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink);
  transition: background 0.10s;
}
.studies-filter-popup.sort-popup .sort-row:hover { background: var(--surface-soft); }
.studies-filter-popup.sort-popup .sort-row.active {
  background: rgba(73,79,223,0.10); color: var(--primary-deep);
}
.studies-filter-popup.sort-popup .sort-label { flex: 1 1 auto; font-weight: 600; }
.studies-filter-popup.sort-popup .sort-dir {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500; color: var(--mute);
  font-family: var(--font-body);
}
.studies-filter-popup.sort-popup .sort-row.active .sort-dir { color: var(--primary); font-weight: 600; }
.studies-filter-popup.sort-popup .sort-dir-icon {
  width: 13px; height: 13px;
  transition: transform 0.15s, opacity 0.12s;
  opacity: 0.45;
}
.studies-filter-popup.sort-popup .sort-row.active .sort-dir-icon { opacity: 1; }
.studies-filter-popup.sort-popup .sort-row:hover .sort-dir-icon { opacity: 0.85; }
.studies-filter-popup.sort-popup .sort-row.dir-asc .sort-dir-icon { transform: rotate(180deg); }

/* Placeholder badge shown on studies awaiting /SIPs data fill */
.placeholder-badge {
  display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
  color: #b97c00; background: rgba(255,178,30,0.14); border: 1px solid rgba(255,178,30,0.4);
  border-radius: var(--r-pill); margin-left: 8px; text-transform: uppercase;
  font-family: var(--font-body);
}
body.dark .placeholder-badge { color: #ffce6a; background: rgba(255,206,106,0.10); border-color: rgba(255,206,106,0.35); }

/* Editable price cell in study header — click anywhere on the price to edit */
.price.price-editable { cursor: pointer; position: relative; transition: background 0.12s; border-radius: var(--r-sm); padding: 2px 6px; margin: -2px -6px; }
.price.price-editable:hover { background: var(--surface-soft); }
.price-edit-input {
  font-family: var(--font-mono); font-weight: 700; font-size: 22px; color: var(--ink);
  background: var(--canvas); border: 1.5px solid var(--primary); border-radius: var(--r-sm);
  padding: 2px 6px; width: 120px; outline: none; text-align: right;
}
body.readonly-mode .price.price-editable { cursor: default; }
body.readonly-mode .price.price-editable:hover { background: transparent; }

/* ── Read-only mode (hosted GitHub Pages — no sidecar) ──
   Studies are a "personal backup viewable on phone/other devices" — view but don't edit.
   The .readonly-mode body class is toggled in detectSidecar() once on boot. */
body.readonly-mode .ro-hide { display: none !important; }
body.readonly-mode [contenteditable="true"] { background: var(--surface-soft); cursor: not-allowed; }
body.readonly-mode .studies-btn,
body.readonly-mode .study-remove,
body.readonly-mode .notes-img-del,
body.readonly-mode .section-x,
body.readonly-mode .copy-btn,
body.readonly-mode .trade-pill,
body.readonly-mode .ms-edit input { pointer-events: none; opacity: 0.55; }
body.readonly-mode .studies-btn-danger { display: none !important; }
.readonly-badge {
  display: none; align-items: center; gap: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600;
  border-radius: var(--r-pill); background: rgba(255, 178, 30, 0.12); color: #b97c00;
  border: 1px solid rgba(255, 178, 30, 0.4); font-family: var(--font-body); letter-spacing: 0.2px;
}
body.dark .readonly-badge { color: #ffce6a; background: rgba(255, 206, 106, 0.10); border-color: rgba(255, 206, 106, 0.35); }
body.readonly-mode .readonly-badge { display: inline-flex; }
.studies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 12px; }
.study-card {
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg);
  padding: 18px 20px; display: flex; flex-direction: column; gap: 10px;
}
.study-card-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.study-sym { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--ink); text-decoration: none; letter-spacing: -0.5px; }
.study-sym:hover { color: var(--primary); }
.study-saved-on { font-size: 11px; color: var(--stone); margin-left: auto; font-family: var(--font-mono); }
.study-remove { background: transparent; border: none; color: var(--mute); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: var(--r-sm); }
.study-remove:hover { color: var(--neg); background: rgba(226,59,74,0.08); }
.study-name { font-size: 13px; color: var(--mute); }
.study-catalyst { font-size: 13px; color: var(--body); line-height: 1.6; padding: 8px 10px; background: var(--surface-soft); border-radius: var(--r-sm); }
.study-rationale { font-size: 13px; color: var(--ink); line-height: 1.65; padding: 10px 12px; background: rgba(73,79,223,0.04); border-left: 3px solid var(--primary); border-radius: var(--r-sm); }
.study-fields { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.study-field { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--stone); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.study-field input { padding: 6px 10px; border: 1px solid var(--hairline); border-radius: var(--r-sm); background: var(--canvas); color: var(--ink); font-family: var(--font-mono); font-size: 13px; width: 100px; }
.study-field input[type="range"] { padding: 0; width: 110px; accent-color: var(--primary); }
.study-tags, .study-notes {
  padding: 8px 12px; border: 1px solid var(--hairline); border-radius: var(--r-sm);
  background: var(--canvas); color: var(--ink); font-family: var(--font-body); font-size: 13px;
  width: 100%; box-sizing: border-box; resize: vertical;
}
.study-tags:focus, .study-notes:focus { outline: none; border-color: var(--primary); }

/* "Save to Studies" button. Two layouts depending on parent:
   • SIP cards / study cards: absolute-positioned in the top-right corner of the card.
   • Stock-detail breadcrumb: normal flex item, sits next to the breadcrumb text,
     well clear of the price block in the .stock-header below. */
.save-study-btn {
  position: absolute; top: 14px; right: 16px; padding: 5px 12px;
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-pill);
  font-size: 11px; font-weight: 600; color: var(--mute); cursor: pointer;
  font-family: var(--font-body); transition: background 0.12s, color 0.12s, border-color 0.12s;
  z-index: 2; white-space: nowrap;
}
.save-study-btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
.save-study-btn.saved { background: rgba(0,168,126,0.10); color: var(--pos); border-color: var(--pos); }
/* Breadcrumb-context overrides: drop absolute positioning so the flex layout in
   .study-detail-breadcrumb (justify-content: space-between) cleanly right-aligns it. */
.study-detail-breadcrumb .save-study-btn {
  position: static; top: auto; right: auto; flex-shrink: 0;
}
body.readonly-mode .save-study-btn { display: none !important; }

/* ── OHLCV row + intraday chip ── */
.study-section-label {
  font-size: 11px; color: var(--stone); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px;
  display: flex; align-items: center; gap: 10px;
}
.study-intraday {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: var(--r-pill); background: var(--surface-soft);
}
.study-intraday.pos { color: var(--pos); }
.study-intraday.neg { color: var(--neg); }
.study-ohlcv-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.study-ohlcv-field { display: flex; flex-direction: column; gap: 3px; font-size: 10px; color: var(--stone); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.study-ohlcv-field input {
  padding: 5px 8px; border: 1px solid var(--hairline); border-radius: var(--r-sm);
  background: var(--canvas); color: var(--ink); font-family: var(--font-mono); font-size: 12px;
}
.study-ohlcv-field input:focus { outline: none; border-color: var(--primary); }
@media (max-width: 700px) { .study-ohlcv-row { grid-template-columns: repeat(3, 1fr); } }

/* Lightbox overlay for click-to-enlarge any image in the notes block */
.shot-lightbox {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.88);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  z-index: 99999; cursor: zoom-out; padding: 40px;
}
.shot-lightbox img { max-width: 95vw; max-height: 88vh; box-shadow: 0 24px 64px rgba(0,0,0,0.5); border-radius: var(--r-sm); }
.shot-lightbox .shot-caption { color: rgba(255,255,255,0.85); margin-top: 12px; font-family: var(--font-mono); font-size: 13px; }

/* ── Undo snackbar (bottom-center, 10s auto-dismiss) ── */
.undo-snackbar {
  position: fixed; left: 50%; bottom: 24px;
  transform: translate(-50%, 24px); opacity: 0;
  display: flex; align-items: center; gap: 16px;
  padding: 12px 18px 12px 20px;
  background: rgba(25, 28, 31, 0.96); color: #fff;
  border-radius: var(--r-pill); box-shadow: 0 20px 48px -8px rgba(0,0,0,0.4);
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  z-index: 99998; pointer-events: none;
  transition: opacity 200ms ease-out, transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
}
.undo-snackbar.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
.undo-snackbar .undo-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.30);
  color: #fff; padding: 5px 14px; border-radius: var(--r-pill);
  font-weight: 600; cursor: pointer; font-family: var(--font-body); font-size: 13px;
}
.undo-snackbar .undo-btn:hover { background: rgba(255,255,255,0.10); border-color: #fff; }
body.dark .undo-snackbar { background: rgba(245, 246, 248, 0.96); color: var(--ink); }
body.dark .undo-snackbar .undo-btn { border-color: rgba(25,28,31,0.30); color: var(--ink); }

/* ── Study list preview cards ──
   460px minimum keeps two columns on standard 1280px+ displays. The compact
   read-only MS table inside the card maxes out around 380-420px wide. */
.studies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 16px; }
.study-saved-on {
  font-family: var(--font-mono); font-size: 10px; color: var(--stone);
  text-transform: uppercase; letter-spacing: 0.4px; margin-left: 8px;
}
.study-preview-del {
  position: absolute; top: 12px; right: 14px;
  width: 24px; height: 24px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent; border-radius: 50%;
  color: var(--mute); font-size: 12px; cursor: pointer; opacity: 0;
  transition: opacity 0.12s, color 0.12s, background 0.12s, border-color 0.12s;
  z-index: 3;
}
.sip-card:hover .study-preview-del { opacity: 1; }
.study-preview-del:hover { color: var(--neg); background: rgba(226,59,74,0.10); border-color: rgba(226,59,74,0.30); }
.study-potential, .study-intraday {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: var(--r-pill); background: var(--surface-soft);
}
.study-potential.pos, .study-intraday.pos { color: var(--pos); background: rgba(0, 168, 126, 0.10); }
.study-potential.neg, .study-intraday.neg { color: var(--neg); background: rgba(226, 59, 74, 0.10); }

/* Mini MS table embedded inside preview cards — narrower than the detail-page one,
   uses the same .ms-table base styles but tightens cell padding + font for density. */
.sip-card .ms-table-wrap { margin: 10px 0 0; }
.sip-card .ms-table { font-size: 11px; }
.sip-card .ms-table th, .sip-card .ms-table td { padding: 3px 6px; }
.sip-card .ms-cell-input { width: 50px; font-size: 11px; padding: 2px 4px; }
.sip-card .ms-rowlabel { font-size: 10px; }
.sip-card .ms-est-tag { font-size: 8px; padding: 1px 3px; }
.sip-card .ms-pre-section-divider { padding: 4px 0 0; font-size: 10px; color: var(--mute); margin-top: 8px; border-top: 1px solid var(--hairline-soft); }

/* Editable Vol — same click-to-edit pattern as price */
.vol-editable {
  cursor: pointer; border-radius: var(--r-sm); padding: 1px 4px; margin: -1px -4px;
  transition: background 0.12s; display: inline-block;
}
.vol-editable:hover { background: var(--surface-soft); }
.vol-edit-input {
  font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--ink);
  background: var(--canvas); border: 1.5px solid var(--primary); border-radius: var(--r-sm);
  padding: 1px 4px; width: 80px; outline: none; text-align: right;
}
body.readonly-mode .vol-editable { cursor: default; }
body.readonly-mode .vol-editable:hover { background: transparent; }

/* Delete button on study detail — lives in the breadcrumb row (OUTSIDE the stock-header
   box), so it never overlaps the price column or any header content. Small icon-only with
   "Delete" label, hover turns red. */
.study-delete-outer {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; font-size: 12px; font-weight: 600;
  background: transparent; color: var(--mute); border: 1px solid var(--hairline);
  border-radius: var(--r-pill); cursor: pointer;
  font-family: var(--font-body);
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.study-delete-outer:hover { color: var(--neg); background: rgba(226,59,74,0.08); border-color: rgba(226,59,74,0.40); }
.study-delete-outer svg { width: 14px; height: 14px; }
.study-detail-breadcrumb { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.study-detail-date {
  font-family: var(--font-mono); font-size: 12px; color: var(--stone);
  font-weight: 500; letter-spacing: 0.3px;
}
/* Date pill in the Study-detail breadcrumb — fully custom calendar popup (no native
   <input type=date>). The native picker had two unsolvable problems: it briefly flashed
   the OS dark theme before our color-scheme applied, and the popup popup itself couldn't
   be fully styled to match our design system. The replacement is a button that opens our
   own .study-detail-cal-popup, which reuses the topbar calendar's .cal-day/.cal-grid
   styles for a cohesive look. */
.study-detail-date-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 12px;
  font-weight: 500; letter-spacing: 0.3px;
  color: var(--stone);
  background: transparent; border: 1px solid transparent;
  border-radius: var(--r-sm);
  padding: 3px 8px; margin: -2px 0;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.study-detail-date-btn:hover { background: var(--canvas); border-color: var(--hairline); color: var(--ink); }
.study-detail-date-btn.open { background: var(--canvas); border-color: var(--primary); color: var(--ink); }
.study-detail-date-btn svg { width: 11px; height: 11px; opacity: 0.55; transition: opacity 0.12s; flex: 0 0 11px; }
.study-detail-date-btn:hover svg, .study-detail-date-btn.open svg { opacity: 1; }
body.readonly-mode .study-detail-date-btn { pointer-events: none; opacity: 0.6; }
/* Custom calendar popup — fixed position so it escapes any ancestor stacking context.
   Reuses the topbar calendar's .cal-header / .cal-grid / .cal-day rules (defined further
   down in this file) for a single source of truth on the calendar's visual language. */
.study-detail-cal-popup {
  position: fixed; z-index: 10000;
  background: var(--canvas); border: 1px solid var(--hairline);
  border-radius: var(--r-md); padding: 16px; width: 280px;
  box-shadow: 0 12px 32px -6px rgba(0,0,0,0.15);
  display: none;
  font-family: var(--font-body);
}
.study-detail-cal-popup.open { display: block; }
/* "Today" cell — subtle ring around today's date for orientation. Doesn't conflict with
   .active (currently-selected date gets the solid purple fill) or .has-data (researched
   dates get the soft purple tint background). */
.study-detail-cal-popup .cal-day.today:not(.active) {
  box-shadow: inset 0 0 0 1px var(--primary);
}
/* "Future" cells — slightly muted but still clickable (user might want to pre-create a
   study for an upcoming earnings event). */
.study-detail-cal-popup .cal-day.future { color: var(--stone); opacity: 0.55; }
.study-detail-cal-popup .cal-day.future:hover { opacity: 1; }

/* Research-dates chip — shows next to the date input when a study has 2+ dated snapshots.
   Clicking opens a small popup of all researched dates with a 1-line catalyst preview, so
   the user can jump between (e.g.) CRCL @ 5/15 ↔ CRCL @ 4/30 without manually typing dates. */
.research-dates-chip {
  display: inline-flex; align-items: center; gap: 4px;
  margin-left: 6px; padding: 3px 8px;
  background: var(--surface-soft); color: var(--mute);
  border: 1px solid var(--hairline); border-radius: var(--r-pill);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.research-dates-chip:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
.research-dates-chip[aria-expanded="true"] { background: var(--primary); color: #fff; border-color: var(--primary); }
.research-dates-chip svg { opacity: 0.7; }
.research-dates-chip:hover svg, .research-dates-chip[aria-expanded="true"] svg { opacity: 1; }

/* position:fixed so the popup escapes every ancestor stacking context (the study-detail
   page sits inside #app which sits below nav.topbar at z-index 5000 — without fixed the
   popup got trapped under the topbar). z-index 10000 keeps it above the topbar AND below
   the image lightbox (99999). */
.research-dates-popup {
  position: fixed; z-index: 10000;
  background: var(--canvas); border: 1px solid var(--hairline);
  border-radius: var(--r-md); padding: 6px;
  min-width: 280px; max-width: 360px;
  box-shadow: 0 12px 32px -6px rgba(0,0,0,0.15);
  display: none;
  /* overflow: hidden trims any child that would extend past the rounded edge — the
     delete button at the right side of each row would otherwise poke past the popup
     when its hover/icon-padding stacked beyond the inner content width. */
  overflow: hidden; box-sizing: border-box;
}
.research-dates-popup.open { display: block; }
.research-date-item {
  display: flex; align-items: baseline; gap: 12px;
  width: 100%; padding: 8px 12px;
  background: transparent; border: none; border-radius: var(--r-sm);
  text-align: left; cursor: pointer; font-family: var(--font-body);
  color: var(--ink); transition: background 0.10s;
}
.research-date-item:hover { background: var(--surface-soft); }
.research-date-item.active { background: rgba(73, 79, 223, 0.10); color: var(--primary-deep); }
.research-date-item .rd-date {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  flex: 0 0 auto; letter-spacing: 0.3px;
}
.research-date-item .rd-preview {
  font-size: 11px; color: var(--stone); flex: 1 1 auto;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.research-date-item .rd-preview.rd-blank { color: var(--stone); opacity: 0.6; font-style: italic; }
/* Per-date row: wraps the selection button + the delete button. Hovering the row reveals
   the delete on the right; non-hover state hides it to keep the popup clean. */
.research-date-row {
  display: flex; align-items: stretch;
  border-radius: var(--r-sm);
  transition: background 0.10s;
  /* Row spans the popup's inner content (popup padding: 6px). min-width: 0 lets the
     flex children shrink past their min-content size if the catalyst preview is long. */
  min-width: 0;
}
.research-date-row .research-date-item {
  flex: 1 1 auto; border-radius: 0;
  /* Trim the right padding when the row has a delete button next to it so the catalyst
     text and the trash icon can comfortably share the row width without overflow. */
  padding-right: 4px; min-width: 0;
}
.research-date-row.active { background: rgba(73, 79, 223, 0.10); }
.research-date-row.active .research-date-item { background: transparent; color: var(--primary-deep); }
.research-date-del {
  flex: 0 0 26px;
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; margin: auto 4px auto 0;   /* vertically center, hug right edge with small breather */
  padding: 0;
  background: transparent; border: none; cursor: pointer;
  color: var(--stone); opacity: 0; transition: opacity 0.12s, color 0.12s, background 0.12s;
  border-radius: var(--r-sm);
}
.research-date-row:hover .research-date-del { opacity: 1; }
.research-date-del:hover { color: var(--neg); background: rgba(226,59,74,0.10); }
body.readonly-mode .research-date-del { display: none !important; }
body.readonly-mode .research-dates-chip { pointer-events: none; opacity: 0.5; }
body.readonly-mode .study-delete-outer { display: none !important; }

/* Custom catalyst types — Notion-style multi-select pills */
.catalyst-types-row { display: inline-flex; gap: 4px; flex-wrap: wrap; align-items: center; }
/* Catalyst pills — match the SIP-page .tag-earnings aesthetic: bold body-font text on a
   solid tinted background, no border, low text-transform so the label reads naturally.
   Padding split: 4px 4px 4px 11px so the inline X stays balanced when present. */
.catalyst-type-pill {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 4px 4px 11px;
  font-size: 11px; font-weight: 700; border-radius: var(--r-pill);
  font-family: var(--font-body); letter-spacing: 0.2px;
  background: var(--surface-soft); color: var(--ink); border: none;
  transition: filter 0.12s;
}
.catalyst-type-pill[data-action="edit-cat-type"] { cursor: pointer; }
.catalyst-type-pill[data-action="edit-cat-type"]:hover { filter: brightness(0.95); }
body.dark .catalyst-type-pill[data-action="edit-cat-type"]:hover { filter: brightness(1.15); }
.catalyst-type-pill .pill-label { display: inline-block; }
.catalyst-type-pill .pill-x {
  background: rgba(0,0,0,0.06); border: none; cursor: pointer;
  width: 16px; height: 16px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--mute); border-radius: 50%; line-height: 1;
  margin-left: 2px;
  transition: background 0.12s, color 0.12s;
}
.catalyst-type-pill .pill-x:hover { color: #fff; background: var(--neg); }
body.dark .catalyst-type-pill .pill-x { background: rgba(255,255,255,0.08); }
.catalyst-type-add {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  border-radius: var(--r-pill); background: transparent; border: 1px dashed var(--hairline);
  color: var(--mute); font-family: var(--font-body);
}
.catalyst-type-add:hover { color: var(--primary); border-color: var(--primary); }

/* Catalyst-type palette — solid pastel tint + bold deep-tone text. Selectors are compound
   (.catalyst-type-pill.cat-type-*) to beat `.tag`'s base background/color rules, which are
   declared later in the file with equal single-class specificity. Without the compound
   selector .tag wins via cascade order and all the pills render grey. */
.catalyst-type-pill.cat-type-earnings      { background: rgba(73, 79, 223, 0.14);  color: var(--primary-deep); }
.catalyst-type-pill.cat-type-momentum      { background: rgba(255, 178, 30, 0.18); color: #8a5800; }
.catalyst-type-pill.cat-type-fda           { background: rgba(0, 168, 126, 0.16);  color: #008060; }
.catalyst-type-pill.cat-type-ma            { background: rgba(226, 59, 74, 0.14);  color: #b03040; }
.catalyst-type-pill.cat-type-contract      { background: rgba(94, 158, 214, 0.18); color: #1e5d8e; }
.catalyst-type-pill.cat-type-technical     { background: rgba(160, 100, 220, 0.16);color: #5928a3; }
.catalyst-type-pill.cat-type-fbo           { background: rgba(255, 105, 100, 0.16);color: #b53b3b; }
.catalyst-type-pill.cat-type-short-squeeze { background: rgba(255, 140, 0, 0.18);  color: #8a4500; }
.catalyst-type-pill.cat-type-sips          { background: rgba(38, 165, 198, 0.18); color: #0e6e89; }
.catalyst-type-pill.cat-type-ep            { background: rgba(228, 90, 170, 0.16); color: #a8336d; }
.catalyst-type-pill.cat-type-dep           { background: rgba(160, 130, 95, 0.18); color: #6b4e23; }
body.dark .catalyst-type-pill.cat-type-earnings      { color: #a5a9ff; }
body.dark .catalyst-type-pill.cat-type-momentum,
body.dark .catalyst-type-pill.cat-type-short-squeeze { color: #ffce6a; }
body.dark .catalyst-type-pill.cat-type-fda           { color: #56e4b3; }
body.dark .catalyst-type-pill.cat-type-ma,
body.dark .catalyst-type-pill.cat-type-fbo           { color: #ff9a96; }
body.dark .catalyst-type-pill.cat-type-contract      { color: #6dc0ff; }
body.dark .catalyst-type-pill.cat-type-technical     { color: #c7a4ff; }
body.dark .catalyst-type-pill.cat-type-sips          { color: #7ed3ec; }
body.dark .catalyst-type-pill.cat-type-ep            { color: #ff9bcd; }
body.dark .catalyst-type-pill.cat-type-dep           { color: #d9bf94; }

/* Multi-select popup (Notion-style) */
.catalyst-type-popup {
  position: absolute; top: calc(100% + 8px); left: 0; z-index: 1500;
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-md);
  box-shadow: 0 14px 40px -10px rgba(15,15,25,0.18);
  width: 240px; padding: 8px; font-family: var(--font-body);
}
.catalyst-type-popup input.cat-search {
  width: 100%; padding: 6px 10px; border-radius: var(--r-sm);
  border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink);
  font-size: 13px; outline: none; margin-bottom: 6px;
}
.catalyst-type-popup input.cat-search:focus { border-color: var(--primary); }
.catalyst-type-popup .cat-option {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; cursor: pointer; border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink);
}
.catalyst-type-popup .cat-option:hover { background: var(--surface-soft); }
.catalyst-type-popup .cat-option.selected::after { content: '✓'; margin-left: auto; color: var(--pos); padding-left: 4px; }
/* × on every option (preset or custom) — clicking forgets the type from the dropdown list.
   Always visible (not hover-only) so it's discoverable. */
.catalyst-type-popup .cat-option { padding-right: 6px; }
.catalyst-type-popup .cat-forget-x {
  margin-left: auto; width: 22px; height: 22px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent; cursor: pointer;
  color: var(--stone); font-size: 14px; line-height: 1;
  border-radius: 50%; opacity: 0.65;
  transition: opacity 0.12s, color 0.12s, background 0.12s, border-color 0.12s;
}
.catalyst-type-popup .cat-option:hover .cat-forget-x { opacity: 1; }
.catalyst-type-popup .cat-forget-x:hover {
  color: #fff; background: var(--neg); border-color: var(--neg); opacity: 1;
}
.catalyst-type-popup .cat-option.selected .cat-forget-x { display: none; }
.catalyst-type-popup .cat-create {
  padding: 6px 10px; cursor: pointer; border-radius: var(--r-sm);
  font-size: 12px; color: var(--primary); font-weight: 600;
  border-top: 1px solid var(--hairline-soft); margin-top: 4px; padding-top: 8px;
}
.catalyst-type-popup .cat-create:hover { background: rgba(73,79,223,0.06); }
.catalyst-type-popup .cat-popup-foot { border-top: 1px solid var(--hairline-soft); margin-top: 6px; padding-top: 6px; }
.catalyst-type-popup .cat-reset {
  width: 100%; padding: 6px 10px; cursor: pointer;
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--mute); font-size: 12px; font-weight: 600; font-family: var(--font-body);
  text-align: left;
}
.catalyst-type-popup .cat-reset:hover { color: var(--neg); background: rgba(226,59,74,0.06); border-color: rgba(226,59,74,0.30); }

/* Quarter switcher (on the study detail page, above the MS table) */
.quarter-switcher-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 8px; font-family: var(--font-body); font-size: 12px;
}
.quarter-switcher-row .qs-label { color: var(--mute); font-weight: 600; }
.quarter-switcher-row select.qs-select {
  padding: 4px 8px; border-radius: var(--r-sm);
  border: 1px solid var(--hairline); background: var(--canvas); color: var(--ink);
  font-family: var(--font-mono); font-size: 12px; font-weight: 600; cursor: pointer;
}
.quarter-switcher-row select.qs-select:focus { outline: none; border-color: var(--primary); }
.quarter-switcher-row .qs-hint { font-size: 11px; color: var(--stone); margin-left: auto; }

/* Study detail re-uses .stock-header from the original stock detail page. The only addition
   is the .stock-header-trade pill row (defined above) and per-section X (below). */

/* Trade pills — small inline pills in the stock-header row (Gain / Stop). Clickable to open OHLCV popup. */
.stock-header-trade { margin-top: 4px; }
.trade-pill { cursor: pointer; }
.trade-pill:hover { box-shadow: 0 0 0 2px rgba(73, 79, 223, 0.12); }
.trade-pill span { font-family: var(--font-mono); margin-left: 6px; font-weight: 700; }

/* Section X — appears top-right of each .study-section card on hover */
.study-section { position: relative; }
.section-x {
  position: absolute; top: 14px; right: 16px;
  width: 24px; height: 24px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent; border-radius: 50%;
  color: var(--mute); font-size: 14px; cursor: pointer; opacity: 0;
  transition: opacity 0.12s, color 0.12s, background 0.12s, border-color 0.12s;
  z-index: 3;
}
.study-section:hover .section-x { opacity: 1; }
.section-x:hover { color: var(--neg); background: rgba(226,59,74,0.10); border-color: rgba(226,59,74,0.30); }

/* Right-click context menu for restoring hidden sections */
.study-ctx-menu {
  position: fixed; min-width: 200px;
  background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-md);
  box-shadow: 0 24px 48px -8px rgba(0, 0, 0, 0.18);
  padding: 6px; z-index: 9999;
  font-family: var(--font-body); font-size: 13px;
}
.study-ctx-menu-title { padding: 8px 12px 6px; font-size: 11px; color: var(--stone); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 700; }
.study-ctx-menu-item {
  display: block; width: 100%; padding: 8px 12px;
  background: transparent; border: none; text-align: left;
  color: var(--ink); cursor: pointer; border-radius: var(--r-sm);
}
.study-ctx-menu-item:hover { background: var(--surface-soft); color: var(--primary); }

/* OHLCV popup modal — opens on metric chip click. Centered, click-outside dismisses. */
.ohlcv-modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.40);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; opacity: 0; transition: opacity 160ms ease-out;
  cursor: pointer;
}
.ohlcv-modal-overlay.show { opacity: 1; }
.ohlcv-modal {
  background: var(--canvas); border-radius: var(--r-lg);
  padding: 0; min-width: 360px; max-width: 92vw;
  box-shadow: 0 32px 80px -16px rgba(0,0,0,0.30);
  cursor: default;
  transform: scale(0.96); transition: transform 180ms cubic-bezier(0.16, 1, 0.3, 1);
}
.ohlcv-modal-overlay.show .ohlcv-modal { transform: scale(1); }
.ohlcv-modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 22px; border-bottom: 1px solid var(--hairline);
}
.ohlcv-modal-head h3 { margin: 0; font-family: var(--font-display); font-size: 16px; }
.ohlcv-modal-close {
  width: 30px; height: 30px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: none; color: var(--mute);
  font-size: 22px; cursor: pointer; border-radius: 50%;
}
.ohlcv-modal-close:hover { background: var(--surface-soft); color: var(--ink); }
.ohlcv-modal-body {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  padding: 22px;
}
.ohlcv-modal-body .study-ohlcv-field input {
  padding: 8px 12px; font-size: 14px;
}
.ohlcv-modal-foot {
  padding: 14px 22px; border-top: 1px solid var(--hairline);
  display: flex; justify-content: flex-end;
}
/* Long/Short direction toggle at top of OHLCV modal — drives Gain/Stop column anchors. */
.ohlcv-direction-row {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 22px 4px;
}
.ohlcv-direction-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--mute);
}
.ohlcv-direction-toggle {
  display: inline-flex; gap: 4px; padding: 3px;
  background: var(--surface-soft); border-radius: var(--r-pill);
}
.ohlcv-direction-toggle .dir-btn {
  padding: 5px 14px; border: none; cursor: pointer;
  background: transparent; color: var(--mute);
  font-size: 12px; font-weight: 700; font-family: var(--font-body); letter-spacing: 0.3px;
  border-radius: var(--r-pill);
  transition: background 0.12s, color 0.12s, box-shadow 0.12s;
}
.ohlcv-direction-toggle .dir-btn:hover { color: var(--ink); }
.ohlcv-direction-toggle .dir-btn.active { background: var(--canvas); color: var(--ink); box-shadow: 0 1px 4px rgba(15,15,25,0.06); }
.ohlcv-direction-toggle .dir-btn[data-direction="long"].active  { color: var(--pos); }
.ohlcv-direction-toggle .dir-btn[data-direction="short"].active { color: var(--neg); }

/* Header chg readout — gap + move stacked vertically (one line each), vol on its own line.
   Label stays muted/grey; the % value picks up green/red from the row's pos/neg class.
   !important on the value-colour rules so .chg or .stock-header text-color overrides can't
   beat them (this trapped the colour before — gap stayed grey when it should have been red). */
.chg-readout { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; font-family: var(--font-mono); margin: 4px 0 2px; }
.chg-cell {
  font-size: 13px; font-weight: 600; letter-spacing: 0.2px;
  display: inline-flex; align-items: baseline; gap: 6px;
}
.chg-cell .chg-label {
  color: var(--mute) !important; font-weight: 500; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.chg-cell .gap-pct, .chg-cell .move-pct, .chg-cell .day-pct {
  font-family: var(--font-mono); font-weight: 700; font-size: 14px;
  color: var(--mute);   /* fallback when value is null / no pos/neg class */
}
.chg-cell.pos .gap-pct, .chg-cell.pos .move-pct, .chg-cell.pos .day-pct { color: var(--pos) !important; }
.chg-cell.neg .gap-pct, .chg-cell.neg .move-pct, .chg-cell.neg .day-pct { color: var(--neg) !important; }
/* Vol readout — matches gap/move/day visual hierarchy (uppercase muted label + bold ink value).
   !important on label/value colours so nothing in the surrounding .stock-header / .vol-editable
   inheritance chain can override them. */
.vol-readout {
  font-family: var(--font-mono); margin-top: 2px;
  display: inline-flex; align-items: baseline; gap: 6px; justify-content: flex-end;
  color: var(--ink);
}
.vol-readout .vol-label, .vol-readout .chg-label {
  color: var(--mute) !important; font-weight: 500; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.vol-readout .vol-editable { color: var(--ink); }
.vol-readout .vol-editable .vol-text {
  font-weight: 700 !important; font-size: 14px !important; color: var(--ink) !important;
}

/* Trade pills (LONG/SHORT, Gain, Stop) — buttons that need to LOOK identical to the
   surrounding span-based .stat-tag pills. Kill the UA <button> defaults: border, native
   font, focus outline, etc. Match .stock-header-tags .stat-tag's 11px / mono / 4×10 / 600. */
button.trade-pill {
  border: none !important;           /* nukes the ~2px UA default border */
  outline: none;
  font-family: var(--font-mono) !important;
  font-size: 11px !important;
  padding: 4px 10px !important;
  font-weight: 600;
  letter-spacing: 0.1px;
  text-transform: none;
  cursor: pointer;
  line-height: 1.4;
  border-radius: var(--r-pill);
}
button.trade-pill:focus-visible { box-shadow: 0 0 0 2px rgba(73,79,223,0.30); }
/* Gain / Stop pos/neg tints inherit from .stat-tag.pos / .stat-tag.neg via the markup —
   nothing more to add for them, they already match Short Float / EPS Surp etc. */
/* Direction pill (LONG / SHORT) — solid green/red tint backgrounds (stronger than other pills)
   so the trade direction reads at a glance. Bold uppercase. */
.trade-pill.direction-pill { font-weight: 700; letter-spacing: 0.6px; }
.trade-pill.direction-pill.pos { background: rgba(0, 168, 126, 0.22) !important; color: var(--pos) !important; }
.trade-pill.direction-pill.neg { background: rgba(226, 59, 74, 0.22) !important; color: var(--neg) !important; }
body.dark .trade-pill.direction-pill.pos { background: rgba(30, 200, 135, 0.20) !important; color: #56e4b3 !important; }
body.dark .trade-pill.direction-pill.neg { background: rgba(255, 84, 102, 0.22) !important; color: #ff9a96 !important; }

/* gap + move stack on preview cards — same vertical layout as detail-page header. */
.sip-card .sip-chg-row { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; margin: 4px 0 10px; font-family: var(--font-mono); }
.sip-card .chg-cell { font-size: 12px; font-weight: 600; display: inline-flex; gap: 6px; align-items: baseline; }
.sip-card .chg-cell .chg-label { color: var(--mute) !important; font-weight: 500; font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; }
.sip-card .chg-cell .gap-pct, .sip-card .chg-cell .move-pct, .sip-card .chg-cell .day-pct { font-weight: 700; font-size: 13px; }
.sip-card .chg-cell.pos .gap-pct, .sip-card .chg-cell.pos .move-pct, .sip-card .chg-cell.pos .day-pct { color: var(--pos) !important; }
.sip-card .chg-cell.neg .gap-pct, .sip-card .chg-cell.neg .move-pct, .sip-card .chg-cell.neg .day-pct { color: var(--neg) !important; }

/* Editable MS table — cells become flat-styled inputs that look like cells until focused.
   text-align: right + tabular-nums right-aligns numbers cleanly across cells.
   We hide the browser-default number-input spinner buttons (-webkit-spin / -moz appearance)
   so the right edge is flush — without this, the spinner eats ~12px on the right and
   shorter numbers like "1.53" look indented vs longer ones like "10270". */
.ms-table-editable .ms-cell-input {
  width: 100%; min-width: 0;
  padding: 2px 6px; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  font-size: 12px; text-align: right;
  background: transparent; color: inherit;
  border: 1px solid transparent; border-radius: var(--r-sm);
  outline: none;
  -moz-appearance: textfield;
  appearance: textfield;
}
.ms-table-editable .ms-cell-input::-webkit-outer-spin-button,
.ms-table-editable .ms-cell-input::-webkit-inner-spin-button {
  -webkit-appearance: none; margin: 0;
}
.ms-table-editable .ms-cell-input:hover { background: var(--canvas); border-color: var(--hairline); }
.ms-table-editable .ms-cell-input:focus { background: var(--canvas); border-color: var(--primary); }
.ms-table-editable .ms-estimate .ms-cell-input { color: var(--mute); }
/* Computed YoY/Surprise cells (td[data-computed]) inherit .ms-table td's text-align:right
   but the inner <span class="pos/neg"> has its own background pill — keep that flush right
   too by setting a small right padding on the span itself. */
.ms-table-editable td[data-computed] { text-align: right; padding-right: 8px !important; }
.ms-table-editable td[data-computed] > span { display: inline-block; min-width: 3.5em; text-align: right; }

/* Notion-style rich notes — contenteditable with inline image embeds */
.study-notes-rich {
  min-height: 200px; padding: 16px 18px;
  border: 1px solid var(--hairline); border-radius: var(--r-sm);
  background: var(--canvas); color: var(--ink); font-family: var(--font-body);
  font-size: 14px; line-height: 1.7;
  transition: border-color 0.12s;
}
.study-notes-rich:focus { outline: none; border-color: var(--primary); }
.study-notes-rich.drag-over { border-color: var(--primary); border-style: dashed; background: rgba(73, 79, 223, 0.04); }
.study-notes-rich:empty:before { content: attr(data-placeholder); color: var(--stone); pointer-events: none; }
.study-notes-rich img {
  max-width: 100%; height: auto;
  border-radius: var(--r-sm); display: block;
  background: var(--surface-soft);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  transition: transform 0.15s;
}
.study-notes-rich img:hover { transform: scale(1.005); }
.study-notes-rich p { margin: 0 0 12px; }
.study-notes-rich p:last-child { margin-bottom: 0; }
/* Inline image wrap — positions the delete X in the top-right corner on hover */
.notes-img-wrap {
  display: inline-block; position: relative; margin: 12px 0;
  max-width: 100%;
}
.notes-img-wrap img { margin: 0; }
.notes-img-del {
  position: absolute; top: 6px; right: 6px;
  width: 24px; height: 24px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(25, 28, 31, 0.85); color: #fff;
  border: none; border-radius: 50%; font-size: 16px; line-height: 1;
  cursor: pointer; opacity: 0;
  transition: opacity 0.12s, background 0.12s;
}
.notes-img-wrap:hover .notes-img-del { opacity: 1; }
.notes-img-del:hover { background: var(--neg); }
.cal-btn svg { width: 13px; height: 13px; }

.panel { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 0; overflow: hidden; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: var(--canvas); padding: 14px 14px; text-align: left; border-bottom: 1px solid var(--hairline); cursor: pointer; user-select: none; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--stone); font-family: var(--font-body); }

.tag-earnings  { background: rgba(73, 79, 223, 0.10); color: var(--primary-deep); }

.scanx-section { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); padding: 24px 28px; margin-bottom: 16px; }

/* News-detail source links — small pill row at the bottom of the news-detail card listing

.news-detail-edit {

.news-detail-edit:empty:before { content: attr(data-placeholder); color: var(--stone); pointer-events: none; font-style: italic; }

/* Bold text inside the news body — used for emphasized facts the /update-studies skill
   writes via **markdown**. Both contexts (.news-detail in the /stock/ page and
   .news-detail-edit in study-detail) get the same treatment. */
.news-detail strong, .news-detail-edit strong { font-weight: 700; color: var(--ink); }
.news-detail b, .news-detail-edit b { font-weight: 700; color: var(--ink); }
/* Markdown blockquote — used by /update-studies for warnings like the rewind disclaimer

  border-left: 3px solid var(--primary);

.news-detail .news-blockquote strong, .news-detail-edit .news-blockquote strong { color: var(--ink); }
.news-detail-placeholder { color: var(--stone); font-style: italic; padding: 12px 0 0; font-size: 13px; }
.news-detail-meta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: var(--r-pill);
  background: var(--surface-soft); color: var(--mute);

/* Company News history (thefly-style) */
.news-history-card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); margin-bottom: 16px; }

.news-item .news-body { flex: 1 1 auto; }

.news-item .news-meta .time svg { width: 11px; height: 11px; opacity: 0.7; }
.news-item .news-expand { display: none; }   /* expand chevron retired — news-full always visible */
