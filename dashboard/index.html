/* ═══════════ Studies (localStorage-backed personal library) ═══════════
   Schema in localStorage key 'sips-studies':
     [{ symbol, savedAt: ISO, snapshot: {chgPct, catalyst, tv, sessions, ...},
        notes: "...", tags: ["..."], targetPrice: number|null, stopLoss: number|null,
        conviction: 1-5 (default 3) }, ...]
   Studies are user-owned data, not synced to GitHub — Export/Import JSON button gives
   manual cross-device portability. */
const STUDIES_KEY = 'sips-studies';
/* ── IndexedDB image store ────────────────────────────────────────────
   localStorage caps at ~5 MB per origin (small for screenshots). IndexedDB
   has no practical cap on modern browsers — typically 50% of free disk.
   Screenshots get stored here keyed by uuid; the study metadata in
   localStorage holds the key (not the data) so the JSON stays small.
   API:  await putImg(key, dataUrl) / await getImg(key) / await delImg(key)
   ─────────────────────────────────────────────────────────────────── */
const IMG_DB_NAME = 'sips-images';
const IMG_STORE = 'images';
let __imgDB = null;
function openImgDB() {
  if (__imgDB) return Promise.resolve(__imgDB);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IMG_DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IMG_STORE);
    req.onsuccess = () => { __imgDB = req.result; resolve(__imgDB); };
    req.onerror = () => reject(req.error);
  });
}
async function putImg(key, dataUrl) {
  const db = await openImgDB();
  await new Promise((resolve, reject) => {
    const tx = db.transaction(IMG_STORE, 'readwrite');
    tx.objectStore(IMG_STORE).put(dataUrl, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
  // Write through to sidecar disk so /SIPs Phase 11 commit picks it up.
  if (STATE.sidecar.available) {
    try {
      const r = await fetch('/api/studies/image', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ key, dataUrl }),
      });
      if (r.ok) {
        const info = await r.json();
        // Keep client-side index in sync so getImg can serve from disk if IDB ever clears.
        if (info && info.path) {
          STATE.imgIndex = STATE.imgIndex || {};
          STATE.imgIndex[key] = info.path.replace(/^studies\/images\//, '');
        }
      }
    } catch (e) { console.warn('[sidecar] putImg failed', e); }
  }
}
async function getImg(key) {
  // 1. IDB (fast path — everything we wrote locally lands here).
  const db = await openImgDB();
  const idbHit = await new Promise((resolve, reject) => {
    const tx = db.transaction(IMG_STORE, 'readonly');
    const req = tx.objectStore(IMG_STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
  if (idbHit) return idbHit;
  // 2. Fall back to disk-served image (covers read-only hosted + post-IDB-clear cases).
  //    Returns the URL string — the caller uses it as <img src>.
  if (STATE.imgIndex && STATE.imgIndex[key]) {
    return `studies/images/${STATE.imgIndex[key]}`;
  }
  // 3. Last-ditch extension probe (only the formats we save).
  for (const ext of ['png', 'jpg', 'webp', 'gif']) {
    try {
      const r = await fetch(`studies/images/${key}.${ext}`, {method: 'HEAD'});
      if (r.ok) return `studies/images/${key}.${ext}`;
    } catch (_) {}
  }
  return null;
}
async function delImg(key) {
  const db = await openImgDB();
  await new Promise((resolve, reject) => {
    const tx = db.transaction(IMG_STORE, 'readwrite');
    tx.objectStore(IMG_STORE).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
  if (STATE.sidecar.available) {
    try {
      await fetch(`/api/studies/image/${encodeURIComponent(key)}`, {method: 'DELETE'});
      if (STATE.imgIndex) delete STATE.imgIndex[key];
    } catch (e) { console.warn('[sidecar] delImg failed', e); }
  }
}
async function getAllImgs() {
  const db = await openImgDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IMG_STORE, 'readonly');
    const store = tx.objectStore(IMG_STORE);
    const out = {};
    const req = store.openCursor();
    req.onsuccess = e => {
      const cur = e.target.result;
      if (cur) { out[cur.key] = cur.value; cur.continue(); }
      else resolve(out);
    };
    req.onerror = () => reject(req.error);
  });
}
function uuid() {
  // Compact 12-char uuid suffix — collision-free enough for per-user image keys.
  return 'img-' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
}

// Auto-downscale large screenshots before storage. Max 1600px on long edge, JPEG 0.88 quality.
// Keeps 4K screenshots under ~400 KB without losing legibility for chart annotations.
function downscaleImage(file, maxDim = 1600, quality = 0.88) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxDim || h > maxDim) {
          const scale = maxDim / Math.max(w, h);
          w = Math.round(w * scale); h = Math.round(h * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // PNG → JPEG (massive size reduction). Keep PNG only if image is small + has transparency hints.
        const useJpeg = file.size > 200 * 1024 || file.type === 'image/jpeg';
        resolve(canvas.toDataURL(useJpeg ? 'image/jpeg' : 'image/png', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function loadStudies() {
  try {
    const arr = JSON.parse(localStorage.getItem(STUDIES_KEY) || '[]');
    if (!Array.isArray(arr)) return [];
    // Backfill missing `id` field for legacy studies (created before duplicate-ticker support).
    // For those, id = symbol so old URLs `#/study/FIG` still resolve. New saves get a unique
    // id of form `${sym}-${base36Timestamp}${randomSuffix}`.
    let mutated = false;
    arr.forEach(st => {
      if (st && !st.id) { st.id = st.symbol; mutated = true; }
      // Migration: every study gets a datedSnapshots map keyed by ISO date. The flat
      // st.snapshot + st.ohlcv represent the CURRENTLY ACTIVE date's view; datedSnapshots
      // is the archive of all previously-researched dates. Switching the date pill swaps
      // entries in/out of the active slot. New studies start with one entry (the date they
      // were saved on). See migrateStudyToDated() for the migration logic.
      if (st && !st.datedSnapshots) { migrateStudyToDated(st); mutated = true; }
    });
    if (mutated) localStorage.setItem(STUDIES_KEY, JSON.stringify(arr));
    return arr;
  } catch { return []; }
}
// Fields that are DATE-BOUND — they describe a specific dated research session and live
// inside datedSnapshots[d] per slot. Anything else (id, symbol, conviction, target/stop,
// intent, price, screenshots, savedAt, tags) is study-level and persists across dates.
//
// newsDetail (top-level) is here because the news-detail contenteditable writes to it
// directly as HTML — separate from snapshot.newsDetail which holds the /SIPs-auto-fill
// plain-text/markdown version. Both are date-bound: snapshot.newsDetail mirrors via the
// snapshot field, study.newsDetail (the user's HTML override) mirrors via this entry.
const DATE_BOUND_FIELDS = ['snapshot', 'ohlcv', 'hiddenSections', 'notes', 'customTypes', 'customChart', 'focusQuarterIdx', 'newsDetail'];
// One-shot migration: take a study with flat date-bound fields (legacy schema) and seed
// its datedSnapshots map with one entry keyed by the current ohlcv.date. After this,
// st.datedSnapshots always exists, and the flat fields are the "active view" mirroring
// datedSnapshots[currentDate]. Each dated slot stores all date-bound fields together so
// switching dates restores the full per-date context — snapshot, ohlcv, hiddenSections,
// notes, customTypes, customChart, focusQuarterIdx.
// Idempotent: no-op if datedSnapshots already present.
function migrateStudyToDated(st) {
  if (!st || st.datedSnapshots) return st;
  const key = (st.ohlcv && st.ohlcv.date) || (st.snapshot && st.snapshot.scanDate) || '';
  if (!key) { st.datedSnapshots = {}; return st; }
  st.datedSnapshots = {
    [key]: buildDatedSlot(st),
  };
  return st;
}
// Pluck the date-bound subset out of a study object into a slot. Used by migration +
// archive-on-date-change + updateStudy auto-mirror.
function buildDatedSlot(st) {
  return {
    snapshot: { ...(st.snapshot || {}) },
    ohlcv: { ...(st.ohlcv || {}) },
    hiddenSections: [...(st.hiddenSections || [])],
    notes: st.notes || '',
    customTypes: [...(st.customTypes || [])],
    customChart: st.customChart ? { ...st.customChart } : null,
    focusQuarterIdx: (st.focusQuarterIdx != null) ? st.focusQuarterIdx : null,
    newsDetail: st.newsDetail || null,
  };
}
// List the dates a study has researched data for, sorted newest first. Used for the
// "researched dates" dropdown on the study-detail breadcrumb. Filters out blank
// placeholder slots — only dates with real research data show in the chip + popup.
function listResearchedDates(st) {
  if (!st || !st.datedSnapshots) return [];
  return Object.keys(st.datedSnapshots)
    .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
    .filter(d => hasResearchData(st.datedSnapshots[d]))
    .sort()
    .reverse();
}
// Does this dated slot contain real research (vs. an empty placeholder)?
// "Research" = any meaningful user action on this date: catalyst written, news fetched,
// TV scrape filled, OHLCV bar present, notes written, or custom tags applied. ANY of
// these counts the date as something worth archiving.
function hasResearchData(slot) {
  if (!slot) return false;
  const s = slot.snapshot || {};
  const o = slot.ohlcv || {};
  if (s.newsDetail || s.catalyst || s.tv) return true;
  if (o.open != null || o.close != null) return true;
  if (slot.notes && String(slot.notes).trim()) return true;
  // customTypes counts as research ONLY when the user has diverged from the system
  // default. Switching to a fresh date pre-seeds ['earnings'] so /update-studies knows
  // to run the TV scrape next time — that alone shouldn't mark the date as researched.
  // Counts as research if: 2+ tags, OR a single tag that isn't 'earnings'.
  if (Array.isArray(slot.customTypes)) {
    const ct = slot.customTypes;
    if (ct.length >= 2) return true;
    if (ct.length === 1 && String(ct[0]).toLowerCase() !== 'earnings') return true;
  }
  // The user's HTML newsDetail override counts as research data too — typing into the
  // News Detail card on a fresh date should bump the chip count immediately.
  if (slot.newsDetail && String(slot.newsDetail).trim()) return true;
  return false;
}
// Generate a unique-ish id keyed off symbol + time. Base36 timestamps are short and sortable.
function genStudyId(sym) {
  return `${sym}-${Date.now().toString(36)}${Math.random().toString(36).slice(2, 5)}`;
}
// Debounced POST to /api/studies/save so rapid keystrokes (notes typing, OHLCV editing,
// etc.) coalesce into one disk write per ~600 ms. Latest payload wins.
let __studiesFlushTimer = null;
let __studiesFlushPending = null;
async function postStudiesToDisk(arr) {
  if (!STATE.sidecar.available) return;
  try {
    await fetch('/api/studies/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(arr),
    });
  } catch (e) { console.warn('[sidecar] saveStudies failed', e); }
}
function flushStudiesSoon(arr) {
  __studiesFlushPending = arr;
  if (__studiesFlushTimer) return;
  __studiesFlushTimer = setTimeout(() => {
    const payload = __studiesFlushPending;
    __studiesFlushTimer = null;
    __studiesFlushPending = null;
    postStudiesToDisk(payload);
  }, 600);
}
function saveStudies(arr) {
  // localStorage is always written immediately for snappy UI + offline fallback.
  localStorage.setItem(STUDIES_KEY, JSON.stringify(arr));
  // Then flush to disk via sidecar (no-op in read-only hosted mode).
  flushStudiesSoon(arr);
}
// `isStudySaved` is now scan-date-aware: returns true if there's a study for this symbol
// captured on STATE.date (the current SIP scan). A different-date study with the same
// symbol doesn't count — the Save button should still light up for THIS scan.
function isStudySaved(sym, scanDate) {
  const sd = scanDate || STATE.date;
  return loadStudies().some(st => st.symbol === sym && (st.snapshot?.scanDate || '') === sd);
}
function addStudy(stock, opts = {}) {
  const arr = loadStudies();
  const scanDate = opts.scanDate || STATE.date || '';
  // Build the snapshot + ohlcv for this scan day (reused by both code paths below).
  const snapshot = {
    name: stock.name,
    type: stock.type,
    chgPct: stock.chgPct,
    last: stock.last,
    catalyst: stock.catalyst,
    catalyst_en: stock.catalyst_en,
    tv: stock.tv,
    sessions: stock.sessions,
    shortFloat: stock.shortFloat,
    shortRatio: stock.shortRatio,
    marketCap_M: stock.marketCap_M,
    claudeRationale: stock._claudeRationale,
    claudeRationale_en: stock._claudeRationale_en,
    claudeIntent: stock._claudeIntent,
    newsDetail: stock.newsDetail,
    scanDate,
  };
  // Daily OHLCV — auto-filled from stock.prevOhlcv (if /SIPs ran the prev-day fetch),
  // otherwise blank for user to enter via the popup modal. `prev_close` drives the day's
  // %Chg derivation: (close − prev_close) / prev_close · 100.
  // The `date` field ALWAYS falls back to scanDate — that's the canonical trading day
  // the study is anchored to. Leaving date="" when prevOhlcv is missing caused the
  // breadcrumb to display today's date instead of the scan day (ONDS-5/14 bug).
  const ohlcv = stock.prevOhlcv && typeof stock.prevOhlcv === 'object'
    ? { date: stock.prevOhlcv.date || scanDate || '', open: stock.prevOhlcv.open ?? null, high: stock.prevOhlcv.high ?? null, low: stock.prevOhlcv.low ?? null, close: stock.prevOhlcv.close ?? null, prev_close: stock.prevOhlcv.prev_close ?? null, volume: stock.prevOhlcv.volume ?? null }
    : { date: scanDate || '', open: null, high: null, low: null, close: null, prev_close: null, volume: null };
  // Multiple studies per symbol ARE allowed by design — each represents a separate
  // research session (e.g. shorting the gap-up reversal vs. longing the breakout, or
  // different catalysts on different days). What we DON'T want is to lose prior
  // research when creating a new study for an already-researched symbol. So we
  // inherit datedSnapshots / newsDetail / catalyst from the most-recent existing
  // study for the same symbol. The user can edit the new study independently
  // (changes don't sync back to the source), but they start with the existing
  // research baseline. Fixed 2026-05-18 per user feedback.
  //
  // Light dedupe still applies: if THIS exact (symbol, scanDate) was just saved
  // and opts.force is not set, return that study's id (prevents accidental dupes
  // from the SIP-card "Save to Studies" being double-clicked). force=true bypasses.
  if (!opts.force) {
    const sameKey = arr.find(st => st.symbol === stock.symbol && (st.snapshot?.scanDate || '') === scanDate);
    if (sameKey) return sameKey.id;
  }
  // Find newest existing study for this symbol → seed inherited data.
  const existing = arr.filter(st => st.symbol === stock.symbol)
                      .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''))[0];
  const inheritedDatedSnapshots = existing?.datedSnapshots ? JSON.parse(JSON.stringify(existing.datedSnapshots)) : {};
  // Inherit news / catalyst from existing if the incoming stock doesn't already have it.
  if (existing?.snapshot) {
    if (!snapshot.newsDetail && existing.snapshot.newsDetail) snapshot.newsDetail = existing.snapshot.newsDetail;
    if (!snapshot.catalyst   && existing.snapshot.catalyst)   snapshot.catalyst   = existing.snapshot.catalyst;
    if (!snapshot.catalyst_en && existing.snapshot.catalyst_en) snapshot.catalyst_en = existing.snapshot.catalyst_en;
  }
  // Make sure this scan's snapshot is reflected in datedSnapshots so calendar shows it.
  if (scanDate && !inheritedDatedSnapshots[scanDate]) {
    inheritedDatedSnapshots[scanDate] = {
      snapshot: { ...snapshot },
      ohlcv:    { ...ohlcv },
      customTypes: [],
      hiddenSections: [],
      notes: '',
    };
  }
  const newId = genStudyId(stock.symbol);
  arr.push({
    id: newId,
    symbol: stock.symbol,
    savedAt: new Date().toISOString(),
    snapshot,
    notes: '',
    tags: [],
    targetPrice: null,
    stopLoss: null,
    conviction: 3,
    ohlcv,
    datedSnapshots: inheritedDatedSnapshots,
    // Screenshots — array of { id, label, caption, imgKey }. Image data lives in IndexedDB.
    screenshots: [],
  });
  saveStudies(arr);
  return newId;       // caller can use the new study's id (e.g. to navigate / scroll-to / highlight)
}

// Manually create a placeholder study for a ticker that isn't in any past scan yet.
// All chart/MS/YoY sections start hidden — the page shows only "News Detail" + "Notes"
// until next /SIPs run picks up the ticker and build_dashboard.py backfills the snapshot.
// Validates `sym` so we don't end up with junk like "  Apple Inc  " in the studies file.
function addManualStudy(rawSym) {
  const sym = String(rawSym || '').toUpperCase().trim().replace(/[^A-Z0-9.\-]/g, '');
  if (!sym || !/^[A-Z][A-Z0-9.\-]{0,7}$/.test(sym)) {
    alert(`Invalid ticker: "${rawSym}". Expected 1–8 letters/digits, starting with a letter.`);
    return null;
  }
  // Multiple manual studies per symbol allowed — but inherit research data
  // (newsDetail, datedSnapshots, catalyst) from the newest existing study for the
  // same symbol so the user doesn't lose their prior work. The new placeholder
  // study is independent (editing it doesn't sync back), but starts pre-filled.
  // Fixed 2026-05-18 per user feedback.
  const arr = loadStudies();
  const existingNewest = arr.filter(st => st.symbol === sym)
                            .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''))[0];
  const inheritedDatedSnapshots = existingNewest?.datedSnapshots
    ? JSON.parse(JSON.stringify(existingNewest.datedSnapshots)) : {};
  const inheritedNews = existingNewest?.snapshot?.newsDetail || '';
  const inheritedCatalyst = existingNewest?.snapshot?.catalyst || '';
  const inheritedCustomTypes = existingNewest?.customTypes ? [...existingNewest.customTypes] : ['earnings'];
  const inheritedHidden = existingNewest && (existingNewest.snapshot?.tv || existingNewest.snapshot?.newsDetail)
    ? []   // existing has real data → don't hide anything in the new one
    : ['eps_chart', 'rev_chart', 'ms_table', 'yoy_block'];
  const newId = genStudyId(sym);
  // Build the new snapshot — inheriting newsDetail / catalyst from the previous
  // same-symbol study if one exists (so the user doesn't lose research when adding
  // another entry). Placeholder flag is dropped if the inherited data is real.
  const hasInheritedData = !!(inheritedNews || inheritedCatalyst || existingNewest?.snapshot?.tv);
  const inheritedTv = existingNewest?.snapshot?.tv || null;
  arr.push({
    id: newId,
    symbol: sym,
    savedAt: new Date().toISOString(),
    snapshot: {
      name: existingNewest?.snapshot?.name || '',
      type: existingNewest?.snapshot?.type || 'momentum',
      chgPct: null, last: null,
      catalyst: inheritedCatalyst,
      catalyst_en: existingNewest?.snapshot?.catalyst_en || '',
      tv: inheritedTv,
      sessions: existingNewest?.snapshot?.sessions || [],
      shortFloat: null, shortRatio: null, marketCap_M: null,
      claudeRationale: '', claudeIntent: null,
      newsDetail: inheritedNews,
      scanDate: STATE.date || '',
      ...(hasInheritedData ? {} : { _placeholder: true }),
    },
    notes: '', tags: [], targetPrice: null, stopLoss: null, conviction: 3,
    ohlcv: { date: '', open: null, high: null, low: null, close: null, prev_close: null, volume: null },
    datedSnapshots: inheritedDatedSnapshots,
    screenshots: [],
    // Hidden sections — if existing same-symbol study has real data, expose all;
    // otherwise hide chart/MS/YoY sections (this is a placeholder).
    hiddenSections: inheritedHidden,
    // Catalyst tag inherited from existing same-symbol study; defaults to 'earnings'
    // for first-time placeholder creates (matches user's most-common workflow).
    customTypes: inheritedCustomTypes,
  });
  saveStudies(arr);
  return newId;
}
async function removeStudy(id) {
  // Full wipe — the entire study object (notes, ohlcv, customChart, screenshots, tags,
  // conviction, …) goes when the user removes a ticker. Re-adding via "Save to Studies"
  // builds a fresh record from the current SIP snapshot — no residue from the prior session.
  // (The snackbar undo restores everything from the cached snapshot, including customChart.)
  const st = loadStudies().find(s => s.id === id);
  if (st?.screenshots?.length) {
    for (const ss of st.screenshots) { try { await delImg(ss.imgKey); } catch {} }
  }
  saveStudies(loadStudies().filter(st => st.id !== id));
}
function updateStudy(id, patch) {
  const arr = loadStudies();
  const idx = arr.findIndex(st => st.id === id);
  if (idx === -1) return;
  const next = { ...arr[idx], ...patch };
  // Auto-sync ALL date-bound fields into datedSnapshots[currentDate] whenever the patch
  // touches any of them. Date-bound = anything that describes a specific dated research
  // session (snapshot, ohlcv, hiddenSections, notes, customTypes, customChart, focus
  // quarter). The flat fields stay as the "active view" + the archive mirrors them.
  const touchesDated = DATE_BOUND_FIELDS.some(f => Object.prototype.hasOwnProperty.call(patch, f));
  if (next.datedSnapshots && touchesDated) {
    const d = next.ohlcv && next.ohlcv.date;
    if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
      const slotPreview = buildDatedSlot(next);
      if (hasResearchData(slotPreview)) {
        next.datedSnapshots = {
          ...next.datedSnapshots,
          [d]: slotPreview,
        };
      } else {
        // Blank placeholder — drop any stale archive entry so cycling through dates
        // doesn't leave breadcrumbs. The next mirror with real data recreates it.
        if (next.datedSnapshots[d]) {
          const cleaned = { ...next.datedSnapshots };
          delete cleaned[d];
          next.datedSnapshots = cleaned;
        }
      }
    }
  }
  arr[idx] = next;
  saveStudies(arr);
  // Fire a custom event so the study-detail page's chip / popup can refresh in place
  // without a full re-render. This is what makes the chip count tick up to "2" the
  // moment the user types content or adds a tag on a fresh date — no need to switch
  // away and back. Listener in renderStudyDetail subscribes via AbortController so the
  // hook auto-disposes on route change.
  try { document.dispatchEvent(new CustomEvent('study-data-changed', { detail: { id, fields: Object.keys(patch) } })); }
  catch (e) { /* CustomEvent not supported on ancient browsers — ignore */ }
}

        return a.label.localeCompare(b.label);
      });
      // Direction section — sentinels `__long` / `__short` AND'd with tag filters.
      const longChecked  = STUDIES_FILTER.has('__long');
      const shortChecked = STUDIES_FILTER.has('__short');
      const directionHtml = `
        <div class="sf-section-label">Direction</div>
        <div class="sf-option ${longChecked ? 'checked' : ''}" data-key="__long">
          <span class="tag direction-pill pos" style="font-weight:700;letter-spacing:0.6px;padding:1px 8px;font-size:11px;pointer-events:none;background:rgba(0,168,126,0.10);color:var(--pos)">LONG</span>
          <span class="sf-count">${longCount}</span>
        </div>
        <div class="sf-option ${shortChecked ? 'checked' : ''}" data-key="__short">
          <span class="tag direction-pill neg" style="font-weight:700;letter-spacing:0.6px;padding:1px 8px;font-size:11px;pointer-events:none;background:rgba(226,59,74,0.10);color:var(--neg)">SHORT</span>
          <span class="sf-count">${shortCount}</span>
        </div>
        <div class="sf-section-label" style="margin-top:8px">Catalyst tag</div>
      `;
      if (!all.length) return directionHtml + '<div class="sf-empty">No tags yet — save a few studies first.</div>';
      const tagHtml = all.map(p => {
        const isChecked = STUDIES_FILTER.has(p.label);
        const n = tagCounts.get(p.label) || 0;
        return `<div class="sf-option ${isChecked ? 'checked' : ''}" data-key="${escapeHtml(p.label)}">
          <span class="tag catalyst-type-pill ${p.cls}" style="padding:1px 8px;font-size:11px;pointer-events:none">${escapeHtml(p.label)}</span>
          <span class="sf-count">${n}</span>
        </div>`;
      }).join('');
      return directionHtml + tagHtml;
    };
    pop.innerHTML = `
      <div class="sf-head">
        <span>Filter by tag</span>
        <button class="sf-clear" type="button" ${STUDIES_FILTER.size ? '' : 'disabled'}>Clear all</button>
      </div>
      <div class="sf-options-host">${renderFilterOptions()}</div>
    `;
    document.body.appendChild(pop);
    // Click an option → toggle inclusion
    pop.querySelector('.sf-options-host').addEventListener('click', ev => {
      const opt = ev.target.closest('.sf-option');
      if (!opt) return;
      ev.preventDefault(); ev.stopPropagation();
      const key = opt.dataset.key;
      if (STUDIES_FILTER.has(key)) STUDIES_FILTER.delete(key);
      else STUDIES_FILTER.add(key);
      pop.querySelector('.sf-options-host').innerHTML = renderFilterOptions();
      pop.querySelector('.sf-clear').disabled = STUDIES_FILTER.size === 0;
      renderStudies();
      // After renderStudies, the popup gets re-anchored. Re-position to match the new button.
      const newBtn = document.getElementById('studies-filter-btn');
      if (newBtn) {
        const r = newBtn.getBoundingClientRect();
        pop.style.top = `${r.bottom + 6}px`;
        pop.style.left = `${Math.min(r.left, window.innerWidth - 296)}px`;
      }
    });
    pop.querySelector('.sf-clear').addEventListener('click', ev => {
      ev.preventDefault(); ev.stopPropagation();
      STUDIES_FILTER.clear();
      pop.querySelector('.sf-options-host').innerHTML = renderFilterOptions();
      pop.querySelector('.sf-clear').disabled = true;
      renderStudies();
      const newBtn = document.getElementById('studies-filter-btn');
      if (newBtn) {
        const r = newBtn.getBoundingClientRect();
        pop.style.top = `${r.bottom + 6}px`;
        pop.style.left = `${Math.min(r.left, window.innerWidth - 296)}px`;
      }
    });
    // Close on outside click
    setTimeout(() => {
      const onDocClick = (ev) => {
        const btnNow = document.getElementById('studies-filter-btn');
        if (!pop.contains(ev.target) && !(btnNow && btnNow.contains(ev.target))) {
          pop.remove();
          document.removeEventListener('click', onDocClick);
        }
      };
      document.addEventListener('click', onDocClick);
    }, 0);
  });

  // ── Sort button — opens a small popup of sort options, reuses .studies-filter-popup styling ──
  document.getElementById('studies-sort-btn')?.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    // Toggle own popup if already open.
    const ownPopup = document.querySelector('.studies-filter-popup.sort-popup');
    if (ownPopup) { ownPopup.remove(); return; }
    // Close the filter popup (the OTHER popup using the shared class) if it's open, so
    // only one popup is visible at a time — symmetric with the filter button's behavior.
    document.querySelector('.studies-filter-popup:not(.sort-popup)')?.remove();
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'studies-filter-popup sort-popup';
    pop.style.position = 'fixed';
    pop.style.top = `${rect.bottom + 6}px`;
    pop.style.left = `${Math.min(rect.left, window.innerWidth - 256)}px`;
    pop.style.zIndex = '1500';
    pop.style.width = '240px';
    // 3-row grouped layout: each row = one sort dimension (Date / Added / Symbol) with a
    // direction arrow on the right. Click the row to either ACTIVATE it (if not active) or
    // FLIP its direction (if already active). Inactive rows show their default direction
    // muted so the user can predict where activation will land them.
    const { group: curGroup, dir: curDir } = parseSortKey();
    pop.innerHTML = `
      <div class="sf-head"><span>Sort by</span></div>
      <div class="sf-options-host">${STUDIES_SORT_GROUPS.map(g => {
        const isActive = (curGroup === g.key);
        const dir = isActive ? curDir : g.defaultDir;
        const dirText = dir === 'desc' ? g.descLabel : g.ascLabel;
        return `<div class="sort-row ${isActive ? 'active' : ''} dir-${dir}" data-group="${g.key}">
          <span class="sort-label">${escapeHtml(g.label)}</span>
          <span class="sort-dir">
            <span class="sort-dir-text">${escapeHtml(dirText)}</span>
            <svg class="sort-dir-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </span>
        </div>`;
      }).join('')}</div>
    `;
    document.body.appendChild(pop);
    pop.querySelector('.sf-options-host').addEventListener('click', ev => {
      const row = ev.target.closest('.sort-row');
      if (!row) return;
      ev.preventDefault(); ev.stopPropagation();
      const group = row.dataset.group;
      const groupDef = STUDIES_SORT_GROUPS.find(g => g.key === group);
      if (!groupDef) return;
      const { group: prevGroup, dir: prevDir } = parseSortKey();
      let newDir;
      if (prevGroup === group) {
        // Click on active row → flip direction
        newDir = prevDir === 'desc' ? 'asc' : 'desc';
      } else {
        // Click on inactive row → activate with its default direction
        newDir = groupDef.defaultDir;
      }
      STUDIES_SORT = `${group}-${newDir}`;
      pop.remove();
      renderStudies();
    });
    setTimeout(() => {
      const onDocClick = (ev) => {
        const btnNow = document.getElementById('studies-sort-btn');
        if (!pop.contains(ev.target) && !(btnNow && btnNow.contains(ev.target))) {
          pop.remove();
          document.removeEventListener('click', onDocClick);
        }
      };
      document.addEventListener('click', onDocClick);
    }, 0);
  });

  document.getElementById('studies-clear')?.addEventListener('click', async () => {
    const before = loadStudies();
    if (!before.length) return;
    if (!confirm(t('studies-clear-confirm'))) return;
    // Snapshot images so undo is fully reversible
    const beforeImgs = await getAllImgs();
    saveStudies([]);
    for (const k of Object.keys(beforeImgs)) { try { await delImg(k); } catch {} }
    renderStudies();
    showUndoSnackbar(`Cleared ${before.length} studies`, async () => {
      saveStudies(before);
      for (const [k, v] of Object.entries(beforeImgs)) { try { await putImg(k, v); } catch {} }
      renderStudies();
    });
  });

  /* ── Ticker search/add box ──
     Two flows for the user:
       (a) Type a ticker that appeared in a past scan → pick from dropdown → addStudy with that
           snapshot. The study lands fully populated with sessions / tv / catalyst from that
           scan date (most-recent date wins).
       (b) Type a ticker that has NEVER been scanned → "Create new <TICKER>" appears at the
           bottom of the dropdown → click → addManualStudy creates a placeholder. The study
           page renders only News Detail (empty) + Notes; next /SIPs run will backfill the
           rest via build_dashboard.py's placeholder-fill step.
     The search index is built lazily on first focus (one fetch per scan date, memoized). */
  const searchInp = document.getElementById('studies-search');
  const searchRes = document.getElementById('studies-search-results');
  let __searchIndex = null;
  let __activeIdx = -1;
  let __currentMatches = [];

  async function ensureSearchIndex() {
    if (!__searchIndex) __searchIndex = await buildSymbolIndex();
    return __searchIndex;
  }
  function renderSearchDropdown(query) {
    if (!query) { searchRes.classList.remove('show'); searchRes.innerHTML = ''; return; }
    const idx = __searchIndex || new Map();
    const q = query.toUpperCase().trim();
    const allStudies = loadStudies();
    // ── Section 1: existing saved studies matching this query ──
    // The user's #1 question is "have I researched this before?" — surface that
    // answer at the very top of the dropdown. Click an item to OPEN the existing
    // study (NOT create a new one). Multiple studies for the same symbol all
    // show up as separate rows. Sorted newest-first (most recently saved).
    const existingStudies = allStudies
      .filter(st => (st.symbol || '').includes(q))
      .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''))
      .slice(0, 10);
    // Build a map of symbol → newest-research preview (used by past-scan section).
    const newestBySym = new Map();
    for (const st of allStudies) {
      const dates = listResearchedDates(st);
      if (dates.length === 0) continue;
      const newest = dates[0];
      const slot = st.datedSnapshots?.[newest];
      if (slot?.snapshot) {
        const prev = newestBySym.get(st.symbol);
        if (!prev || newest > prev.date) newestBySym.set(st.symbol, { date: newest, snap: slot.snapshot });
      }
    }
    // Past-scan matches: prefix wins over substring; cap at 8.
    const all = Array.from(idx.entries()).map(([sym, info]) => ({ sym, ...info }));
    const prefix = all.filter(r => r.sym.startsWith(q));
    const substr = all.filter(r => !r.sym.startsWith(q) && r.sym.includes(q));
    __currentMatches = [...prefix, ...substr].slice(0, 8);
    const exact = idx.has(q);
    const symbolsInExisting = new Set(existingStudies.map(st => st.symbol));
    let html = '';
    let runningIdx = 0;
    // Render existing saved studies first.
    if (existingStudies.length > 0) {
      html += `<div class="studies-search-section-header">已存在的研究 (${existingStudies.length}) — 點擊開啟</div>`;
      existingStudies.forEach(st => {
        const dates = listResearchedDates(st);
        const dateLabel = dates[0] || (st.snapshot?.scanDate || '');
        const dateCount = dates.length > 1 ? ` <span style="color:var(--stone)">(+${dates.length - 1} 日期)</span>` : '';
        const rawNews = (st.snapshot?.newsDetail || st.snapshot?.catalyst || '').replace(/<[^>]*>/g,'').replace(/\*\*/g,'').replace(/\n+/g,' ').trim();
        const meta = rawNews.slice(0, 70) || '(no research yet)';
        const isActive = runningIdx === __activeIdx;
        html += `<div class="studies-search-item ${isActive ? 'active' : ''}" data-action="open-existing" data-id="${st.id}">
          <span class="studies-search-sym">${st.symbol}</span>
          <span class="studies-search-meta">${escapeHtml(meta)}</span>
          <span class="studies-search-date">${dateLabel}${dateCount}</span>
        </div>`;
        runningIdx++;
      });
    }
    // Past-scan matches section.
    if (__currentMatches.length === 0 && !exact && existingStudies.length === 0) {
      html += `<div class="studies-search-empty">No past scan or saved study matches "${escapeHtml(q)}"</div>`;
    } else if (__currentMatches.length > 0) {
      if (existingStudies.length > 0) html += `<div class="studies-search-section-header">過去的掃描資料 — 點擊新增為 study</div>`;
      __currentMatches.forEach(r => {
        const alreadySaved = symbolsInExisting.has(r.sym);
        const fresh = newestBySym.get(r.sym);
        const s = fresh ? fresh.snap : (r.snapshot || {});
        const dateShown = fresh ? fresh.date : r.scanDate;
        const cat = (s.catalyst_en || s.catalyst || s.name || '').toString().slice(0, 80);
        const sourceLabel = alreadySaved ? ' <em style="color:var(--pos)">· 已有 study (新增會繼承)</em>' : '';
        const isActive = runningIdx === __activeIdx;
        html += `<div class="studies-search-item ${isActive ? 'active' : ''}" data-action="add" data-sym="${r.sym}" data-date="${r.scanDate}">
          <span class="studies-search-sym">${r.sym}</span>
          <span class="studies-search-meta">${escapeHtml(cat)}${sourceLabel}</span>
          <span class="studies-search-date">${dateShown}</span>
        </div>`;
        runningIdx++;
      });
    }
    // "+ Create / Add another" — always show when query is a plausible ticker.
    if (/^[A-Z][A-Z0-9.\-]{0,7}$/.test(q)) {
      const hasExisting = existingStudies.length > 0;
      const isActive = runningIdx === __activeIdx;
      const labelMain = hasExisting ? `+ 新增另一筆 <strong>${q}</strong>` : `+ Create new <strong>${q}</strong>`;
      const labelHint = hasExisting ? '繼承既有研究資料 (news / OHLCV)' : 'awaits /SIPs data fill';
      html += `<div class="studies-search-create ${isActive ? 'active' : ''}" data-action="create" data-sym="${q}">
        <span>${labelMain}</span>
        <span style="color:var(--mute);font-weight:400;font-size:11px;margin-left:auto">${labelHint}</span>
      </div>`;
    }
    searchRes.innerHTML = html;
    searchRes.classList.add('show');
  }
  async function pickSearchResult(sym, scanDate) {
    // Add from past scan: fetch the snapshot for that date, then force-create a NEW study row.
    // force: true bypasses the (symbol, scanDate) dedup — so picking the same search result
    // twice yields TWO independent study records, each with its own notes/ohlcv/customChart.
    const data = await loadDateData(scanDate);
    const snap = data?.stocks?.[sym];
    if (!snap) { alert(`Couldn't load ${sym} from ${scanDate}`); return; }
    addStudy({ ...snap, symbol: sym }, { scanDate, force: true });
    // Stay on the My Studies list — user explicitly asked NOT to navigate into the detail page.
    // Clear the search box + close the dropdown, then re-render so the new card appears at the top.
    if (searchInp) searchInp.value = '';
    searchRes.classList.remove('show');
    renderStudies();
  }
  function createSearchResult(sym) {
    const newId = addManualStudy(sym);
    if (!newId) return;
    // Same UX as pickSearchResult — stay on list, clear search, re-render. The new placeholder
    // card lands at the top and the user can click into it whenever they want to fill in details.
    if (searchInp) searchInp.value = '';
    searchRes.classList.remove('show');
    renderStudies();
  }

  searchInp?.addEventListener('focus', async () => {
    await ensureSearchIndex();
    if (searchInp.value) renderSearchDropdown(searchInp.value);
  });
  searchInp?.addEventListener('input', async () => {
    await ensureSearchIndex();
    __activeIdx = -1;
    renderSearchDropdown(searchInp.value);
  });
  searchInp?.addEventListener('keydown', e => {
    // Count all interactive items currently in the dropdown to drive arrow-key nav.
    const maxIdx = (searchRes?.querySelectorAll('[data-action]').length || 0) - 1;
    // maxIdx points to the create-new row (matches.length) if shown; else matches.length-1
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      __activeIdx = Math.min(maxIdx, __activeIdx + 1);
      renderSearchDropdown(searchInp.value);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      __activeIdx = Math.max(-1, __activeIdx - 1);
      renderSearchDropdown(searchInp.value);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      // If a row is highlighted, pick it. Otherwise default to the last item (which is
      // "Create new" with whatever they typed, when a valid ticker is in the input).
      const items = searchRes.querySelectorAll('[data-action]');
      const target = (__activeIdx >= 0 && items[__activeIdx]) ? items[__activeIdx] : items[items.length - 1];
      if (!target) return;
      const action = target.dataset.action;
      if (action === 'open-existing') openExistingStudy(target.dataset.id);
      if (action === 'add')           pickSearchResult(target.dataset.sym, target.dataset.date);
      if (action === 'create')        createSearchResult(target.dataset.sym);
    } else if (e.key === 'Escape') {
      searchRes.classList.remove('show');
      searchInp.blur();
    }
  });
  searchRes?.addEventListener('mousedown', e => {
    // mousedown (not click) so the input's blur handler doesn't dismiss the dropdown first
    const item = e.target.closest('[data-action]');
    if (!item) return;
    e.preventDefault();
    if (item.dataset.action === 'open-existing') openExistingStudy(item.dataset.id);
    if (item.dataset.action === 'add')           pickSearchResult(item.dataset.sym, item.dataset.date);
    if (item.dataset.action === 'create')        createSearchResult(item.dataset.sym);
  });
  // Click an "已存在的研究" item → navigate to that study's detail page.
  // Clears the search input + closes the dropdown for a clean transition.
  function openExistingStudy(id) {
    if (!id) return;
    if (searchInp) searchInp.value = '';
    searchRes?.classList.remove('show');
    location.hash = '#/studies/' + id;
  }
  searchInp?.addEventListener('blur', () => {
    // Defer hide so click handlers on the dropdown run first
    setTimeout(() => searchRes?.classList.remove('show'), 150);
  });
}

// Save-to-Studies button helper — emits a button with inline click handler that stops
// the parent <a class="sip-card"> from navigating. Pulls the stock fresh from DATA.stocks.
function saveStudyBtnHtml(sym, claudeRationale, claudeIntent) {
  const saved = isStudySaved(sym);
  // Stash the rationale + intent on a global so the click handler can pick it up without
  // bloating the inline attribute. Falls back to whatever's in DATA.stocks[sym] anyway.
  window.__claudePendingMeta = window.__claudePendingMeta || {};
  if (claudeRationale) window.__claudePendingMeta[sym] = { rationale: claudeRationale, intent: claudeIntent };
  return `<button class="save-study-btn ${saved ? 'saved' : ''}" data-sym="${sym}"
          onclick="event.stopPropagation();event.preventDefault();handleSaveStudy('${sym}',this);"
          title="${saved ? t('saved') : t('save-study')}">${saved ? t('saved') : t('save-study')}</button>`;
}
window.handleSaveStudy = function(sym, btn) {
  const s = DATA?.stocks?.[sym];
  if (!s) return;
  const meta = (window.__claudePendingMeta || {})[sym] || {};
  const scanDate = STATE.date;
  // Toggle save/unsave for THIS scan's study only. Same-symbol entries saved on other
  // dates are untouched — duplicates across scan dates are now allowed (each captures a
  // distinct snapshot).
  const existing = loadStudies().find(st => st.symbol === sym && (st.snapshot?.scanDate || '') === scanDate);
  if (existing) {
    removeStudy(existing.id);
    btn.classList.remove('saved');
    btn.textContent = t('save-study');
    btn.title = t('save-study');
  } else {
    addStudy({
      ...s,
      _claudeRationale: meta.rationale || s._claudeRationale,
      _claudeIntent:    meta.intent    || s._claudeIntent,
    }, { scanDate });
    btn.classList.add('saved');
    btn.textContent = t('saved');
    btn.title = t('saved');
  }
};

// Small preview card for the Studies list — mirrors the layout of sipCardHtml so the user
// can scan ranks/intent/catalyst at a glance. Clicking the whole card opens the detail page.
function studyPreviewCardHtml(st, idx) {
  const s = st.snapshot || {};
  const o = st.ohlcv || {};
  // gap % priority — derived from OHLCV (open − prev_close) once /update-studies has filled
  // those, otherwise fall back to snapshot.chgPct (the pre/post-market gap captured at scan).
  // The derived form is the OFFICIAL opening gap of the regular session and aligns with what
  // chart sites publish; snapshot.chgPct is a faster but rougher pre-open estimate.
  const derivedGap = (o.open != null && o.prev_close != null && o.prev_close !== 0)
    ? (o.open - o.prev_close) / o.prev_close * 100
    : null;
  const gapPct = (derivedGap != null) ? derivedGap : s.chgPct;
  const intent = resolveStudyIntent(st);
  const movePct = studyMovePct(st);
  // Big header chg: priority same as detail page → move > derived (close-prev_close) > gap.
  const derivedChg = (o.close != null && o.prev_close != null && o.prev_close !== 0)
    ? (o.close - o.prev_close) / o.prev_close * 100
    : null;
  const headerChg = (st.chgPct != null) ? st.chgPct
                  : (movePct != null)    ? movePct
                  : (derivedChg != null) ? derivedChg
                  : gapPct;
  const headerChgCls = (headerChg == null) ? '' : (headerChg >= 0 ? 'pos' : 'neg');
  // Price — user override (study.price) wins; ohlcv.close is the next-best signal of
  // "current/closing price for that day"; snapshot.last is the scan-time fallback.
  const displayPrice = (st.price != null) ? st.price
                     : (o.close != null) ? o.close
                     : s.last;
  // Catalyst types — first 2 pills (full set on detail page)
  const types = getStudyTypes(st).slice(0, 2);
  const typeBadges = types.map(tt => `<span class="tag catalyst-type-pill ${catalystTypeClass(tt)}" style="padding:2px 8px;font-size:11px">${escapeHtml(tt)}</span>`).join(' ');
  const intentBadge = `<span class="tag direction-pill ${intent === 'long' ? 'pos' : 'neg'}" style="font-weight:700;letter-spacing:0.6px;padding:2px 8px;font-size:11px">${intent.toUpperCase()}</span>`;
  const cat = (st.catalyst != null && st.catalyst !== '') ? st.catalyst : (s.catalyst || '');
  // Mini MS table — READ-ONLY snapshot at save time. Shows the latest reported quarter
  // + 4 forward estimates (max 5 quarters total). Hidden entirely if:
  //   • the study has no chart data (placeholder studies, or tickers without TV coverage), OR
  //   • the user has hidden the ms_table section on the detail page (study.hiddenSections
  //     includes 'ms_table') — the preview tracks the detail-page visibility setting so the
  //     two views stay consistent. Editing only happens on detail page.
  const chart = st.customChart || (s.tv && s.tv.chart) || null;
  const msHiddenByUser = Array.isArray(st.hiddenSections) && st.hiddenSections.includes('ms_table');
  const msHtml = (chart && !msHiddenByUser) ? renderCompactReadonlyMsTable(chart) : '';
  // Date display priority: ohlcv.date (user-filled in the Gain/Stop popup) wins over
  // savedAt (default = creation time). Hover-title spells out which source is being shown
  // so the user can tell at a glance.
  const ohlcvDate = (st.ohlcv && st.ohlcv.date) ? st.ohlcv.date : '';
  const displayDate = ohlcvDate || (st.savedAt || '').slice(0, 10);
  const dateTitle = ohlcvDate
    ? `Trading day from OHLCV (set in the Gain/Stop popup). Saved on ${(st.savedAt || '').slice(0, 10)}.`
    : `Saved on this date. Fill OHLCV.date in the Gain/Stop popup to override with the actual trading day.`;
  // gap / move / day rows — same shape as the detail-page header. Each row shows label + value.
  // day = (close − prev_close) / prev_close · 100 — filled by /update-studies once OHLCV
  // close + prev_close are present.
  const gapMoveRow = `<div class="sip-chg-row">
    ${gapPct != null ? `<span class="chg-cell gap-cell ${cls(gapPct)}" title="${derivedGap != null ? 'Gap % from OHLCV: (Open − Prev close) / Prev close · 100' : 'Gap % at scan time (pre/post-market)'}"><span class="chg-label">gap</span> <span class="gap-pct">${fmtPct(gapPct)}</span></span>` : ''}
    ${movePct != null ? `<span class="chg-cell move-cell ${cls(movePct)}" title="Day's move % from open — ${intent === 'short' ? '(Low − Open) / Open · negative = drop = short profit' : '(High − Open) / Open · positive = rise = long profit'}"><span class="chg-label">move</span> <span class="move-pct">${(movePct >= 0 ? '+' : '') + movePct.toFixed(2)}%</span></span>` : ''}
    ${derivedChg != null ? `<span class="chg-cell day-cell ${cls(derivedChg)}" title="Day's % change — (Close − Prev close) / Prev close · 100"><span class="chg-label">day</span> <span class="day-pct">${(derivedChg >= 0 ? '+' : '') + derivedChg.toFixed(2)}%</span></span>` : ''}
  </div>`;
  return `<a class="sip-card" href="#/study/${st.id || st.symbol}" style="text-decoration:none;color:inherit;display:block;position:relative">
    <button class="study-preview-del" data-id="${st.id || st.symbol}" title="Delete study"
            onclick="event.preventDefault();event.stopPropagation();handleDeleteStudyFromList('${st.id || st.symbol}');">✕</button>
    <span class="sip-rank-row"><span class="sip-rank">#${idx + 1}</span><span class="study-saved-on" title="${dateTitle}">${displayDate}</span></span>
    <div class="sip-header"><div class="sip-sym">${st.symbol}</div><div class="sip-price">${fmtPrice(displayPrice)}</div><div class="sip-chg ${headerChgCls}">${fmtPct(headerChg)}</div></div>
    <div class="sip-name">${escapeHtml(s.name || '')}</div>
    ${gapMoveRow}
    <div class="sip-meta">${intentBadge} ${typeBadges}</div>
    ${cat ? `<div class="sip-catalyst" style="margin-top:8px">${escapeHtml(cat)}</div>` : ''}
    ${msHtml ? `<div class="ms-pre-section-divider">Quarterly EPS / Sales (Reported + Estimate · click any value to edit)</div>${msHtml}` : ''}
  </a>`;
}

// Global delete handler used by the preview card's X — collects the full study + its images
// so the undo snackbar can fully restore. Keyed by study id (not symbol) since duplicate
// tickers are allowed — we delete THIS specific entry, not every study sharing the symbol.
window.handleDeleteStudyFromList = async function(id) {
  const studies = loadStudies();
  const st = studies.find(s => s.id === id) || studies.find(s => s.symbol === id);  // fallback for legacy URLs
  if (!st) return;
  // Snapshot all images attached to this study (from notes <img data-img-key>, legacy screenshots)
  const imgKeys = new Set();
  (st.screenshots || []).forEach(ss => imgKeys.add(ss.imgKey));
  const noteImgs = (st.notes || '').match(/data-img-key="([^"]+)"/g) || [];
  noteImgs.forEach(m => imgKeys.add(m.replace(/data-img-key="|"$/g, '')));
  const beforeImgs = {};
  for (const k of imgKeys) { try { const v = await getImg(k); if (v) beforeImgs[k] = v; } catch {} }
  // Delete THIS study only (not all studies sharing this symbol)
  saveStudies(studies.filter(s => s.id !== st.id));
  for (const k of imgKeys) { try { await delImg(k); } catch {} }
  renderStudies();
  showUndoSnackbar(`Removed ${st.symbol}`, async () => {
    saveStudies([...loadStudies(), st]);
    for (const [k, v] of Object.entries(beforeImgs)) { try { await putImg(k, v); } catch {} }
    renderStudies();
  });
};

/* ═══════ Catalyst-type registry + helpers (used by Studies multi-select pills) ═══════ */
// Preset catalyst types — each maps to a CSS class for color coding. Users can also add
// arbitrary custom types via the "+" pill; custom types get the default surface color.
const CATALYST_PRESETS = [
  { key: 'earnings',       label: 'earnings',       cls: 'cat-type-earnings' },
  { key: 'momentum',       label: 'momentum',       cls: 'cat-type-momentum' },
  { key: 'fda',            label: 'FDA',            cls: 'cat-type-fda' },
  { key: 'ma',             label: 'M&A',            cls: 'cat-type-ma' },
  { key: 'contract',       label: 'contract',       cls: 'cat-type-contract' },
  { key: 'technical',      label: 'technical',      cls: 'cat-type-technical' },
  { key: 'fbo',            label: 'FBO',            cls: 'cat-type-fbo' },
  { key: 'short-squeeze',  label: 'short squeeze',  cls: 'cat-type-short-squeeze' },
  { key: 'sips',           label: 'SIPs',           cls: 'cat-type-sips' },
  { key: 'ep',             label: 'EP',             cls: 'cat-type-ep' },
  { key: 'dep',            label: 'DEP',            cls: 'cat-type-dep' },
];
function catalystTypeClass(key) {
  const p = CATALYST_PRESETS.find(p => p.key === key.toLowerCase().replace(/\s+/g, '-'));
  return p ? p.cls : '';
}
// Custom (user-created) catalyst types — persisted to localStorage. Two parallel lists:
//   • `sips-custom-catalyst-types`         — ACTIVE list, shown in the dropdown.
//   • `sips-custom-catalyst-types-archive` — graveyard. Every type ever created lives here
//     and NEVER gets pruned on delete. Lets "Reset Tags" actually restore everything the
//     user has deleted over time, which is what they expected the button to do.
// Lookup is case-insensitive. Presets (CATALYST_PRESETS) are permanent and never enter
// either list.
const CUSTOM_CAT_TYPES_KEY     = 'sips-custom-catalyst-types';
const CUSTOM_CAT_ARCHIVE_KEY   = 'sips-custom-catalyst-types-archive';
const HIDDEN_CAT_PRESETS_KEY   = 'sips-hidden-preset-catalyst-types';  // legacy; unused now
function loadCustomCatTypes() {
  try {
    const arr = JSON.parse(localStorage.getItem(CUSTOM_CAT_TYPES_KEY) || '[]');
    if (!Array.isArray(arr)) return [];
    // Bootstrap the archive with currently-active customs so the Restore button can recover
    // anything created BEFORE the archive feature existed. Idempotent via appendCustomCatArchive
    // dedup — safe to call on every load.
    arr.forEach(label => appendCustomCatArchive(label));
    return arr;
  } catch { return []; }
}
function saveCustomCatTypes(arr) {
  localStorage.setItem(CUSTOM_CAT_TYPES_KEY, JSON.stringify(arr));
}
function loadCustomCatArchive() {
  try {
    const arr = JSON.parse(localStorage.getItem(CUSTOM_CAT_ARCHIVE_KEY) || '[]');
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function appendCustomCatArchive(label) {
  // Idempotent (case-insensitive): never grow the archive beyond unique entries.
  const arr = loadCustomCatArchive();
  const lower = label.toLowerCase();
  if (arr.some(a => a.toLowerCase() === lower)) return;
  arr.push(label);
  localStorage.setItem(CUSTOM_CAT_ARCHIVE_KEY, JSON.stringify(arr));
}
function rememberCustomCatType(label) {
  const arr = loadCustomCatTypes();
  const lower = label.toLowerCase();
  if (CATALYST_PRESETS.some(p => p.label.toLowerCase() === lower || p.key === lower.replace(/\s+/g, '-'))) return false;
  if (arr.some(a => a.toLowerCase() === lower)) return false;
  arr.push(label);
  saveCustomCatTypes(arr);
  appendCustomCatArchive(label);   // also stamp into the never-pruned graveyard
  return true;
}
function forgetCustomCatType(label) {
  // Removes from the ACTIVE list only — the archive keeps the entry so Reset can bring it back.
  const arr = loadCustomCatTypes().filter(a => a.toLowerCase() !== label.toLowerCase());
  saveCustomCatTypes(arr);
}
function loadHiddenPresets() {
  try {
    const arr = JSON.parse(localStorage.getItem(HIDDEN_CAT_PRESETS_KEY) || '[]');
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
// All available options for the picker — built-in presets (minus user-hidden ones) + customs.
function getAllCatalystOptions() {
  const hidden = new Set(loadHiddenPresets());
  const presets = CATALYST_PRESETS.filter(p => !hidden.has(p.key));
  const customs = loadCustomCatTypes().map(label => ({
    key: label.toLowerCase().replace(/\s+/g, '-'),
    label,
    cls: '',
    isCustom: true,
  }));
  return [...presets, ...customs];
}

// Resolve a study's effective trade intent. User override (`study.intent` set via the
// Long/Short toggle in the OHLCV modal) wins; otherwise derive from the original gap
// direction (snapshot.chgPct sign). Returns 'long' | 'short'.
function resolveStudyIntent(st) {
  if (st && (st.intent === 'long' || st.intent === 'short')) return st.intent;
  const gap = (st && st.chgPct != null) ? st.chgPct : (st?.snapshot?.chgPct);
  return (gap != null && gap < 0) ? 'short' : 'long';
}
// Day's MOVE % from open — RAW signed price change at the intent-favored extreme.
//   LONG  → (High − Open) / Open · 100  → positive when stock ran up    (profit for long)
//   SHORT → (Low  − Open) / Open · 100  → NEGATIVE when stock fell     (profit for short)
// Same sign convention as Gain on the trade-pill row, so the two readouts agree.
function studyMovePct(st) {
  const o = st?.ohlcv || {};
  if (o.open == null) return null;
  const it = resolveStudyIntent(st);
  if (it === 'short') return (o.low  != null) ? (o.low  - o.open) / o.open * 100 : null;
  else                return (o.high != null) ? (o.high - o.open) / o.open * 100 : null;
}

// Active filter for the Studies list — Set of catalyst labels + intent sentinels.
// Special keys `__long` and `__short` match against resolved study intent. Empty = no filter.
// Lives in memory (session state); cleared on full page reload.
const STUDIES_FILTER = new Set();

// Active sort order for the Studies list. Values: 'date-desc' (default, newest first),
// 'date-asc', 'sym-asc', 'sym-desc'. Date sort uses the DISPLAY date — `ohlcv.date` once
// the user fills it in the Gain/Stop popup, otherwise `savedAt` — so the order matches what
// the user sees on each card. Session state; doesn't survive page reload.
let STUDIES_SORT = 'date-desc';
// Sort groups: 3 logical buckets (Date, Added, Symbol). Each toggles between asc/desc via
// the arrow on the right side of the row in the dropdown. STUDIES_SORT stores the combined
// key (e.g., 'date-desc', 'added-asc', 'sym-asc') so legacy storage still parses cleanly.
const STUDIES_SORT_GROUPS = [
  { key: 'date',  label: 'Date',   descLabel: 'Newest first', ascLabel: 'Oldest first', defaultDir: 'desc' },
  { key: 'added', label: 'Added',  descLabel: 'Newest first', ascLabel: 'Oldest first', defaultDir: 'desc' },
  { key: 'sym',   label: 'Symbol', descLabel: 'Z → A',         ascLabel: 'A → Z',         defaultDir: 'asc'  },
];
function parseSortKey() {
  const [group, dir] = String(STUDIES_SORT || 'date-desc').split('-');
  return { group: group || 'date', dir: dir === 'asc' ? 'asc' : 'desc' };
}
function studyDisplayDate(st) {
  return (st.ohlcv && st.ohlcv.date) ? st.ohlcv.date : (st.savedAt || '').slice(0, 10);
}
function sortStudies(arr) {
  const a = arr.slice();
  switch (STUDIES_SORT) {
    case 'date-asc':   return a.sort((x, y) => studyDisplayDate(x).localeCompare(studyDisplayDate(y))
                                             || (x.savedAt || '').localeCompare(y.savedAt || ''));
    // 'added-desc' uses savedAt only — pure addition order. This is what makes recently-added
    // studies bubble up regardless of which trading day their ohlcv points at. Tiebreak by
    // symbol so studies created in the same second still order deterministically.
    case 'added-desc': return a.sort((x, y) => (y.savedAt || '').localeCompare(x.savedAt || '')
                                             || x.symbol.localeCompare(y.symbol));
    case 'added-asc':  return a.sort((x, y) => (x.savedAt || '').localeCompare(y.savedAt || '')
                                             || x.symbol.localeCompare(y.symbol));
    case 'sym-asc':    return a.sort((x, y) => x.symbol.localeCompare(y.symbol)
                                             || (y.savedAt || '').localeCompare(x.savedAt || ''));
    case 'sym-desc':   return a.sort((x, y) => y.symbol.localeCompare(x.symbol)
                                             || (y.savedAt || '').localeCompare(x.savedAt || ''));
    case 'date-desc':
    default:           return a.sort((x, y) => studyDisplayDate(y).localeCompare(studyDisplayDate(x))
                                             || (y.savedAt || '').localeCompare(x.savedAt || ''));
  }
}
function studyMatchesFilter(study) {
  if (STUDIES_FILTER.size === 0) return true;
  // Direction filter (sentinels `__long` / `__short`) AND'd with tag filter (everything else).
  const directionFilters = new Set();
  if (STUDIES_FILTER.has('__long'))  directionFilters.add('long');
  if (STUDIES_FILTER.has('__short')) directionFilters.add('short');
  if (directionFilters.size > 0 && !directionFilters.has(resolveStudyIntent(study))) return false;
  // Tag filter — at least one selected catalyst tag must be among the study's customTypes.
  const tagFilters = Array.from(STUDIES_FILTER).filter(f => f !== '__long' && f !== '__short');
  if (tagFilters.length === 0) return true;
  const types = getStudyTypes(study).map(t => t.toLowerCase());
  return tagFilters.some(f => types.includes(f.toLowerCase()));
}
function getStudyTypes(study) {
  // Priority: user override → snapshot.type (legacy single-type) → 'momentum'
  if (Array.isArray(study.customTypes) && study.customTypes.length) return study.customTypes;
  const fromSnap = study.snapshot?.type;
  if (fromSnap) return [fromSnap];
  return ['momentum'];
}

/* ═══════ OHLCV date → quarter index mapping ═══════
   Maps an ISO date (YYYY-MM-DD) to a quarter index inside chart.quarters using
   calendar-quarter convention (Q1=Jan-Mar, Q2=Apr-Jun, Q3=Jul-Sep, Q4=Oct-Dec).
   Returns null if no quarter matches (e.g. fiscal-year-offset companies, or date
   out of range).  Quarter labels look like "Q1 '26" — parse "Q<n> '<yy>". */
function dateToQuarterIdx(isoDate, chart) {
  if (!isoDate || !chart || !chart.quarters || !chart.quarters.length) return null;
  const m = isoDate.match(/^(\d{4})-(\d{2})/);
  if (!m) return null;
  const year = parseInt(m[1], 10);
  const month = parseInt(m[2], 10);
  const q = Math.ceil(month / 3);                       // 1-4
  const yy = String(year).slice(-2);
  const target = `Q${q} '${yy}`;
  return chart.quarters.indexOf(target);
}

/* ═══════ Study detail page — #/study/<SYM> ═══════
   Same layout as the standard stock detail page, but every value is editable. Changes
   live on the study object only — never mutates DATA.stocks. Sections:
     • Header (symbol + chgPct + long/short + Save/Delete + Sections gear)
     • Catalyst (free-form textarea)
     • EPS Surp % / Rev Surp % chips → 漲幅 / 止損 chips (click opens OHLCV popup)
     • EPS Quarterly bar chart  ─┐
     • Revenue Quarterly bar chart ─┴─ all driven by study.customChart (overrides snapshot.tv.chart)
     • MS-style quarterly table (editable cells)
     • Forward YoY block
     • Notion-style notes (contenteditable + paste/drop images)
   Section visibility configurable via the gear button. */
async function renderStudyDetail(idOrSym) {
  const app = document.getElementById('app');
  // Resolve study by id first (new schema); fall back to symbol lookup for legacy URLs
  // where multiple studies for the same symbol weren't possible.
  let study = loadStudies().find(st => st.id === idOrSym);
  if (!study) study = loadStudies().find(st => st.symbol === idOrSym);
  if (!study) {
    app.innerHTML = `<div class="empty">Study ${escapeHtml(idOrSym)} not found. <a href="#/studies">← Back to Studies</a></div>`;
    return;
  }
  const id = study.id;
  const sym = study.symbol;
  const s = study.snapshot || {};
  // %Chg priority (highest → lowest) for the BIG number in the header:
  //   1. study.chgPct  — manual override (future-proofing; no UI yet)
  //   2. Gain          — once user fills OHLCV, the intent-aware Gain replaces gap %.
  //                       This is the "今天的漲幅" the user actually traded.
  //   3. derivedChg    — (close − prev_close) / prev_close · 100, when both close + prev_close
  //                       are present but Gain isn't (e.g. user only typed close+prev_close).
  //   4. snapshot.chgPct — the gap % (pre/post-market) baked in at scan time. Default fallback.
  function deriveDayChgPct(ohlcv) {
    if (!ohlcv) return null;
    const close = ohlcv.close, prev = ohlcv.prev_close;
    if (close == null || prev == null || prev === 0) return null;
    return (close - prev) / prev * 100;
  }
  // Intent — user override (study.intent set via OHLCV modal Long/Short toggle) wins;
  // otherwise derive from snapshot.chgPct gap sign. Determines Gain/Stop column anchors.
  const intent = resolveStudyIntent(study);
  // gap % — derived from OHLCV (open − prev_close) once /update-studies has filled those;
  // falls back to snapshot.chgPct (the pre/post-market gap captured at SIP scan time).
  // Derived form is the official regular-session opening gap and aligns with chart sites.
  const derivedGap = (study.ohlcv && study.ohlcv.open != null && study.ohlcv.prev_close != null && study.ohlcv.prev_close !== 0)
    ? (study.ohlcv.open - study.ohlcv.prev_close) / study.ohlcv.prev_close * 100
    : null;
  const gapPct = (derivedGap != null) ? derivedGap : s.chgPct;
  // Custom chart overrides snapshot's TV chart when user edits MS-table values.
  const baseChart = (s.tv && s.tv.chart) ? s.tv.chart : null;
  // Section visibility (hidden set). Defaults: everything visible. Hide via the X on each card.
  const sectionsAll = ['news_detail', 'eps_chart', 'rev_chart', 'ms_table', 'yoy_block', 'notes'];
  const sectionLabels = { news_detail: 'News Detail', eps_chart: 'EPS Quarterly', rev_chart: 'Revenue Quarterly', ms_table: '季度 EPS / Sales', yoy_block: 'Forward YoY', notes: 'Notes' };
  const hidden = new Set(study.hiddenSections || []);
  const sectionShown = id => !hidden.has(id);
  // Migrate legacy thumbnail screenshots into the notes HTML on first detail-view render
  let notesHtml = study.notes || '';
  if (Array.isArray(study.screenshots) && study.screenshots.length && !study._migratedShots) {
    const tail = study.screenshots.map(ss =>
      `<p><span class="notes-img-wrap" contenteditable="false"><img data-img-key="${ss.imgKey}" alt="${escapeHtml(ss.label || '')}"><button class="notes-img-del" type="button" data-img-key="${ss.imgKey}" title="Delete image">&times;</button></span></p>${ss.label ? `<p><em>${escapeHtml(ss.label)}</em></p>` : ''}`
    ).join('');
    notesHtml = (notesHtml || '') + tail;
    updateStudy(id,{ notes: notesHtml, _migratedShots: true, screenshots: [] });
  }

  // Direction-aware metrics. 漲幅 (gain) = (H-O)/O · 止損 (stop) = (L-O)/O · sign-flipped for short.
  // Gain / Stop now report RAW price movement (signs preserved from the underlying %), so the
  // user can read the chart's actual peak / trough at a glance instead of interpreting an
  // intent-flipped sign.
  //   LONG   Gain = (High − Open) / Open · positive when stock ran up   (your profit)
  //          Stop = (Low  − Open) / Open · negative when stock dropped  (your drawdown)
  //   SHORT  Gain = (Low  − Open) / Open · NEGATIVE when stock dropped  (your profit — easier
  //                                                                       to see "how much it fell")
  //          Stop = (High − Open) / Open · POSITIVE when stock ran up   (your drawdown)
  // Color follows raw sign — green = price rose, red = price fell — which matches the chart
  // and the gap %. The user knows from the LONG/SHORT pill which sign means profit.
  function computeMetrics() {
    const cur = loadStudies().find(st => st.id === id)?.ohlcv || {};
    if (!cur.open) return { gain: null, stop: null };
    let gain = null, stop = null;
    if (intent === 'short') {
      // Gain anchors on LOW, Stop anchors on HIGH. Signs are RAW price direction.
      if (cur.low  != null) gain = (cur.low  - cur.open) / cur.open * 100;   // negative when dropped
      if (cur.high != null) stop = (cur.high - cur.open) / cur.open * 100;   // positive when rose
    } else {
      // LONG — Gain on HIGH (positive), Stop on LOW (negative).
      if (cur.high != null) gain = (cur.high - cur.open) / cur.open * 100;
      if (cur.low  != null) stop = (cur.low  - cur.open) / cur.open * 100;
    }
    return { gain, stop };
  }
  const { gain: initGain, stop: initStop } = computeMetrics();
  const fmtMetric = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  // Compute the header chg AFTER initGain — Gain wins over the gap % once OHLCV is filled.
  const _derivedChg = deriveDayChgPct(study.ohlcv);
  const chg = (study.chgPct != null) ? study.chgPct
            : (initGain != null)     ? initGain
            : (_derivedChg != null)  ? _derivedChg
            : s.chgPct;
  const chgSource = (study.chgPct != null) ? 'manual override'
                  : (initGain != null)     ? `Gain from OHLCV (${intent === 'short' ? '(Open − Low) / Open' : '(High − Open) / Open'})`
                  : (_derivedChg != null)  ? "derived from OHLCV (close − prev_close) / prev_close"
                  : 'snapshot gap % (pre/post-market)';

  // Build the four pill rows that mirror renderStock — short / surp / NEW trade pills.
  // Sessions row: we used to show pre-market / post-market %chg from the scan-time snapshot.
  // In Studies we want the REAL day's chgPct (close → close), which is what users actually
  // trade against. If we don't have prev_close yet, hide the row entirely — the next /SIPs
  // run (Phase 10b) will fill prev_ohlcv.json and the tag re-appears the day after.
  const _tv = s.tv;
  const renderDayTag = (v) => v == null
    ? ''
    : `<span class="tag" id="study-day-tag" title="Day's chgPct = (close − prev_close) / prev_close · 100">DAY <span class="dot dot-${v >= 0 ? 'up' : 'down'}"></span> ${fmtPctShort(v)}</span>`;
  const sessTags = renderDayTag(_derivedChg);
  // Catalyst types — Notion-style multi-select. Pulls from study.customTypes (an array),
  // falls back to the snapshot's single `type` field for legacy/auto-saved studies.
  // Pill body is clickable to OPEN the type picker in "swap" mode (replaces this pill's
  // value with the chosen one). The X is a separate remove affordance.
  function renderCatalystTypesHtml() {
    const types = getStudyTypes(study);
    const pills = types.map((tt, ti) => {
      const cls = catalystTypeClass(tt);
      return `<span class="tag catalyst-type-pill ${cls}" data-type-idx="${ti}" data-action="edit-cat-type" title="Click to change type"><span class="pill-label">${escapeHtml(tt)}</span><button class="pill-x" type="button" data-action="remove-cat-type" data-type-idx="${ti}" title="Remove">&times;</button></span>`;
    }).join('');
    return `<span class="catalyst-types-row" id="catalyst-types-row">${pills}<button class="catalyst-type-add" type="button" id="catalyst-type-add-btn" title="Add catalyst type">+ Add tag</button></span>`;
  }
  const typeTag = renderCatalystTypesHtml();
  const _surpPill = (lbl, v, title) => v == null
    ? ''
    : `<span class="tag stat-tag ${v >= 0 ? 'pos' : 'neg'}" title="${title}">${lbl} ${(v >= 0 ? '+' : '') + v.toFixed(1)}%</span>`;
  const headerShortPills = [
    s.shortFloat != null ? `<span class="tag stat-tag" title="Short Float — % of float currently shorted">Short Float ${s.shortFloat.toFixed(1)}%</span>` : '',
    s.shortRatio != null ? `<span class="tag stat-tag" title="Days to cover (short ratio)">DTC ${s.shortRatio.toFixed(1)}d</span>` : '',
  ].filter(Boolean).join(' ');
  const headerSurpPills = [
    _tv ? _surpPill('EPS Surp', _tv.surpriseEPS_pct, 'EPS surprise vs consensus (TradingView FQ)') : '',
    _tv ? _surpPill('Rev Surp', _tv.surpriseRev_pct, 'Revenue surprise vs consensus (TradingView FQ)') : '',
  ].filter(Boolean).join(' ');
  // Trade pills row — Gain / Stop, click to open OHLCV popup. Pos/neg tinted.
  const gainCls = initGain == null ? '' : (initGain >= 0 ? 'pos' : 'neg');
  const stopCls = initStop == null ? '' : (initStop >= 0 ? 'pos' : 'neg');
  const dirCls = intent === 'long' ? 'pos' : 'neg';
  const tradePills = `
    <button class="tag stat-tag trade-pill direction-pill ${dirCls}" type="button" id="study-direction-pill" title="Trade direction (Long / Short) · click to change in OHLCV popup">${intent.toUpperCase()}</button>
    <button class="tag stat-tag trade-pill ${gainCls}" type="button" id="study-gain-pill" title="${intent === 'short' ? 'Move = (Low − Open) / Open · raw signed drop · negative = short profit · click to edit OHLCV' : 'Move = (High − Open) / Open · raw signed rise · positive = long profit · click to edit OHLCV'}">Move <span id="study-gain-val">${fmtMetric(initGain)}</span></button>
    <button class="tag stat-tag trade-pill ${stopCls}" type="button" id="study-stop-pill" title="${intent === 'short' ? 'Stop = (High − Open) / Open · raw signed rise · positive = short drawdown · click to edit OHLCV' : 'Stop = (Low − Open) / Open · raw signed drop · negative = long drawdown · click to edit OHLCV'}">Stop <span id="study-stop-val">${fmtMetric(initStop)}</span></button>`;
  // Day-1 badge if applicable (from snapshot's _dayLabel — saved at the time the study was added)
  const dayChip = (study.snapshot?._dayLabel === 'day1') ? `<span class="day-badge day1">day1</span>` : '';
  // Catalyst row from the snapshot — if user has saved a custom catalyst override, prefer it
  const cat = (study.catalyst != null && study.catalyst !== '') ? study.catalyst : (s.catalyst || '');
  // News detail: editable card. User override (`study.newsDetail`) wins over snapshot.newsDetail.
  // Body is contenteditable so the user can fix/embellish the AI-fetched text inline. Stored as
  // HTML (innerHTML) so paragraph breaks survive. The section sits inside a sectionCard so it
  // gets the same X-to-hide / right-click-to-restore treatment as the others. Empty body shows
  // a placeholder prompt — useful for manually-created placeholder studies where /SIPs has
  // not yet filled in newsDetail.
  const userNews = (study.newsDetail != null) ? study.newsDetail : null;
  const snapNews = s.newsDetail || '';
  // Source-link footer — read from study.snapshot.sources (preferred, per the schema
  // populated by /SIPs Phase 7 + /update-studies Phase 4). Falls back to s.sources if the
  // study was hydrated from a per-day data.json blob that put sources on the stock object.
  const newsSources = (study.snapshot && Array.isArray(study.snapshot.sources)) ? study.snapshot.sources
                    : (Array.isArray(s.sources) ? s.sources : null);
  const sourcesFooter = renderNewsSources(newsSources);
  const newsContent = ((userNews != null && userNews !== '') ? userNews
                    : snapNews ? mdNewsToHtml(snapNews)
                    : cat ? `<p>${escapeHtml(cat)}</p>`
                    : '') + sourcesFooter;
  const newsPlaceholder = 'Add catalyst notes, news headlines, or analyst commentary…';
  // Forward YoY block — copies the renderStock pattern exactly so the Copy button works.
  // If the user has edited the MS table (customChart present), regenerate the YoY text from
  // those custom arrays. Otherwise fall back to the snapshot's pre-baked yoyBlock from Python.
  const _customChart = study.customChart || null;
  const _initialYoyTxt = _customChart
    ? buildYoyBlockText(_customChart)
    : (s.tv && s.tv.yoyBlock) || '';
  const yoyHtml = _initialYoyTxt
    ? `<div class="yoy-block" id="yoy-${sym}" data-raw="${escapeHtml(_initialYoyTxt)}"><button class="copy-btn yoy-copy-inside" data-copy-target="yoy-${sym}">Copy</button>${colorizeYoyBlock(_initialYoyTxt)}</div>`
    : '';

  // Helper: render a section card with an X button. Sections can be hidden via the X then
  // re-added via right-click context menu.
  const sectionCard = (id, titleHtml, bodyHtml) => sectionShown(id)
    ? `<div class="stock-card study-section" data-section="${id}"><button class="section-x" type="button" data-section="${id}" title="Hide section (right-click anywhere to restore)">&times;</button>${titleHtml}${bodyHtml}</div>`
    : '';

  // Display price — user override (study.price) wins over snapshot.last.
  const displayPrice = (study.price != null) ? study.price : s.last;
  // Display volume — user override (study.ohlcv.volume) wins over snapshot.volume.
  const displayVol = (study.ohlcv?.volume != null) ? study.ohlcv.volume : s.volume;
  // Placeholder badge — kept in the schema (snapshot._placeholder) so build_dashboard.py
  // can still detect it for auto-fill on next /SIPs run, but no longer rendered in the UI.
  // The user found it visual noise and it didn't enable any action they couldn't take anyway.
  const placeholderBadge = '';

  // Build the date-pill + chip + popup as separate strings so the popup can live OUTSIDE
  // the breadcrumb <span> (a <div> inside a <span> is invalid HTML — browsers auto-correct
  // by closing the span early, which broke the popup positioning + click behavior).
  const breadcrumbParts = (() => {
    // Date the breadcrumb pill shows: prefer the explicit ohlcv.date (trading day), then
    // fall back to snapshot.scanDate (the day this research was about), THEN savedAt as
    // last resort. Previously skipped scanDate and went straight to savedAt, which made
    // studies added via search show today's date instead of the historical scan day.
    const od = (study.ohlcv && study.ohlcv.date) ? study.ohlcv.date : '';
    const scan = (study.snapshot && study.snapshot.scanDate) ? study.snapshot.scanDate : '';
    const sd = od || scan || (study.savedAt || '').slice(0, 10);
    const title = `Click to change the trading-day date. Switching to a previously-researched date restores its saved data; switching to a new date creates a blank slot for /update-studies to fill.`;
    const dates = listResearchedDates(study);
    const chipHtml = (dates.length >= 1) ? `<button class="research-dates-chip" id="research-dates-chip" type="button"
              title="${dates.length} researched dates — click to switch"
              aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span id="research-dates-count">${dates.length}</span>
      </button>` : '';
    const popupHtml = (dates.length >= 1) ? `<div class="research-dates-popup" id="research-dates-popup" role="menu" aria-hidden="true">
        ${dates.map(d => {
          const slot = study.datedSnapshots[d] || {};
          const has = hasResearchData(slot);
          const isActive = (d === sd);
          const cat = (slot.snapshot?.catalyst || '').slice(0, 60);
          return `<div class="research-date-row ${isActive ? 'active' : ''}">
                    <button class="research-date-item ${has ? '' : 'blank'}"
                            data-date="${d}" type="button" role="menuitem">
                      <span class="rd-date">${d}</span>
                      ${has ? `<span class="rd-preview">${escapeHtml(cat)}</span>` : '<span class="rd-preview rd-blank">— blank —</span>'}
                    </button>
                    <button class="research-date-del" data-date="${d}" type="button" title="Delete ${d}'s research" aria-label="Delete ${d}">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path></svg>
                    </button>
                  </div>`;
        }).join('')}
      </div>` : '';
    // Date pill button — calendar icon + ISO date label. Clicking opens our custom
    // .study-detail-cal-popup (rendered as a sibling of the breadcrumb below).
    const dateBtnHtml = sd ? `<button class="study-detail-date-btn" id="study-detail-date-btn" type="button" aria-haspopup="dialog" aria-expanded="false" title="${title}">
