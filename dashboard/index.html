        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <span>${sd}</span>
      </button>` : '';
    const datePill = sd ? `&nbsp;·&nbsp;${dateBtnHtml}${chipHtml}` : '';
    // The calendar popup container — rendered as a sibling of the breadcrumb div (NOT
    // inside the span, same fix as the research-dates popup) so its position: fixed
    // escapes the breadcrumb's stacking context cleanly.
    const calPopupHtml = sd ? `<div class="study-detail-cal-popup" id="study-detail-cal-popup" role="dialog" aria-hidden="true"></div>` : '';
    return { datePill, popupHtml, calPopupHtml };
  })();

  app.innerHTML = `
    <div class="breadcrumb study-detail-breadcrumb">
      <span><a href="#/studies">← Studies</a> &nbsp;»&nbsp; <b>${sym}</b>${breadcrumbParts.datePill}</span>
      <button class="study-delete-outer" id="study-delete" type="button" title="Delete this study">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <path d="M10 11v6M14 11v6"></path>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
        </svg>
        <span>Delete study</span>
      </button>
    </div>
    ${breadcrumbParts.popupHtml}
    ${breadcrumbParts.calPopupHtml}
    <div class="stock-header" style="position:relative">
      <div class="sym-big">${sym}${dayChip}${placeholderBadge}</div>
      <div>
        <div class="name">${escapeHtml(s.name || '')}</div>
        <div class="stock-header-tags">${sessTags} ${typeTag}</div>
        ${headerShortPills ? `<div class="stock-header-tags stock-header-short">${headerShortPills}</div>` : ''}
        ${headerSurpPills  ? `<div class="stock-header-tags stock-header-surp">${headerSurpPills}</div>`   : ''}
        <div class="stock-header-tags stock-header-trade">${tradePills}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="price price-editable" id="study-price-cell" title="Click to edit price"><span class="price-text">${fmtPrice(displayPrice)}</span></div>
        <div class="chg-readout" id="study-chg-readout">
          <span class="chg-cell gap-cell ${cls(gapPct)}" title="${derivedGap != null ? 'Gap % derived from OHLCV: (Open − Prev close) / Prev close · 100. Refreshed by /update-studies.' : 'Gap % at scan time (pre/post-market). Fill OHLCV to switch to the official regular-session opening gap.'}"><span class="chg-label">gap</span> <span class="gap-pct">${fmtPct(gapPct)}</span></span>
          <span class="chg-cell move-cell ${cls(initGain)}" title="Day's move % from open — raw price change at the favourable extreme. ${intent === 'short' ? '(Low − Open) / Open · negative = drop = short profit.' : '(High − Open) / Open · positive = rise = long profit.'}"><span class="chg-label">move</span> <span class="move-pct">${fmtPct(initGain)}</span></span>
          <span class="chg-cell day-cell ${cls(_derivedChg)}" title="Day's % change — (Close − Prev close) / Prev close · 100. Filled by /update-studies once both fields are present."><span class="chg-label">day</span> <span class="day-pct">${fmtPct(_derivedChg)}</span></span>
        </div>
        <div class="vol-readout"><span class="vol-label">vol</span> <span class="vol-editable" id="study-vol-cell" title="Click to edit volume (linked to OHLCV)"><span class="vol-text">${fmtVol(displayVol)}</span></span></div>
      </div>
    </div>
    ${sectionCard('news_detail',
      `<h3>新聞詳情 <span class="label-en">News Detail · click body to edit</span></h3>`,
      `<div class="news-detail-edit" id="study-news-detail" contenteditable="${STATE.sidecar.available ? 'true' : 'false'}" data-placeholder="${newsPlaceholder}">${newsContent}</div>`)}
    <div class="chart-wrap study-charts-wrap" id="study-chart-wrap">
      ${sectionCard('eps_chart', `<h3>EPS Quarterly <span class="label-en">Reported vs Estimate</span></h3>`, `<div id="study-eps-chart-host"></div>`)}
      ${sectionCard('rev_chart', `<h3>Revenue Quarterly <span class="label-en">Reported vs Estimate</span></h3>`, `<div id="study-rev-chart-host"></div>`)}
    </div>
    ${sectionCard('ms_table', `<h3>季度 EPS / Sales <span class="label-en">Reported + Estimate · click any value to edit</span></h3>`,
      `<div class="quarter-switcher-row">
         <span class="qs-label">Focus quarter:</span>
         <select class="qs-select" id="study-quarter-select"></select>
         <span class="qs-hint">drives bar charts, MS-table window, Forward YoY · auto-syncs with OHLCV date</span>
       </div>
       <div id="study-ms-host"></div>`)}
    ${sectionCard('yoy_block', `<h3>Forward YoY <span class="label-en">TradingView FQ — EPS YoY / Rev YoY</span></h3>`, yoyHtml || '<div style="color:var(--stone)">No TradingView quarterly estimate data</div>')}
    ${sectionCard('notes', `<h3>Notes <span class="label-en">paste images (Ctrl+V) or drag-drop · Ctrl+Z to undo</span></h3>`, `<div class="study-notes-rich" id="study-notes" contenteditable="${STATE.sidecar.available ? 'true' : 'false'}" data-placeholder="${t('studies-note-placeholder')}">${notesHtml}</div>`)}
  `;

  // ── Chart + MS-table render helpers (recompute when customChart changes) ──
  function activeChart() {
    return loadStudies().find(st => st.id === id)?.customChart || baseChart;
  }
  // Focus quarter — user-selected anchor that drives bar-chart highlighting, MS-table window,
  // and Forward YoY anchor. Default = customChart.latest_idx (which == baseChart.latest_idx
  // unless the user has edited it). Set via the quarter-select dropdown OR auto-set when the
  // user changes OHLCV.date.
  function activeFocusIdx() {
    const cur = loadStudies().find(st => st.id === id);
    if (cur?.focusQuarterIdx != null) return cur.focusQuarterIdx;
    return (cur?.customChart?.latest_idx ?? baseChart?.latest_idx) ?? 0;
  }
  // Populate the quarter-select dropdown from chart.quarters.
  function refreshQuarterSelect() {
    const sel = document.getElementById('study-quarter-select');
    const c = activeChart();
    if (!sel || !c || !c.quarters) return;
    const cur = activeFocusIdx();
    sel.innerHTML = c.quarters.map((q, i) => `<option value="${i}" ${i === cur ? 'selected' : ''}>${q}</option>`).join('');
  }
  function renderAllCharts() {
    const c = activeChart();
    if (!c) return;
    const fi = activeFocusIdx();
    const eps = document.getElementById('study-eps-chart-host');
    const rev = document.getElementById('study-rev-chart-host');
    if (eps) eps.innerHTML = svgBarChart(c.quarters, c.eps_reported, c.eps_estimate, fi, false);
    if (rev) rev.innerHTML = svgBarChart(c.quarters, c.rev_reported_M, c.rev_estimate_M, fi, true);
    const ms = document.getElementById('study-ms-host');
    if (ms) ms.innerHTML = renderEditableMsTable(c, sym, fi);
    const msRoot = document.getElementById('study-ms-host');
    recomputeMsComputedCells(c, msRoot);
    bindMsTableEditors();
    refreshQuarterSelect();
  }
  // Editable MS table input listeners — write back into the right array slot of customChart,
  // then re-recompute the dependent YoY/Surp cells + re-render the bar charts.
  function bindMsTableEditors() {
    document.querySelectorAll('.ms-cell-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const cur = loadStudies().find(st => st.id === id);
        if (!cur) return;
        // Lazy-clone the chart so the original snapshot stays untouched
        const c = cur.customChart ? { ...cur.customChart,
          eps_reported: [...(cur.customChart.eps_reported || baseChart.eps_reported)],
          eps_estimate: [...(cur.customChart.eps_estimate || baseChart.eps_estimate)],
          rev_reported_M: [...(cur.customChart.rev_reported_M || baseChart.rev_reported_M)],
          rev_estimate_M: [...(cur.customChart.rev_estimate_M || baseChart.rev_estimate_M)]
        } : {
          quarters: [...baseChart.quarters],
          eps_reported: [...baseChart.eps_reported],
          eps_estimate: [...baseChart.eps_estimate],
          rev_reported_M: [...baseChart.rev_reported_M],
          rev_estimate_M: [...baseChart.rev_estimate_M],
          latest_idx: baseChart.latest_idx,
        };
        const qi = parseInt(inp.dataset.qi, 10);
        const isRep = inp.dataset.isrep === '1';
        // data-scale is the storage-unit multiplier: 1 for $M (or EPS), 1000 for $B.
        // The user types in the displayed unit (e.g. "10.27" when row is $B); we multiply
        // back to millions before persisting so YoY/Surprise/charts all stay in storage unit.
        const scale = parseFloat(inp.dataset.scale || '1') || 1;
        const raw = inp.value === '' ? null : parseFloat(inp.value);
        const v = (raw != null && !isNaN(raw)) ? raw * scale : null;
        if (inp.dataset.row === 'eps') { (isRep ? c.eps_reported : c.eps_estimate)[qi] = v; }
        else                            { (isRep ? c.rev_reported_M : c.rev_estimate_M)[qi] = v; }
        updateStudy(id,{ customChart: c });
        // Re-render bar charts immediately + update computed cells (use focus quarter, not raw latest_idx)
        const fi = activeFocusIdx();
        const epsHost = document.getElementById('study-eps-chart-host');
        const revHost = document.getElementById('study-rev-chart-host');
        if (epsHost) epsHost.innerHTML = svgBarChart(c.quarters, c.eps_reported, c.eps_estimate, fi, false);
        if (revHost) revHost.innerHTML = svgBarChart(c.quarters, c.rev_reported_M, c.rev_estimate_M, fi, true);
        recomputeMsComputedCells(c, document.getElementById('study-ms-host'));
        refreshYoyBlock(c);
      });
    });
  }
  // Re-paint the Forward YoY card from a (possibly customized) chart object so it stays
  // in sync with MS-table edits AND the focus-quarter selection. Uses buildYoyBlockText
  // (JS twin of parse_tv.yoy) — anchored at focusQuarterIdx so the user can compare YoY
  // around any historical reported quarter, not just the most-recent.
  function refreshYoyBlock(chart) {
    const host = document.getElementById(`yoy-${sym}`);
    if (!host) return;
    const fi = activeFocusIdx();
    const txt = buildYoyBlockText(chart, fi);
    const copyBtnHtml = `<button class="copy-btn yoy-copy-inside" data-copy-target="yoy-${sym}">Copy</button>`;
    if (!txt) {
      host.innerHTML = copyBtnHtml + '<span class="nm">No quarterly data</span>';
      host.removeAttribute('data-raw');
      return;
    }
    host.setAttribute('data-raw', txt);
    host.innerHTML = copyBtnHtml + colorizeYoyBlock(txt);
    // Re-bind the freshly-inserted Copy button to the global click handler
    host.querySelector('.copy-btn')?.addEventListener('click', async (e) => {
      e.preventDefault();
      const tgt = document.getElementById(`yoy-${sym}`);
      const text = tgt?.dataset.raw || tgt?.textContent || '';
      try { await navigator.clipboard.writeText(text); }
      catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
      const btn = e.currentTarget;
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
    });
  }
  renderAllCharts();

  // ── Quarter-select dropdown: user picks an anchor quarter to focus on ──
  document.getElementById('study-quarter-select')?.addEventListener('change', e => {
    const newIdx = parseInt(e.target.value, 10);
    if (Number.isInteger(newIdx)) {
      updateStudy(id,{ focusQuarterIdx: newIdx });
      renderAllCharts();
      refreshYoyBlock(activeChart());
    }
  });

  // ── Top-of-page date pill: change the study's active date ──
  // Archive/restore model: every study carries a datedSnapshots map keyed by ISO date.
  // The flat study.snapshot + study.ohlcv mirror datedSnapshots[currentDate]. Switching
  // the date pill:
  //   1. Saves the current view (with any pending edits) to datedSnapshots[oldDate]
  //   2. If datedSnapshots[newDate] EXISTS → restore it (user gets back their previous
  //      research on this ticker for that date — catalyst, news, TV, OHLCV all intact)
  //   3. If datedSnapshots[newDate] is NEW → create a blank placeholder slot so the
  //      next /update-studies run pulls fresh data for the new date
  //
  // This lets a single CRCL study hold multiple dated catalysts: research 5/15, switch
  // to 4/30 (blank → /update-studies fills it), switch back to 5/15 → original 5/15
  // catalyst + news returns. No re-entry needed.
  //
  // Study-level fields (notes, tags, customTypes, conviction, target/stop, intent,
  // price, screenshots) are NOT date-bound and persist across all dates.
  //
  // Extracted into a function so the custom calendar popup AND the research-dates chip
  // popup AND any other caller can trigger the same flow. Previously was inlined as the
  // native input.change handler.
  function applyStudyDateChange(newDate) {
    if (!newDate) return;
    const cur = loadStudies().find(st => st.id === id);
    if (!cur) return;
    migrateStudyToDated(cur);   // defensive — ensures datedSnapshots exists before we touch it
    const oldDate = cur.ohlcv?.date || '';
    if (newDate === oldDate) return;
    // STEP 1: archive the current view to datedSnapshots[oldDate] BEFORE swapping —
    // but ONLY if it has real research data. Empty placeholders shouldn't pollute the
    // archive (otherwise cycling through dates would record each visit even when blank).
    // The full date-bound slot is archived: snapshot, ohlcv, hiddenSections, notes,
    // customTypes, customChart, focusQuarterIdx — so the new date is a clean swap.
    const dated = { ...(cur.datedSnapshots || {}) };
    if (oldDate && /^\d{4}-\d{2}-\d{2}$/.test(oldDate)) {
      const oldSlot = buildDatedSlot(cur);
      if (hasResearchData(oldSlot)) {
        dated[oldDate] = oldSlot;
      } else {
        delete dated[oldDate];
      }
    }
    // STEP 2 or 3: does newDate have research already?
    const existing = dated[newDate];
    let patch;
    if (existing && hasResearchData(existing)) {
      // RESTORE — bring back the full per-date context exactly as the user left it.
      patch = {
        datedSnapshots: dated,
        snapshot: { ...(existing.snapshot || {}) },
        ohlcv: { ...(existing.ohlcv || {}) },
        hiddenSections: [...(existing.hiddenSections || [])],
        notes: existing.notes || '',
        customTypes: [...(existing.customTypes || [])],
        customChart: existing.customChart ? { ...existing.customChart } : null,
        focusQuarterIdx: (existing.focusQuarterIdx != null) ? existing.focusQuarterIdx : null,
        newsDetail: existing.newsDetail || null,
      };
    } else {
      // NEW DATE — blank placeholder so /update-studies + /SIPs fill it on next run.
      // Identity fields (name, type) come from the existing snapshot since the ticker
      // identity is stable across dates.
      const oldSnap = cur.snapshot || {};
      const blankSnapshot = {
        name: oldSnap.name || '',
        type: oldSnap.type || '?',
        catalyst: '',
        newsDetail: '',
        sources: null,
        tv: null,
        sessions: [],
        chgPct: null,
        last: null,
        publishedAt: null,
        publishedTimezone: null,
        scanDate: newDate,
        _placeholder: true,
        _newsFetched: false,
      };
      const blankOhlcv = { date: newDate, open: null, high: null, low: null, close: null, prev_close: null, volume: null };
      delete dated[newDate];   // don't seed blank placeholder into archive
      patch = {
        datedSnapshots: dated,
        snapshot: blankSnapshot,
        ohlcv: blankOhlcv,
        // Each date gets a fresh layout: data-dependent sections collapse since they'd
        // render empty "No data" cards. Notes section is visible by default for new dates.
        hiddenSections: ['eps_chart', 'rev_chart', 'ms_table', 'yoy_block'],
        notes: '',           // notes are date-bound now — fresh date starts with empty notes
        // customTypes are date-bound. Default to ['earnings'] on a fresh date — most
        // study work centers around earnings catalysts, and /update-studies relies on
        // the earnings tag to trigger the TV scrape on the next refresh. User can
        // remove the tag if the new date is actually an M&A / FDA / contract event.
        customTypes: ['earnings'],
        customChart: null,
        focusQuarterIdx: null,
        newsDetail: null,    // user's HTML newsDetail override is date-bound too — clear on fresh date
      };
    }
    updateStudy(id, patch);
    renderStudyDetail(id);
  }

  // ── Custom calendar popup: toggle on date-pill click ──
  // Replaces the native <input type=date> to eliminate the OS-themed black flash and to
  // give us full control over styling. Calendar reuses .cal-grid / .cal-day from the
  // topbar calendar but allows ANY date (the topbar calendar restricts to scan dates).
  const dateBtn = document.getElementById('study-detail-date-btn');
  const datePop = document.getElementById('study-detail-cal-popup');
  if (dateBtn && datePop) {
    let __studyCalMonth = null;
    const openDatePopup = () => {
      const live = loadStudies().find(st => st.id === id) || {};
      const cur = (live.ohlcv && live.ohlcv.date) || (live.snapshot && live.snapshot.scanDate) || '';
      const refDate = (cur && /^\d{4}-\d{2}-\d{2}$/.test(cur)) ? new Date(cur + 'T00:00:00') : new Date();
      __studyCalMonth = { year: refDate.getFullYear(), month: refDate.getMonth() };
      renderStudyCalendar();
      datePop.classList.add('open');
      dateBtn.classList.add('open');
      dateBtn.setAttribute('aria-expanded', 'true');
      const r = dateBtn.getBoundingClientRect();
      datePop.style.left = r.left + 'px';
      datePop.style.top  = (r.bottom + 6) + 'px';
    };
    const closeDatePopup = () => {
      datePop.classList.remove('open');
      dateBtn.classList.remove('open');
      dateBtn.setAttribute('aria-expanded', 'false');
    };
    function renderStudyCalendar() {
      const { year, month } = __studyCalMonth;
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dowNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      const live = loadStudies().find(st => st.id === id) || {};
      const activeIso = (live.ohlcv && live.ohlcv.date) || '';
      const researchedSet = new Set(listResearchedDates(live));
      const todayIso = new Date().toISOString().slice(0,10);
      let html = `<div class="cal-header"><button class="cal-nav-btn" type="button" data-nav="prev" aria-label="Previous month">‹</button><div class="month-label">${monthNames[month]} ${year}</div><button class="cal-nav-btn" type="button" data-nav="next" aria-label="Next month">›</button></div><div class="cal-grid">`;
      // Sa (idx 6) + Su (idx 0) headers get the .weekend class so they render grayed.
      dowNames.forEach((d, i) => html += `<div class="cal-dow${(i === 0 || i === 6) ? ' weekend' : ''}">${d}</div>`);
      for (let i = 0; i < startWeekday; i++) {
        const prevDate = new Date(year, month, -startWeekday + i + 1);
        html += `<button class="cal-day outside" type="button" disabled>${prevDate.getDate()}</button>`;
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const iso = `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isResearched = researchedSet.has(iso);
        const isActive = iso === activeIso;
        const isToday = iso === todayIso;
        const isFuture = iso > todayIso;
        const dow = new Date(year, month, day).getDay();
        const isWeekend = (dow === 0 || dow === 6);
        const classes = ['cal-day'];
        if (isActive) classes.push('active');
        else if (isWeekend) classes.push('weekend');
        else if (isResearched) classes.push('has-data');
        if (isToday && !isActive) classes.push('today');
        if (isFuture && !isActive) classes.push('future');
        // Weekends disabled (US market closed).
        const disabled = isWeekend;
        html += `<button class="${classes.join(' ')}" type="button" data-iso="${iso}" ${disabled ? 'disabled' : ''}>${day}</button>`;
      }
      html += '</div>';
      datePop.innerHTML = html;
      datePop.querySelectorAll('.cal-nav-btn').forEach(b => {
        b.addEventListener('click', evt => {
          evt.stopPropagation();
          const dir = b.dataset.nav;
          if (dir === 'prev') {
            __studyCalMonth.month--;
            if (__studyCalMonth.month < 0) { __studyCalMonth.month = 11; __studyCalMonth.year--; }
          } else {
            __studyCalMonth.month++;
            if (__studyCalMonth.month > 11) { __studyCalMonth.month = 0; __studyCalMonth.year++; }
          }
          renderStudyCalendar();
        });
      });
      datePop.querySelectorAll('.cal-day:not(.outside)').forEach(b => {
        b.addEventListener('click', evt => {
          evt.stopPropagation();
          const iso = b.dataset.iso;
          if (!iso) return;
          closeDatePopup();
          applyStudyDateChange(iso);
        });
      });
    }
    dateBtn.addEventListener('click', evt => {
      evt.stopPropagation();
      if (datePop.classList.contains('open')) { closeDatePopup(); return; }
      // Close the research-dates popup if it's open — only one breadcrumb popup visible
      // at a time. Same mutual-close pattern as the studies-toolbar Filter / Sort buttons.
      const chipPop = document.getElementById('research-dates-popup');
      const chipBtnEl = document.getElementById('research-dates-chip');
      if (chipPop?.classList.contains('open')) {
        chipPop.classList.remove('open');
        chipBtnEl?.setAttribute('aria-expanded', 'false');
      }
      openDatePopup();
    });
    document.addEventListener('click', evt => {
      if (!datePop.classList.contains('open')) return;
      if (datePop.contains(evt.target) || dateBtn.contains(evt.target)) return;
      closeDatePopup();
    });
    window.addEventListener('scroll', () => {
      if (datePop.classList.contains('open')) closeDatePopup();
    }, { passive: true });
  }

  // ── Research-dates chip: toggle the dates popup ──
  // Click chip to open list of all researched dates for this study. Click an item to
  // switch the active date — uses the same archive/restore flow as the date input so the
  // current view's edits get saved first, then the chosen date's snapshot is restored.
  // Rebuild the research-dates popup body in place — used by both the initial wiring AND
  // the live-update hook below. Re-binds item click handlers on each rebuild.
  function rebuildResearchDatesPopupItems() {
    const popup = document.getElementById('research-dates-popup');
    if (!popup) return;
    const updated = loadStudies().find(st => st.id === id);
    if (!updated) return;
    const dates = listResearchedDates(updated);
    const currentDate = (updated.ohlcv && updated.ohlcv.date) || '';
    popup.innerHTML = dates.map(d => {
      const slot = updated.datedSnapshots[d] || {};
      const isActive = (d === currentDate);
      const cat = (slot.snapshot?.catalyst || '').slice(0, 60);
      const has = hasResearchData(slot);
      return `<div class="research-date-row ${isActive ? 'active' : ''}">
                <button class="research-date-item ${has ? '' : 'blank'}"
                        data-date="${d}" type="button" role="menuitem">
                  <span class="rd-date">${d}</span>
                  ${has ? `<span class="rd-preview">${escapeHtml(cat)}</span>` : '<span class="rd-preview rd-blank">— blank —</span>'}
                </button>
                <button class="research-date-del" data-date="${d}" type="button" title="Delete ${d}'s research" aria-label="Delete ${d}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path></svg>
                </button>
              </div>`;
    }).join('');
    // Re-bind item clicks (lost when we replaced innerHTML)
    popup.querySelectorAll('.research-date-item').forEach(item => {
      item.addEventListener('click', e => {
        e.stopPropagation();
        const d = item.dataset.date;
        if (!d) return;
        popup.classList.remove('open');
        document.getElementById('research-dates-chip')?.setAttribute('aria-expanded', 'false');
        // Direct call (no synthetic input.change event needed — input is gone, replaced
        // by the custom calendar popup which also calls applyStudyDateChange).
        applyStudyDateChange(d);
      });
    });
    // Re-bind delete-date clicks. Deletes immediately (no confirm dialog — that broke the
    // flow) and shows an Undo snackbar with a 10s grace period. Click Undo OR press Ctrl+Z
    // to restore. Uses the same showUndoSnackbar infra as "Delete study" / "Delete image".
    popup.querySelectorAll('.research-date-del').forEach(del => {
      del.addEventListener('click', async e => {
        e.stopPropagation();
        const d = del.dataset.date;
        if (!d) return;
        const cur2 = loadStudies().find(st => st.id === id);
        if (!cur2) return;
        // Capture the slot BEFORE deletion so Undo can restore it byte-for-byte.
        const deletedSlot = cur2.datedSnapshots?.[d] ? JSON.parse(JSON.stringify(cur2.datedSnapshots[d])) : null;
        const wasActive = (cur2.ohlcv?.date === d);
        // Also capture the pre-delete flat snapshot/ohlcv if we're about to switch away,
        // so undo can restore the entire view exactly.
        const preActive = wasActive ? {
          snapshot: JSON.parse(JSON.stringify(cur2.snapshot || {})),
          ohlcv: JSON.parse(JSON.stringify(cur2.ohlcv || {})),
          hiddenSections: [...(cur2.hiddenSections || [])],
          notes: cur2.notes || '',
          customTypes: [...(cur2.customTypes || [])],
          customChart: cur2.customChart ? JSON.parse(JSON.stringify(cur2.customChart)) : null,
          focusQuarterIdx: cur2.focusQuarterIdx ?? null,
          newsDetail: cur2.newsDetail ?? null,
        } : null;
        const dated = { ...(cur2.datedSnapshots || {}) };
        delete dated[d];
        if (wasActive) {
          const remaining = Object.keys(dated)
            .filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k))
            .filter(k => hasResearchData(dated[k]))
            .sort().reverse();
          if (remaining.length > 0) {
            const target = remaining[0];
            const slot = dated[target];
            updateStudy(id, {
              datedSnapshots: dated,
              snapshot: { ...(slot.snapshot || {}) },
              ohlcv: { ...(slot.ohlcv || {}) },
              hiddenSections: [...(slot.hiddenSections || [])],
              notes: slot.notes || '',
              customTypes: [...(slot.customTypes || [])],
              customChart: slot.customChart ? { ...slot.customChart } : null,
              focusQuarterIdx: (slot.focusQuarterIdx != null) ? slot.focusQuarterIdx : null,
              newsDetail: slot.newsDetail || null,
            });
          } else {
            const oldSnap = cur2.snapshot || {};
            updateStudy(id, {
              datedSnapshots: dated,
              snapshot: { name: oldSnap.name || '', type: oldSnap.type || '?', catalyst: '',
                newsDetail: '', sources: null, tv: null, sessions: [], chgPct: null, last: null,
                publishedAt: null, publishedTimezone: null, scanDate: '', _placeholder: true, _newsFetched: false },
              ohlcv: { date: '', open: null, high: null, low: null, close: null, prev_close: null, volume: null },
              hiddenSections: ['eps_chart', 'rev_chart', 'ms_table', 'yoy_block'],
              notes: '', customTypes: [], customChart: null, focusQuarterIdx: null, newsDetail: null,
            });
          }
          renderStudyDetail(id);
        } else {
          updateStudy(id, { datedSnapshots: dated });
          rebuildResearchDatesPopupItems();
          const countEl = document.getElementById('research-dates-count');
          if (countEl) {
            const dates = listResearchedDates(loadStudies().find(st => st.id === id) || {});
            countEl.textContent = dates.length;
          }
        }
        // Undo handler — restore the deleted slot, plus the pre-active flat view if we
        // were on this date. Re-render so the UI reflects the restored state.
        const undoFn = async () => {
          const live = loadStudies().find(st => st.id === id);
          if (!live) return;
          const restoredDated = { ...(live.datedSnapshots || {}) };
          if (deletedSlot) restoredDated[d] = deletedSlot;
          if (preActive) {
            updateStudy(id, {
              datedSnapshots: restoredDated,
              snapshot: preActive.snapshot,
              ohlcv: preActive.ohlcv,
              hiddenSections: preActive.hiddenSections,
              notes: preActive.notes,
              customTypes: preActive.customTypes,
              customChart: preActive.customChart,
              focusQuarterIdx: preActive.focusQuarterIdx,
              newsDetail: preActive.newsDetail,
            });
            renderStudyDetail(id);
          } else {
            updateStudy(id, { datedSnapshots: restoredDated });
            rebuildResearchDatesPopupItems();
            const countEl = document.getElementById('research-dates-count');
            if (countEl) {
              const dates = listResearchedDates(loadStudies().find(st => st.id === id) || {});
              countEl.textContent = dates.length;
            }
          }
        };
        showUndoSnackbar(`Deleted ${d}`, undoFn);
        pushUndoStack(`Deleted ${d}`, undoFn);
      });
    });
  }

  // Refresh chip count + popup contents whenever updateStudy fires a data-changed event
  // for THIS study. AbortController scopes the listener to this render — it disposes
  // automatically when the user navigates away via hashchange, no leak.
  const chipUpdateCtrl = new AbortController();
  document.addEventListener('study-data-changed', evt => {
    if (evt.detail?.id !== id) return;
    const updated = loadStudies().find(st => st.id === id);
    if (!updated) return;
    const dates = listResearchedDates(updated);
    const countEl = document.getElementById('research-dates-count');
    const chipBtn = document.getElementById('research-dates-chip');
    if (countEl) countEl.textContent = dates.length;
    if (chipBtn) chipBtn.title = `${dates.length} researched dates — click to switch`;
    rebuildResearchDatesPopupItems();
  }, { signal: chipUpdateCtrl.signal });
  window.addEventListener('hashchange', () => chipUpdateCtrl.abort(), { once: true });

  const chipBtn = document.getElementById('research-dates-chip');
  const chipPopup = document.getElementById('research-dates-popup');
  if (chipBtn && chipPopup) {
    const closePopup = () => {
      chipPopup.classList.remove('open');
      chipBtn.setAttribute('aria-expanded', 'false');
    };
    chipBtn.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = chipPopup.classList.contains('open');
      if (isOpen) { closePopup(); return; }
      // Close the calendar date popup if it's open — mutual-close pattern matching the
      // date-button side. Only one breadcrumb popup visible at a time.
      const datePop = document.getElementById('study-detail-cal-popup');
      const dateBtnEl = document.getElementById('study-detail-date-btn');
      if (datePop?.classList.contains('open')) {
        datePop.classList.remove('open');
        dateBtnEl?.classList.remove('open');
        dateBtnEl?.setAttribute('aria-expanded', 'false');
      }
      // Position below chip using viewport coords (matches position:fixed in CSS so the
      // popup stays anchored even when the topbar's stacking context would otherwise
      // trap an absolutely-positioned child).
      const r = chipBtn.getBoundingClientRect();
      chipPopup.style.left = r.left + 'px';
      chipPopup.style.top  = (r.bottom + 6) + 'px';
      chipPopup.classList.add('open');
      chipBtn.setAttribute('aria-expanded', 'true');
    });
    // Close on outside click (use document-level listener that lives as long as the popup
    // does — single shot was too brittle when other handlers re-rendered the page).
    const outsideHandler = (evt) => {
      if (!chipPopup.classList.contains('open')) return;
      if (chipPopup.contains(evt.target) || chipBtn.contains(evt.target)) return;
      closePopup();
    };
    document.addEventListener('click', outsideHandler);
    // Close on scroll — fixed-position popup would otherwise stay anchored to its viewport
    // coords while the underlying page scrolls away from the chip.
    window.addEventListener('scroll', () => {
      if (chipPopup.classList.contains('open')) closePopup();
    }, { passive: true });
    // Bind item-click + delete-button handlers via the consolidated rebuild helper.
    // That function is the single source of truth for the popup's interactive bindings.
    rebuildResearchDatesPopupItems();
  }

  // ── Editable Volume — linked to ohlcv.volume so OHLCV popup stays in sync ──
  const volCell = document.getElementById('study-vol-cell');
  volCell?.addEventListener('click', () => {
    if (!STATE.sidecar.available) return;
    if (volCell.querySelector('input')) return;
    const span = volCell.querySelector('.vol-text');
    const cur = (loadStudies().find(st => st.id === id)?.ohlcv?.volume);
    const seed = (cur != null) ? cur : s.volume;
    const inp = document.createElement('input');
    // Text input so we can accept "1.5M" / "1,500,000" / "1500000". Parser handles the rest.
    inp.type = 'text'; inp.inputMode = 'decimal';
    inp.className = 'vol-edit-input';
    inp.style.width = '110px';
    inp.value = fmtVolFull(seed);
    inp.placeholder = '1.5M / 1,500,000';
    span.style.display = 'none';
    volCell.appendChild(inp);
    inp.focus(); inp.select();
    let done = false;
    const finish = (cancel) => {
      if (done) return; done = true;
      if (!cancel) {
        const final = parseVolumeStr(inp.value);
        const ohlcv = loadStudies().find(st => st.id === id)?.ohlcv || {};
        updateStudy(id,{ ohlcv: { ...ohlcv, volume: final } });
        span.textContent = fmtVol(final);
      }
      span.style.display = '';
      inp.remove();
    };
    inp.addEventListener('blur', () => finish(false));
    inp.addEventListener('keydown', ev => {
      if (ev.key === 'Enter')  { ev.preventDefault(); finish(false); }
      if (ev.key === 'Escape') { ev.preventDefault(); finish(true); }
    });
  });

  // ── Catalyst-types multi-select (Notion-style) ──
  // One stable click listener on the persistent #catalyst-types-row container, using event
  // delegation. This way we never re-attach listeners — pill HTML inside the row can be
  // swapped via innerHTML and the row's click handler keeps firing correctly.
  // Re-render only updates the row's INNER html (pills + add button) — the outer container
  // and its listener remain attached.
  function renderCatalystInner(currentStudy) {
    const types = getStudyTypes(currentStudy);
    const pills = types.map((tt, ti) => {
      const cls = catalystTypeClass(tt);
      return `<span class="tag catalyst-type-pill ${cls}" data-type-idx="${ti}" data-action="edit-cat-type" title="Click to change type"><span class="pill-label">${escapeHtml(tt)}</span><button class="pill-x" type="button" data-action="remove-cat-type" data-type-idx="${ti}" title="Remove">&times;</button></span>`;
    }).join('');
    return pills + `<button class="catalyst-type-add" type="button" id="catalyst-type-add-btn" title="Add catalyst type">+ Add tag</button>`;
  }
  function reRenderCatalystRow() {
    const host = document.getElementById('catalyst-types-row');
    if (!host) return;
    host.innerHTML = renderCatalystInner(loadStudies().find(st => st.id === id) || study);
  }
  function wireCatalystRow() {
    const host = document.getElementById('catalyst-types-row');
    if (!host || host.__wired) return;
    host.__wired = true;
    host.addEventListener('click', e => {
      // Order matters: check most-specific first.
      const xBtn = e.target.closest('[data-action="remove-cat-type"]');
      if (xBtn) {
        e.preventDefault(); e.stopPropagation();
        const ti = parseInt(xBtn.dataset.typeIdx, 10);
        const cur = loadStudies().find(st => st.id === id);
        if (!cur) return;
        const types = getStudyTypes(cur).slice();
        types.splice(ti, 1);
        updateStudy(id, { customTypes: types });
        reRenderCatalystRow();
        return;
      }
      const addBtn = e.target.closest('#catalyst-type-add-btn');
      if (addBtn) {
        e.preventDefault(); e.stopPropagation();
        openCatalystPopup(addBtn, { mode: 'add' });
        return;
      }
      const editPill = e.target.closest('[data-action="edit-cat-type"]');
      if (editPill) {
        e.preventDefault(); e.stopPropagation();
        const ti = parseInt(editPill.dataset.typeIdx, 10);
        openCatalystPopup(editPill, { mode: 'swap', editIdx: ti });
        return;
      }
    });
  }
  // Notion-style picker popup. `opts.mode` is 'swap' (replace one pill) or 'add' (toggle).
  // Renders via position: fixed at the BODY level so it can't be clipped by any
  // ancestor stacking context (the bug where stock-card backgrounds covered it).
  function openCatalystPopup(anchor, opts = {}) {
    document.querySelector('.catalyst-type-popup')?.remove();
    const mode = opts.mode || 'add';
    const editIdx = (opts.editIdx != null) ? opts.editIdx : -1;
    const rect = anchor.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'catalyst-type-popup';
    pop.style.position = 'fixed';
    pop.style.top = `${rect.bottom + 6}px`;
    pop.style.left = `${Math.min(rect.left, window.innerWidth - 260)}px`;
    pop.style.zIndex = '9999';
    // `selected` recomputed on every renderOptions call so the ✓ ticks track the actual
    // current store state (not a stale capture from popup-open time).
    // Option source = built-in presets + user-remembered custom types (from localStorage).
    // Custom types render with a small "forget" × so the user can clean up the dropdown
    // list without affecting any study that still uses the type.
    const renderOptions = (query) => {
      const cur = loadStudies().find(st => st.id === id);
      const selected = new Set(getStudyTypes(cur || study));
      const q = (query || '').toLowerCase().trim();
      const all = getAllCatalystOptions();
      const matches = all.filter(p => !q || p.label.toLowerCase().includes(q) || p.key.includes(q));
      const optHtml = matches.map(p => {
        const isSel = mode === 'add' && (selected.has(p.label) || selected.has(p.key));
        // Only CUSTOM tags get a delete-X. Built-in presets can't be removed from the
        // dropdown — they're the always-available baseline. Use the Reset button at the
        // bottom of the popup to wipe all customs back to defaults.
        const forgetX = p.isCustom
          ? `<button class="cat-forget-x" type="button" data-action="forget-custom" data-key="${escapeHtml(p.label)}" title="Forget this custom tag (undoable)">&times;</button>`
          : '';
        return `<div class="cat-option ${isSel ? 'selected' : ''}" data-key="${escapeHtml(p.label)}">
          <span class="tag catalyst-type-pill ${p.cls}" style="padding:1px 8px;font-size:11px;pointer-events:none">${escapeHtml(p.label)}</span>
          ${forgetX}
        </div>`;
      }).join('');
      const showCreate = q && !all.some(p => p.label.toLowerCase() === q || p.key === q);
      const createHtml = showCreate ? `<div class="cat-create" data-action="create" data-key="${escapeHtml(q)}">+ ${mode === 'swap' ? 'Set to' : 'Create'} "${escapeHtml(q)}"</div>` : '';
      return optHtml + createHtml;
    };
    const placeholder = (mode === 'swap') ? 'Change tag to…' : 'Search or create new…';
    pop.innerHTML = `
      <input class="cat-search" type="text" placeholder="${placeholder}" autocomplete="off">
      <div class="cat-options-host">${renderOptions('')}</div>
      <div class="cat-popup-foot">
        <button class="cat-reset" type="button" data-action="restore-customs" title="Bring back every custom tag you have ever created (from the archive)">↺ Restore deleted tags</button>
      </div>
    `;
    document.body.appendChild(pop);
    const inp = pop.querySelector('input.cat-search');
    const host = pop.querySelector('.cat-options-host');
    inp.focus();
    inp.addEventListener('input', () => { host.innerHTML = renderOptions(inp.value); });
    inp.addEventListener('keydown', e => { if (e.key === 'Escape') pop.remove(); });
    // Restore-deleted-tags button (popup footer) — pulls everything ever created from the
    // archive back into the active dropdown list. Lives outside `host` so it gets its own
    // listener. Undoable: snackbar Undo reverts to the active list as it was before clicking.
    pop.querySelector('[data-action="restore-customs"]')?.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      const before  = loadCustomCatTypes();
      const archive = loadCustomCatArchive();
      // Compute net additions (archive minus already-active, case-insensitive).
      const activeLower = new Set(before.map(a => a.toLowerCase()));
      const newlyRestored = archive.filter(a => !activeLower.has(a.toLowerCase()));
      if (newlyRestored.length === 0) {
        const msg = archive.length === 0
          ? 'No custom tags to restore — none have been created yet (presets are always available).'
          : `Nothing to restore — all ${archive.length} archived custom tag${archive.length === 1 ? ' is' : 's are'} already in the dropdown.`;
        showUndoSnackbar(msg, () => {});
        return;
      }
      // Active list = before ∪ archive (dedup'd, archive order appended after current order)
      saveCustomCatTypes([...before, ...newlyRestored]);
      // Also clear the legacy hidden-presets list in case it was lingering from older builds.
      localStorage.removeItem(HIDDEN_CAT_PRESETS_KEY);
      host.innerHTML = renderOptions(inp.value);
      showUndoSnackbar(`Restored ${newlyRestored.length} custom tag${newlyRestored.length === 1 ? '' : 's'}: ${newlyRestored.slice(0, 3).map(escapeHtml).join(', ')}${newlyRestored.length > 3 ? `, +${newlyRestored.length - 3} more` : ''}`, () => {
        saveCustomCatTypes(before);
        const stillOpen = document.querySelector('.catalyst-type-popup .cat-options-host');
        if (stillOpen) stillOpen.innerHTML = renderOptions(inp.value);
      });
    });

    host.addEventListener('click', e => {
      // Forget X (custom tags only) — undoable via snackbar. Click stops here so it doesn't
      // bubble to the parent .cat-option (which would otherwise toggle/swap the tag).
      const forgetBtn = e.target.closest('[data-action="forget-custom"]');
      if (forgetBtn) {
        e.preventDefault(); e.stopPropagation();
        const removed = forgetBtn.dataset.key;
        forgetCustomCatType(removed);
        host.innerHTML = renderOptions(inp.value);
        showUndoSnackbar(`Forgot custom tag "${removed}"`, () => {
          rememberCustomCatType(removed);
          const stillOpen = document.querySelector('.catalyst-type-popup .cat-options-host');
          if (stillOpen) stillOpen.innerHTML = renderOptions(inp.value);
        });
        return;
      }
      const opt = e.target.closest('.cat-option, .cat-create');
      if (!opt) return;
      e.preventDefault(); e.stopPropagation();
      const key = opt.dataset.key;
      const isCreate = opt.dataset.action === 'create';
      // If this is a "+ Create new X" click, persist the new type to the global dropdown
      // remembered-list FIRST so it's available for future sessions (and this one).
      if (isCreate) rememberCustomCatType(key);
      const cur = loadStudies().find(st => st.id === id);
      if (!cur) return;
      const types = getStudyTypes(cur).slice();
      if (mode === 'swap' && editIdx >= 0 && editIdx < types.length) {
        // Swap mode — replace the clicked pill's value in place + close popup
        types[editIdx] = key;
        updateStudy(id, { customTypes: types });
        reRenderCatalystRow();
        pop.remove();
      } else {
        // Add mode — toggle preset/custom membership; "create new" always adds.
        const existingIdx = types.indexOf(key);
        if (!isCreate && existingIdx >= 0) {
          types.splice(existingIdx, 1);   // already present → toggle off
        } else if (!types.includes(key)) {
          types.push(key);                  // add new
        }
        updateStudy(id, { customTypes: types });
        reRenderCatalystRow();
        host.innerHTML = renderOptions(inp.value);
      }
    });
    setTimeout(() => {
      const onDocClick = (ev) => {
        if (!pop.contains(ev.target) && !anchor.contains(ev.target)) {
          pop.remove();
          document.removeEventListener('click', onDocClick);
        }
      };
      document.addEventListener('click', onDocClick);
    }, 0);
  }
  wireCatalystRow();

  // Refresh Gain / Stop trade pills (called from OHLCV popup on every keystroke)
  function refreshTradeMetrics() {
    const m = computeMetrics();
    const gainEl = document.getElementById('study-gain-val');
    const stopEl = document.getElementById('study-stop-val');
    const gainBtn = document.getElementById('study-gain-pill');
    const stopBtn = document.getElementById('study-stop-pill');
    if (gainEl) gainEl.textContent = fmtMetric(m.gain);
    if (stopEl) stopEl.textContent = fmtMetric(m.stop);
    if (gainBtn) gainBtn.className = `tag stat-tag trade-pill ${m.gain == null ? '' : (m.gain >= 0 ? 'pos' : 'neg')}`;
    if (stopBtn) stopBtn.className = `tag stat-tag trade-pill ${m.stop == null ? '' : (m.stop >= 0 ? 'pos' : 'neg')}`;
  }

  // Editable price — click swaps the readout for an <input>, blur/Enter commits, Esc cancels.
  // Stored as study.price (user override); fallback display order: study.price → s.last → "—".
  // Hosted (read-only) mode disables the click via CSS (.readonly-mode .price-editable { cursor: default }).
  const priceCell = document.getElementById('study-price-cell');
  priceCell?.addEventListener('click', () => {
    if (!STATE.sidecar.available) return;        // read-only
    if (priceCell.querySelector('input')) return; // already editing
    const span = priceCell.querySelector('.price-text');
    const cur = (loadStudies().find(st => st.id === id)?.price);
    const seed = (cur != null) ? cur : s.last;
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = '0.01'; inp.min = '0';
    inp.className = 'price-edit-input';
    inp.value = (seed != null) ? seed : '';
    inp.placeholder = '—';
    span.style.display = 'none';
    priceCell.appendChild(inp);
    inp.focus(); inp.select();
    let committed = false;
    const finish = (cancel) => {
      if (committed) return;
      committed = true;
      if (!cancel) {
        const raw = inp.value.trim();
        const v = (raw === '') ? null : parseFloat(raw);
        const final = (v != null && isFinite(v)) ? v : null;
        updateStudy(id,{ price: final });
        span.textContent = fmtPrice(final);
      }
      span.style.display = '';
      inp.remove();
    };
    inp.addEventListener('blur', () => finish(false));
    inp.addEventListener('keydown', ev => {
      if (ev.key === 'Enter')  { ev.preventDefault(); finish(false); }
      if (ev.key === 'Escape') { ev.preventDefault(); finish(true); }
    });
  });

  // Re-render the gap + move pair in the header — runs whenever OHLCV changes.
  // gap = snapshot.chgPct (static), move = intent-aware gain from OHLCV (recomputed live).
  function refreshChgReadout() {
    const cur = loadStudies().find(st => st.id === id);
    if (!cur) return;
    const { gain: liveGain } = computeMetrics();
    const derived = deriveDayChgPct(cur.ohlcv);
    // Live gap derivation — matches the static-render priority: derived from OHLCV when both
    // open + prev_close are present, otherwise fall back to snapshot.chgPct.
    const co = cur.ohlcv || {};
    const liveDerivedGap = (co.open != null && co.prev_close != null && co.prev_close !== 0)
      ? (co.open - co.prev_close) / co.prev_close * 100
      : null;
    const liveGap = (liveDerivedGap != null) ? liveDerivedGap : s.chgPct;
    const el = document.getElementById('study-chg-readout');
    if (el) {
      // Update gap-cell text + class
      const gapCell = el.querySelector('.gap-cell');
      const gapPctEl = el.querySelector('.gap-pct');
      if (gapCell && gapPctEl) {
        gapPctEl.textContent = fmtPct(liveGap);
        gapCell.className = `chg-cell gap-cell ${cls(liveGap)}`;
        gapCell.title = (liveDerivedGap != null)
          ? 'Gap % derived from OHLCV: (Open − Prev close) / Prev close · 100. Refreshed by /update-studies.'
          : 'Gap % at scan time (pre/post-market). Fill OHLCV to switch to the official regular-session opening gap.';
      }
      // Update move-cell text + class
      const moveCell = el.querySelector('.move-cell');
      const movePct  = el.querySelector('.move-pct');
      if (moveCell && movePct) {
        movePct.textContent = fmtPct(liveGain);
        moveCell.className = `chg-cell move-cell ${cls(liveGain)}`;
      }
      // Update day-cell text + class
      const dayCell = el.querySelector('.day-cell');
      const dayPctEl = el.querySelector('.day-pct');
      if (dayCell && dayPctEl) {
        dayPctEl.textContent = fmtPct(derived);
        dayCell.className = `chg-cell day-cell ${cls(derived)}`;
      }
    }
    // Day tag (sessTags row) — close-vs-prev_close derived chg. Hidden until both filled.
    const dayTagHost = document.querySelector('.stock-header .stock-header-tags');
    const existing = document.getElementById('study-day-tag');
    if (derived == null) {
      existing?.remove();
    } else if (existing) {
      existing.innerHTML = `DAY <span class="dot dot-${derived >= 0 ? 'up' : 'down'}"></span> ${fmtPctShort(derived)}`;
    } else if (dayTagHost) {
      dayTagHost.insertAdjacentHTML('afterbegin', renderDayTag(derived) + ' ');
    }
  }

  // ── OHLCV popup modal — opens when user clicks either trade metric chip ──
  function openOhlcvModal() {
    const curStudy = loadStudies().find(st => st.id === id);
    const cur = curStudy?.ohlcv || {};
    const curIntent = resolveStudyIntent(curStudy || study);
    const modal = document.createElement('div');
    modal.className = 'ohlcv-modal-overlay';
    modal.innerHTML = `
      <div class="ohlcv-modal" onclick="event.stopPropagation()">
        <div class="ohlcv-modal-head">
          <h3>OHLCV — ${sym}</h3>
          <button class="ohlcv-modal-close" type="button">&times;</button>
        </div>
        <div class="ohlcv-direction-row" title="Trade direction — flips the Gain/Stop column anchors">
          <span class="ohlcv-direction-label">Direction</span>
          <div class="ohlcv-direction-toggle">
            <button class="dir-btn ${curIntent === 'long'  ? 'active' : ''}" data-direction="long"  type="button">Long</button>
            <button class="dir-btn ${curIntent === 'short' ? 'active' : ''}" data-direction="short" type="button">Short</button>
          </div>
        </div>
        <div class="ohlcv-modal-body">
          <label class="study-ohlcv-field"><span>${t('ohlcv-date')}</span><input data-field="date" type="date" value="${cur.date || ''}"></label>
          <label class="study-ohlcv-field"><span>${t('ohlcv-open')}</span><input data-field="open" type="number" step="0.01" value="${cur.open ?? ''}" placeholder="—"></label>
          <label class="study-ohlcv-field"><span>${t('ohlcv-high')}</span><input data-field="high" type="number" step="0.01" value="${cur.high ?? ''}" placeholder="—"></label>
          <label class="study-ohlcv-field"><span>${t('ohlcv-low')}</span><input data-field="low" type="number" step="0.01" value="${cur.low ?? ''}" placeholder="—"></label>
          <label class="study-ohlcv-field"><span>${t('ohlcv-close')}</span><input data-field="close" type="number" step="0.01" value="${cur.close ?? ''}" placeholder="—"></label>
          <label class="study-ohlcv-field" title="Prior-day close — drives the day's %Chg derivation. Auto-filled by /SIPs Phase 10b when available."><span>${t('ohlcv-prev-close')}</span><input data-field="prev_close" type="number" step="0.01" value="${cur.prev_close ?? ''}" placeholder="—"></label>
          <label class="study-ohlcv-field" title="Accepts plain numbers (1500000), commas (1,500,000), and shorthand suffixes (1.5M, 800K, 1.2B)."><span>${t('ohlcv-volume')}</span><input data-field="volume" type="text" inputmode="decimal" value="${fmtVolFull(cur.volume)}" placeholder="e.g. 1.5M or 1,500,000"></label>
        </div>
        <div class="ohlcv-modal-foot">
          <button class="studies-btn" type="button" id="ohlcv-modal-done">Done</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    requestAnimationFrame(() => modal.classList.add('show'));
    const close = () => { modal.classList.remove('show'); setTimeout(() => modal.remove(), 180); };
    modal.onclick = close;
    modal.querySelector('.ohlcv-modal-close').onclick = close;
    modal.querySelector('#ohlcv-modal-done').onclick = close;
    modal.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', e => {
        const field = e.target.dataset.field;
        const ohlcv = loadStudies().find(st => st.id === id)?.ohlcv || {};
        let val;
        if (field === 'date')        val = e.target.value;
        else if (field === 'volume') val = parseVolumeStr(e.target.value);   // 1.5M / 1,500,000 / 1500000 all OK
        else                          val = (parseFloat(e.target.value) || null);
        updateStudy(id,{ ohlcv: { ...ohlcv, [field]: val } });
        refreshTradeMetrics();
        refreshChgReadout();
        // Mirror the new volume into the header's Vol readout (kept in sync with ohlcv.volume).
        if (field === 'volume') {
          const volSpan = document.querySelector('#study-vol-cell .vol-text');
          if (volSpan) volSpan.textContent = fmtVol(val);
        }
        // OHLCV.date change → auto-snap the focus quarter to the calendar quarter containing it.
        // This is what the user asked for: editing the Gain/Stop date drives the quarter view,
        // but manually picking the quarter dropdown below does NOT bounce the date back.
        if (field === 'date') {
          const c = activeChart();
          const qi = dateToQuarterIdx(val, c);
          if (qi != null && qi >= 0) {
            updateStudy(id,{ focusQuarterIdx: qi });
            renderAllCharts();
            refreshYoyBlock(activeChart());
          }
        }
      });
    });
    // Direction-toggle buttons inside the modal — set study.intent then re-render the detail
    // page in place so Gain/Stop anchors, header chg, move %, etc. all flip together.
    modal.querySelectorAll('.dir-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        const dir = btn.dataset.direction;
        if (dir !== 'long' && dir !== 'short') return;
        updateStudy(id, { intent: dir });
        modal.querySelectorAll('.dir-btn').forEach(b => b.classList.toggle('active', b.dataset.direction === dir));
        renderStudyDetail(id);
      });
    });
    // Focus first empty input for fast entry
    const focusInp = Array.from(modal.querySelectorAll('input')).find(i => !i.value) || modal.querySelector('input');
    focusInp?.focus();
  }
  // All three pills open the same OHLCV modal — Direction toggle lives inside.
  document.getElementById('study-direction-pill')?.addEventListener('click', openOhlcvModal);
  document.getElementById('study-gain-pill')?.addEventListener('click', openOhlcvModal);
  document.getElementById('study-stop-pill')?.addEventListener('click', openOhlcvModal);

  // ── Per-section X to hide + right-click menu to bring back ──
  app.querySelectorAll('.section-x').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      const sid = e.target.dataset.section;
      const cur = loadStudies().find(st => st.id === id);
      if (!cur) return;
      const next = new Set(cur.hiddenSections || []);
      next.add(sid);
      updateStudy(id,{ hiddenSections: Array.from(next) });
      const card = e.target.closest('.study-section');
      if (card) card.remove();
    });
  });
  // Right-click anywhere on the detail page → context menu listing hidden sections to restore
  app.addEventListener('contextmenu', e => {
    const cur = loadStudies().find(st => st.id === id);
    const hiddenList = (cur?.hiddenSections || []).filter(id => sectionsAll.includes(id));
    if (hiddenList.length === 0) return;   // default browser menu wins when nothing to restore
    e.preventDefault();
    // Remove any open menu
    document.querySelectorAll('.study-ctx-menu').forEach(m => m.remove());
    const menu = document.createElement('div');
    menu.className = 'study-ctx-menu';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
    menu.innerHTML = `<div class="study-ctx-menu-title">Restore hidden section</div>` +
      hiddenList.map(id => `<button class="study-ctx-menu-item" data-section="${id}">+ ${sectionLabels[id] || id}</button>`).join('');
    document.body.appendChild(menu);
    const close = () => menu.remove();
    menu.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      const sid = b.dataset.section;
      const cur2 = loadStudies().find(st => st.id === id);
      const remaining = (cur2?.hiddenSections || []).filter(x => x !== sid);
      updateStudy(id,{ hiddenSections: remaining });
      close();
      renderStudyDetail(sym);   // re-render so the restored card appears in its original slot
    }));
    setTimeout(() => document.addEventListener('click', close, { once: true }), 0);
  });
  // Hydrate all <img data-img-key> inside notes from IndexedDB. For legacy imgs that aren't
  // already wrapped in .notes-img-wrap (older format), retro-fit the wrap + delete X so the
  // user can manage them the same way as freshly-pasted ones.
  for (const img of app.querySelectorAll('#study-notes img[data-img-key]')) {
    const key = img.getAttribute('data-img-key');
    if (key && !img.src) {
      try { const data = await getImg(key); if (data) img.src = data; } catch {}
    }
    img.style.cursor = 'zoom-in';
    // Retro-wrap legacy imgs (no parent .notes-img-wrap)
    if (img.parentElement && !img.parentElement.classList?.contains('notes-img-wrap')) {
      const wrap = document.createElement('span');
      wrap.className = 'notes-img-wrap';
      wrap.contentEditable = 'false';
      img.replaceWith(wrap);
      wrap.appendChild(img);
      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'notes-img-del';
      del.dataset.imgKey = key;
      del.title = 'Delete image';
      del.innerHTML = '&times;';
      wrap.appendChild(del);
    }
  }
  // Delegated click handler for notes block — handles X (delete) + img click (lightbox).
  // Image delete is wrapped in an undo snackbar so accidental clicks are recoverable:
  //   • capture full notes innerHTML (with img src still attached) + the IDB image data
  //   • remove the wrap + delImg
  //   • on undo: putImg the data back + restore notes innerHTML to the pre-delete state
  app.querySelector('#study-notes')?.addEventListener('click', async e => {
    const delBtn = e.target.closest?.('.notes-img-del');
    if (delBtn) {
      e.preventDefault();
      const key = delBtn.dataset.imgKey;
      const notesEl = document.getElementById('study-notes');
      const wrap = delBtn.closest('.notes-img-wrap');
      // Snapshot for undo BEFORE mutation
      const beforeHtml = notesEl?.innerHTML;
      let beforeImg = null;
      try { beforeImg = await getImg(key); } catch {}
      // Apply delete
      wrap?.remove();
      try { await delImg(key); } catch {}
      // Persist the post-delete notes
      notesEl?.dispatchEvent(new Event('input', { bubbles: true }));
      // Undo: put the image back into IDB/disk + restore the notes HTML at original position
      showUndoSnackbar('Image deleted', async () => {
        if (beforeImg) { try { await putImg(key, beforeImg); } catch {} }
        if (notesEl && beforeHtml != null) {
          notesEl.innerHTML = beforeHtml;
          // Re-hydrate any img missing a src (defensive — beforeHtml already has src baked in)
          for (const img of notesEl.querySelectorAll('img[data-img-key]')) {
            if (!img.src) {
              const k = img.getAttribute('data-img-key');
              try { const v = await getImg(k); if (v) img.src = v; } catch {}
            }
          }
          notesEl.dispatchEvent(new Event('input', { bubbles: true }));
        }
      });
      return;
    }
    if (e.target.tagName === 'IMG' && e.target.src) {
      openShotLightbox(e.target.src);
    }
  });
  // Wire Copy buttons (Forward YoY) — mirrors the renderStock pattern
  app.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = async () => {
      const tgt = document.getElementById(btn.dataset.copyTarget);
      if (!tgt) return;
      const text = tgt.dataset.raw || tgt.textContent;
      try { await navigator.clipboard.writeText(text); }
      catch (e) { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
    };
  });
  // Delete with snackbar undo (instead of confirm dialog, since clear-all already pattern)
  document.getElementById('study-delete')?.addEventListener('click', async () => {
    const snapshot = loadStudies().find(st => st.id === id);
    if (!snapshot) return;
    // Collect image keys for restore
    const imgKeys = new Set();
    const noteImgs = (snapshot.notes || '').match(/data-img-key="([^"]+)"/g) || [];
    noteImgs.forEach(m => imgKeys.add(m.replace(/data-img-key="|"$/g, '')));
    const beforeImgs = {};
    for (const k of imgKeys) { try { const v = await getImg(k); if (v) beforeImgs[k] = v; } catch {} }
    saveStudies(loadStudies().filter(s => s.id !== id));
    for (const k of imgKeys) { try { await delImg(k); } catch {} }
    location.hash = '#/studies';
    showUndoSnackbar(`Deleted ${sym}`, async () => {
      saveStudies([...loadStudies(), snapshot]);
      for (const [k, v] of Object.entries(beforeImgs)) { try { await putImg(k, v); } catch {} }
      location.hash = '#/study/' + id;
    });
  });
  // Notion-style notes — contenteditable with inline image paste/drop. Save innerHTML on input
  // (debounced via animation frame to batch fast typing).
  const notes = document.getElementById('study-notes');
  let saveTimer = null;
  const flushSave = () => {
    // Strip inline data: URIs from src before storage — images live in IndexedDB by data-img-key
    const clone = notes.cloneNode(true);
    clone.querySelectorAll('img[data-img-key]').forEach(img => img.removeAttribute('src'));
    updateStudy(id,{ notes: clone.innerHTML });
  };
  const scheduleSave = () => {
    if (saveTimer) cancelAnimationFrame(saveTimer);
    saveTimer = requestAnimationFrame(flushSave);
  };
  notes?.addEventListener('input', scheduleSave);
  // News Detail editor — saves to study.newsDetail (user override). Debounced via rAF
  // so fast typing doesn't slam saveStudies on every keystroke.
  const newsEl = document.getElementById('study-news-detail');
  let newsTimer = null;
  newsEl?.addEventListener('input', () => {
    if (newsTimer) cancelAnimationFrame(newsTimer);
    newsTimer = requestAnimationFrame(() => updateStudy(id, { newsDetail: newsEl.innerHTML }));
  });
  // Image paste handler — insert <span.notes-img-wrap><img><button.notes-img-del>✕</button></span>
  // at cursor via execCommand so browser-native Ctrl+Z still works.
  const insertImgAtCursor = (dataUrl, key) => {
    const safeUrl = dataUrl.replace(/"/g, '&quot;');
    const html = `<span class="notes-img-wrap" contenteditable="false">` +
      `<img src="${safeUrl}" data-img-key="${key}" class="notes-inline-img" style="cursor:zoom-in">` +
      `<button class="notes-img-del" type="button" data-img-key="${key}" title="Delete image">&times;</button>` +
    `</span><br>`;
    notes.focus();
    if (!document.execCommand('insertHTML', false, html)) {
      // Fallback if execCommand is unavailable in the future
      const wrap = document.createElement('span');
      wrap.className = 'notes-img-wrap';
      wrap.contentEditable = 'false';
      wrap.innerHTML = `<img src="${safeUrl}" data-img-key="${key}" class="notes-inline-img" style="cursor:zoom-in"><button class="notes-img-del" type="button" data-img-key="${key}" title="Delete image">&times;</button>`;
      notes.appendChild(wrap);
      notes.appendChild(document.createElement('br'));
    }
    scheduleSave();
  };
  notes?.addEventListener('paste', async e => {
    const items = Array.from(e.clipboardData?.items || []);
    const imgItem = items.find(it => it.type.startsWith('image/'));
    if (imgItem) {
      e.preventDefault();
      const file = imgItem.getAsFile();
      const dataUrl = await downscaleImage(file);
      const key = uuid();
      await putImg(key, dataUrl);
      insertImgAtCursor(dataUrl, key);
    }
    // For non-image paste, also strip rich formatting (paste as plain text)
    else {
      const text = e.clipboardData?.getData('text/plain');
      if (text) {
        e.preventDefault();
        document.execCommand('insertText', false, text);
      }
    }
  });
  notes?.addEventListener('dragover', e => { e.preventDefault(); notes.classList.add('drag-over'); });
  notes?.addEventListener('dragleave', () => notes.classList.remove('drag-over'));
  notes?.addEventListener('drop', async e => {
    e.preventDefault();
    notes.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer?.files || []).filter(f => f.type.startsWith('image/'));
    for (const file of files) {
      const dataUrl = await downscaleImage(file);
      const key = uuid();
      await putImg(key, dataUrl);
      insertImgAtCursor(dataUrl, key);
    }
  });
}

// Lightbox modal for clicking any image (used both in notes inline + legacy screenshots)
function openShotLightbox(dataUrl, caption) {
  const overlay = document.createElement('div');
  overlay.className = 'shot-lightbox';
  overlay.innerHTML = `<img src="${dataUrl}">${caption ? `<div class="shot-caption">${escapeHtml(caption)}</div>` : ''}`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

// ── Undo snackbar ───────────────────────────────────────────────
// Reusable bottom-of-screen toast for destructive actions. Caller passes
// (message, undoFn). 10s auto-dismiss; click Undo to invoke undoFn.
/* ═══════ Multi-step undo stack ═══════
   Every destructive operation that calls showUndoSnackbar also gets pushed onto a global
   UNDO_STACK so it can be reverted later (long after the snackbar expired). Press Ctrl+Z
   (or Cmd+Z on macOS) anywhere outside an input/contenteditable to pop and replay the
   most recent inverse. Stack is capped to 100 entries to avoid unbounded memory growth.
   Each entry already executed once via the snackbar Undo button is removed from the stack
   so we don't undo it twice. */
const UNDO_STACK = [];
const UNDO_STACK_MAX = 100;
function pushUndoStack(label, undoFn) {
  UNDO_STACK.push({ label, undoFn, ts: Date.now() });
  if (UNDO_STACK.length > UNDO_STACK_MAX) UNDO_STACK.shift();
}
async function popUndoOne() {
  const entry = UNDO_STACK.pop();
  if (!entry) return null;
  try { await entry.undoFn(); } catch (e) { console.warn('[undo]', entry.label, e); }
  return entry;
}
// Lightweight toast (no Undo button) — used to confirm Ctrl+Z replays.
function showToast(message, ms = 2200) {
  const old = document.getElementById('undo-toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.id = 'undo-toast';
  t.className = 'undo-snackbar';
  t.style.background = 'rgba(15,15,25,0.92)';
  t.innerHTML = `<span></span>`;
  t.querySelector('span').textContent = message;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, ms);
}
// Global Ctrl/Cmd+Z handler — undoes the latest stack entry. Ignored while focus is in
// inputs / textareas / contenteditable so the browser's native undo still works there.
document.addEventListener('keydown', async (e) => {
  if (!(e.ctrlKey || e.metaKey) || e.key !== 'z' || e.shiftKey) return;
  const t = e.target;
  if (t && (t.matches('input, textarea, select') || t.isContentEditable)) return;
  if (UNDO_STACK.length === 0) return;
  e.preventDefault();
  const entry = await popUndoOne();
  if (entry) showToast(`Undone: ${entry.label}${UNDO_STACK.length ? ` · ${UNDO_STACK.length} more in history` : ''}`);
});

function showUndoSnackbar(message, undoFn, ms = 10000) {
  // Push into the multi-step stack first so Ctrl+Z still works after the snackbar expires.
  // The snackbar's Undo button pops the entry directly so we don't risk a double-undo.
  pushUndoStack(message, undoFn);
  const old = document.getElementById('undo-snackbar');
  if (old) old.remove();
  const snack = document.createElement('div');
  snack.id = 'undo-snackbar';
  snack.className = 'undo-snackbar';
  snack.innerHTML = `<span></span><button class="undo-btn">Undo</button>`;
  snack.querySelector('span').textContent = message;
  document.body.appendChild(snack);
  requestAnimationFrame(() => snack.classList.add('show'));
  let dismissed = false;
  const dismiss = () => {
    if (dismissed) return; dismissed = true;
    snack.classList.remove('show');
    setTimeout(() => snack.remove(), 300);
  };
  const timer = setTimeout(dismiss, ms);
  snack.querySelector('.undo-btn').onclick = async () => {
    clearTimeout(timer);
    // Locate this entry in the stack (by reference identity) and remove it BEFORE running
    // the undo function — otherwise Ctrl+Z could replay the same undo a second time.
    const idx = UNDO_STACK.findIndex(e => e.undoFn === undoFn);
    if (idx >= 0) UNDO_STACK.splice(idx, 1);
    try { await undoFn(); } catch (e) { console.warn('undo failed', e); }
    dismiss();
  };
}

boot();
</script>
